<!DOCTYPE html>

<title>InkFrame · The Glass Horizon</title>
<style>
  :root{
    --font-ui: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI Variable", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-display: "Cinzel", Georgia, "Times New Roman", serif;
    --font-mono: "SF Mono", "Roboto Mono", ui-monospace, Menlo, Consolas, monospace;
    --btn-pad-y:9px; --btn-pad-x:14px; --btn-radius:14px; --btn-min-h:36px;
    --accent:#bb0037; --accent-deep:#880057; --rose:#f7cac9; --blush:#fff0f3; --violet:#2a001a;
    --glass: rgba(247,202,201,0.12);
    --glass-strong: rgba(247,202,201,0.20);
    --stroke: rgba(247,202,201,0.40);
    --rim: rgba(255,240,243,0.6);
    --text:#fff0f3; --dim:#e8b9c6;
    --label-bg:rgba(10,0,10,.46); --label-border:rgba(255,240,243,.20);
    --label-shadow:0 1px 2px rgba(0,0,0,.85), 0 0 10px rgba(0,0,0,.45);
    --shadow: 0 14px 50px rgba(20,0,14,0.55);
    --bg: radial-gradient(120% 82% at 50% -12%, #ffd9e2 0%, #f7cac9 14%, #d77fa0 38%, #a52766 64%, #4d0a33 86%, #1a001a 100%);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent;
     /* Kill every browser default that stomps on stylus drawing: text selection
        highlight, iOS press-and-hold callout, image drag ghost, tap zoom. */
     -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
     -webkit-touch-callout:none; -webkit-user-drag:none; }
  html,body{ margin:0; height:100%; overflow:hidden; touch-action:none; overscroll-behavior:none;
    font-family:var(--font-ui); color:var(--text); font-weight:520; line-height:1.45;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; font-kerning:normal;
    font-feature-settings:"kern" 1, "liga" 1, "calt" 1; }
  /* Editable fields (colour picker, any future rename inputs) get selection back. */
  input,textarea,[contenteditable]{ -webkit-user-select:text; user-select:text; -webkit-touch-callout:default; }

  #bg{ position:fixed; inset:0; z-index:0; background:var(--bg); transition:background .6s ease; }
  #rays{ position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.42; mix-blend-mode:screen; filter:blur(2px);
    background:conic-gradient(from 200deg at 50% 0%, transparent 0deg, rgba(255,255,255,.35) 12deg, transparent 16deg,
      transparent 28deg, rgba(255,255,255,.22) 32deg, transparent 36deg,
      transparent 52deg, rgba(255,255,255,.30) 56deg, transparent 60deg); }
  #grain{ position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  #vignette{ position:fixed; inset:0; z-index:3; pointer-events:none;
    background:radial-gradient(120% 92% at 50% 42%, transparent 55%, rgba(20,0,14,.55) 100%); }

  .glass{ background:linear-gradient(160deg, var(--glass-strong), var(--glass));
    backdrop-filter:blur(20px) saturate(150%); -webkit-backdrop-filter:blur(20px) saturate(150%);
    border:1px solid var(--stroke); box-shadow:var(--shadow), inset 0 1px 0 var(--rim), inset 0 0 30px rgba(255,240,243,.06); }

  button{ font-family:var(--font-ui); font-weight:750; line-height:1.1; }
  #studio .actions button, #studio .close, #projectPanel .footer button, .projBtn,
  #startActions button, #expo button, #blab button, #stylusPanel button, .customTemplate button{
    min-height:var(--btn-min-h); padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius);
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    letter-spacing:.08em; text-transform:uppercase; white-space:nowrap;
    touch-action:manipulation; }

  #title{ position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:5; text-align:center; pointer-events:none; transition:opacity .4s; }
  #title h1{ margin:0; font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:.22em; text-transform:uppercase;
    background:linear-gradient(180deg,#fff,var(--rose) 55%,var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 16px rgba(255,255,255,.25); }
  #title .sub{ font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--dim); opacity:.86; margin-top:3px; font-weight:700; text-shadow:var(--label-shadow); }

  /* The Lens — a live glass nib cursor floating at the pen tip */
  #lens{ position:fixed; left:0; top:0; width:0; height:0; z-index:23; pointer-events:none;
    opacity:0; transform:translate(-50%,-50%); transition:opacity .14s ease; }
  #lens.show{ opacity:1; }
  #lens svg{ position:absolute; left:-50px; top:-50px; width:100px; height:100px; overflow:visible;
    filter:drop-shadow(0 2px 6px rgba(42,0,26,.5)); }
  #lens #lensRing{ fill:rgba(247,202,201,.06); stroke:var(--rim); stroke-width:1.2;
    backdrop-filter:blur(2px); }
  #lens #lensNib{ stroke:rgba(255,240,243,.85); stroke-width:1; opacity:.92; }
  #glint{ position:fixed; inset:0; z-index:12; pointer-events:none; opacity:0;
    transition:opacity .25s ease; mix-blend-mode:screen; }
  #stage{ position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; }
  #frameGlass{ position:relative; padding:14px; border-radius:30px; }
  canvas#c{ display:block; background:#fff0f3; border-radius:16px; touch-action:none;
    box-shadow:0 0 0 1px rgba(20,0,14,.4), 0 18px 60px rgba(20,0,14,.6); }
  /* Monopoly-board timeline: frame slots wrap the canvas perimeter and scale
     with the canvas element. Existing frames are numbered; empty placeholders
     invite adding frames up to MAX_FRAMES. */
  #frameBoard{ position:absolute; inset:0; z-index:13; pointer-events:none; overflow:visible; }
  .frameSlot{ position:absolute; width:18px; height:18px; transform:translate(-50%,-50%); border-radius:5px;
    display:flex; align-items:center; justify-content:center; pointer-events:auto; touch-action:none;
    font:800 8px/1 var(--font-ui); color:var(--text); text-shadow:var(--label-shadow);
    background:rgba(255,240,243,.10); border:1px solid rgba(247,202,201,.26);
    box-shadow:0 2px 8px rgba(10,0,10,.28), inset 0 1px 0 rgba(255,255,255,.16);
    transition:transform .12s, background .16s, box-shadow .16s, opacity .16s; }
  .frameSlot.filled{ background:linear-gradient(160deg, rgba(247,202,201,.18), rgba(187,0,55,.18)); }
  .frameSlot.empty{ opacity:.42; border-style:dashed; }
  .frameSlot.next{ opacity:.88; background:rgba(247,202,201,.16); }
  .frameSlot.cur{ transform:translate(-50%,-50%) scale(1.35); background:linear-gradient(160deg,var(--blush),var(--accent)); color:#fff;
    box-shadow:0 0 14px var(--accent), inset 0 1px 0 var(--rim); }
  .frameSlot.sel{ transform:translate(-50%,-50%) scale(1.18); box-shadow:0 0 0 2px #fff, 0 0 14px var(--accent); }
  .frameSlot.held::after{ content:""; position:absolute; right:-2px; top:-2px; width:6px; height:6px; border-radius:50%; background:var(--rose); box-shadow:0 0 6px var(--accent); }
  .frameCapBadge{ position:absolute; left:50%; bottom:-30px; transform:translateX(-50%); min-width:92px; text-align:center;
    padding:5px 10px; border-radius:999px; pointer-events:none; font:800 10px/1 var(--font-ui); letter-spacing:.10em;
    color:var(--text); text-shadow:var(--label-shadow); background:var(--label-bg); border:1px solid var(--label-border);
    box-shadow:0 5px 16px rgba(10,0,10,.32), inset 0 1px 0 rgba(255,255,255,.14); }
  .frameCapBadge.warn{ background:rgba(187,0,55,.34); border-color:var(--rim); }
  body.zen #title{ opacity:0; }
  body.zen #frameGlass{ padding:8px; border-radius:18px; }

  /* ===== Nodes (circles only — spiral out) ===== */
  .node{ position:fixed; z-index:20; will-change:transform; }
  .orb{ position:relative; width:58px; height:58px; border-radius:50%; cursor:grab; touch-action:none;
    display:flex; align-items:center; justify-content:center; transition:box-shadow .25s, transform .12s, background .2s; }
  .orb:active{ cursor:grabbing; }
  /* darker lens behind glyph guarantees legibility over the bright canvas */
  .orb::after{ content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle at 50% 42%, rgba(20,0,14,.34), rgba(20,0,14,0) 72%); }
  .orb .glyph{ position:relative; z-index:1; font-size:22px; color:#fff; font-weight:600; line-height:1;
    text-shadow:0 1px 3px rgba(0,0,0,.6), 0 0 10px rgba(0,0,0,.35); }
  /* custom SVG icons: drawn with the glass rim light, not pasted glyphs */
  .glyph svg{ width:26px; height:26px; display:block; overflow:visible; }
  .kid .glyph svg{ width:21px; height:21px; }
  .glyph svg path, .glyph svg circle, .glyph svg line, .glyph svg polyline, .glyph svg rect{
    fill:none; stroke:#fff; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.55)); vector-effect:non-scaling-stroke; }
  .glyph svg .fill{ fill:#fff; stroke:none; }
  .glyph svg .soft{ opacity:.5; }
  .orb .lbl{ position:absolute; top:62px; left:50%; transform:translateX(-50%); font-size:10px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--dim); white-space:nowrap; pointer-events:none; transition:opacity .2s;
    font-weight:750; text-shadow:var(--label-shadow); }
  .node.open > .orb .lbl{ opacity:0; }
  .node.dragging > .orb, .node.dragging .orb{ box-shadow:var(--shadow), 0 0 26px rgba(255,255,255,.4), inset 0 1px 0 var(--rim); }
  .node.dragging{ --glass:rgba(247,202,201,0.30); --glass-strong:rgba(247,202,201,0.42); }
  .node.open > .orb{ box-shadow:var(--shadow), 0 0 22px rgba(187,0,55,.5), inset 0 1px 0 var(--rim); }

  /* child container: zero-size anchor at orb centre; kids fan out via transforms */
  .kids{ position:absolute; left:29px; top:29px; width:0; height:0; z-index:-1; }
  .kid{ position:absolute; left:0; top:0; width:48px; height:48px; margin:-24px 0 0 -24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transform:translate(0,0) scale(.35); opacity:0; pointer-events:none;
    transition:transform .34s cubic-bezier(.2,.95,.25,1.1), opacity .24s ease; }
  .node.open > .kids > .kid, .branch.open > .kids > .kid{ opacity:1; pointer-events:auto;
    transform:translate(var(--dx,0), var(--dy,0)) scale(1); }
  .kid::after{ content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle at 50% 42%, rgba(20,0,14,.30), rgba(20,0,14,0) 72%); }
  .kid .glyph{ position:relative; z-index:1; font-size:18px; color:#fff; font-weight:600;
    text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .kid.on{ background:linear-gradient(160deg, var(--accent), var(--accent-deep)) !important; border-color:var(--rim) !important;
    box-shadow:0 0 18px rgba(187,0,55,.6), inset 0 1px 0 var(--rim) !important; }
  .kid .sub{ position:absolute; top:50px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:.10em;
    text-transform:uppercase; color:var(--dim); white-space:nowrap; pointer-events:none; font-weight:750; text-shadow:var(--label-shadow); }
  .kid.frameKid{ overflow:hidden; border-radius:50%; }
  .kid.frameKid .frameThumb{ position:absolute; inset:3px; border-radius:50%; background-size:cover; background-position:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.22); filter:saturate(1.04); }
  .kid.frameKid .glyph{ position:relative; z-index:2; min-width:18px; height:18px; padding:0 4px; border-radius:999px;
    display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800;
    background:rgba(10,0,10,.48); border:1px solid rgba(255,255,255,.22); }
  .kid.frameKid.sel{ box-shadow:0 0 0 2px #fff, 0 0 18px var(--accent), inset 0 1px 0 var(--rim) !important; }
  .kid.frameKid.sel .glyph{ background:linear-gradient(160deg,var(--accent-deep),var(--accent)); }
  /* Readability mode: larger, high-contrast label capsules for tablet glare,
     bright themes, and low-vision use. Toggled from Actions ▸ Text. */
  body.readable #title .sub{ opacity:1; color:var(--text); text-shadow:var(--label-shadow); }
  body.readable .orb .lbl, body.readable .kid .sub{
    color:var(--text); opacity:1; font-weight:800; letter-spacing:.11em;
    background:var(--label-bg); border:1px solid var(--label-border);
    border-radius:999px; padding:3px 7px; text-shadow:var(--label-shadow);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
  body.readable .orb .lbl{ font-size:10px; }
  body.readable .kid .sub{ top:54px; font-size:9px; }
  body.readable #railCount, body.readable .projStats, body.readable .templateBtn span,
  body.readable .brushPreset .meta, body.readable #stylusReadout, body.readable #projectAutosave{
    color:var(--text); text-shadow:var(--label-shadow); }
  body.readable #studio p, body.readable #studio details, body.readable #startPanel p{
    color:var(--text); font-size:14px; }

  /* dial gauge ring */
  .kid.dial .ring{ position:absolute; inset:-3px; border-radius:50%; pointer-events:none;
    background:conic-gradient(var(--accent) calc(var(--p,40)*1%), rgba(247,202,201,.16) 0);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px)); }
  .kid.dial .glyph{ font-size:13px; }

  /* swatch / colour kids */
  .kid.swatch{ border:2px solid rgba(255,240,243,.25); }
  .kid.swatch.sel{ border-color:var(--blush); box-shadow:0 0 14px rgba(255,255,255,.8); }
  .kid input[type=color]{ position:absolute; inset:0; opacity:0; width:100%; height:100%; border:none; cursor:pointer; }

  /* theme preview kids show a colour ring */
  .kid.theme .glyph{ display:none; }
  .kid.theme .ring{ position:absolute; inset:4px; border-radius:50%; }
  .kid.theme.sel{ box-shadow:0 0 16px rgba(255,255,255,.85); border:2px solid var(--blush); }

  /* studio overlay — soft glow, no box */
  /* Studio "about" overlay -- a proper frosted-glass card, not a radial
     hint. Backdrop dims + blurs the app behind so the card reads. Card
     stays legible on every theme thanks to the contrast-aware --text /
     --dim that applyTheme() computes. */
  #studio{ position:fixed; inset:0; z-index:45; display:none; align-items:center; justify-content:center; padding:30px;
    background:rgba(10,0,10,.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  #studio.show{ display:flex; }
  #studio .card{ max-width:660px; width:100%; max-height:calc(100vh - 42px); overflow:auto; padding:32px 34px; border-radius:24px;
    background:linear-gradient(160deg, rgba(247,202,201,.18), rgba(20,0,14,.55));
    border:1px solid rgba(247,202,201,.30);
    box-shadow:0 24px 60px rgba(10,0,10,.55), inset 0 1px 0 rgba(255,240,243,.35);
    color:var(--text); text-align:center;
    animation:studioIn .32s cubic-bezier(.2,.9,.3,1); }
  @keyframes studioIn{ from{ transform:translateY(14px) scale(.96); opacity:0; } to{ transform:none; opacity:1; } }
  #studio h2{ font-family:"Cinzel",Georgia,serif; letter-spacing:.18em; font-size:26px; margin:0 0 6px;
    background:linear-gradient(180deg,#fff,var(--rose)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #studio .tag{ font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:var(--dim); margin:0 0 22px; }
  #studio p{ font-size:14px; line-height:1.7; color:var(--text); margin:0 0 10px; }
  #studio .divider{ height:1px; margin:20px auto; width:60%; background:linear-gradient(90deg, transparent, var(--rim), transparent); }
  #studio .credits{ font-size:12px; line-height:1.9; color:var(--dim); letter-spacing:.04em; }
  #studio .credits a{ color:var(--text); text-decoration:none; border-bottom:1px dashed var(--rim); }
  #studio .credits b{ color:var(--text); font-weight:600; letter-spacing:.06em; }
  #studio .metaGrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; margin:14px 0;
    text-align:left; }
  #studio .metaGrid div{ padding:9px 10px; border-radius:14px; background:rgba(20,0,14,.24);
    border:1px solid rgba(247,202,201,.18); color:var(--dim); font-size:11px; line-height:1.45; }
  #studio .metaGrid b{ display:block; color:var(--text); font-size:12px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
  #studio .backup{ margin:14px 0; padding:11px 12px; border-radius:16px; text-align:left;
    background:linear-gradient(160deg, rgba(187,0,55,.22), rgba(255,240,243,.07));
    border:1px solid rgba(247,202,201,.24); color:var(--dim); font-size:12px; line-height:1.55; }
  #studio details{ text-align:left; margin:8px 0; padding:10px 12px; border-radius:14px;
    background:rgba(255,240,243,.06); border:1px solid rgba(247,202,201,.16); color:var(--dim); font-size:12px; line-height:1.55; }
  #studio summary{ color:var(--text); cursor:pointer; letter-spacing:.08em; text-transform:uppercase; font-size:11px; }
  #studio .actions{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:18px; }
  #studio .actions button, #studio .close{ font:inherit; color:var(--text); background:transparent;
    border:1px solid var(--rim); padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer;
    letter-spacing:.08em; text-transform:uppercase; font-size:12px; opacity:.92; }
  #studio .actions button.primary{ background:linear-gradient(160deg,var(--accent-deep),var(--accent)); }
  #studio .actions button:hover, #studio .close:hover{ opacity:1; background:rgba(247,202,201,.08); }

  /* Project browser / recovery overlay. Same frosted language as Studio, but
     list-focused: thumbnails on the left, editable names, project actions,
     and a small autosave health strip. */
  #projectPanel{ position:fixed; inset:0; z-index:46; display:none; align-items:center; justify-content:center; padding:26px;
    background:rgba(10,0,10,.58); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  #projectPanel.show{ display:flex; }
  #projectPanel .card{ width:min(820px, calc(100vw - 28px)); max-height:calc(100vh - 42px); overflow:auto;
    padding:26px; border-radius:26px; color:var(--text);
    background:linear-gradient(160deg, rgba(247,202,201,.18), rgba(20,0,14,.62));
    border:1px solid rgba(247,202,201,.30);
    box-shadow:0 24px 60px rgba(10,0,10,.58), inset 0 1px 0 rgba(255,240,243,.35);
    animation:studioIn .28s cubic-bezier(.2,.9,.3,1); }
  #projectPanel h2{ font-family:"Cinzel",Georgia,serif; letter-spacing:.16em; font-size:23px; margin:0 0 4px;
    background:linear-gradient(180deg,#fff,var(--rose)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #projectPanel .tag{ font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--dim); margin-bottom:14px; }
  #projectAutosave{ margin:10px 0 14px; padding:9px 12px; border-radius:14px;
    background:rgba(20,0,14,.26); border:1px solid rgba(247,202,201,.20);
    font-size:12px; line-height:1.5; color:var(--dim); }
  #projectAutosave b{ color:var(--text); font-weight:600; }
  #projectList{ display:grid; gap:10px; max-height:min(40vh, 360px); overflow:auto; padding-right:4px; }
  #projectTemplates{ margin-top:12px; padding-top:10px; border-top:1px solid rgba(247,202,201,.18); }
  #projectTemplates .templateHdr{ color:var(--dim); font-size:10px; letter-spacing:.18em; text-transform:uppercase; margin:0 0 8px; }
  #projectTemplates .templateGrid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:8px; }
  .templateBtn{ text-align:left; min-height:66px; border-radius:16px; padding:10px 12px;
    border:1px solid rgba(247,202,201,.22); background:rgba(255,240,243,.06); color:var(--text);
    cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,240,243,.10);
    display:grid; grid-template-columns:48px 1fr; gap:10px; align-items:center; }
  .templateBtn:hover{ background:rgba(247,202,201,.12); border-color:var(--rim); }
  .templateBtn b{ display:block; font-size:13px; letter-spacing:.055em; margin-bottom:3px; font-weight:800; }
  .templateBtn span{ display:block; color:var(--dim); font-size:11px; line-height:1.4; font-weight:620; }
  .tplPreview{ width:44px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:10px;
    background:rgba(10,0,10,.28); border:1px solid rgba(247,202,201,.18); position:relative; overflow:hidden; }
  .tplCanvas{ border-radius:5px; box-shadow:0 0 0 1px rgba(20,0,14,.45), inset 0 1px 0 rgba(255,255,255,.22); }
  .tplBeads{ position:absolute; left:6px; right:6px; bottom:4px; display:flex; gap:2px; justify-content:center; }
  .tplBeads i{ width:3px; height:3px; border-radius:50%; background:var(--rose); opacity:.8; }
  .customTemplate{ margin-top:10px; padding:10px; border-radius:16px; background:rgba(20,0,14,.20); border:1px solid rgba(247,202,201,.18); }
  .customTemplate .customGrid{ display:grid; grid-template-columns:repeat(5, minmax(72px, 1fr)) auto; gap:8px; align-items:end; }
  .customTemplate label{ display:grid; gap:4px; color:var(--dim); font-size:10px; letter-spacing:.10em; text-transform:uppercase; }
  .customTemplate input{ width:100%; min-height:36px; border-radius:10px; border:1px solid rgba(247,202,201,.24);
    background:rgba(10,0,10,.30); color:var(--text); padding:0 10px; font:inherit; font-weight:650; outline:none; }
  .customTemplate input[type=color]{ padding:2px; }
  .customTemplate button{ min-height:36px; white-space:nowrap; }

  /* First-launch Start overlay. It reuses the same template cards as Gallery
     Manage, but replaces the initial blank canvas instead of consuming a slot. */
  #startPanel{ position:fixed; inset:0; z-index:47; display:none; align-items:center; justify-content:center; padding:26px;
    background:radial-gradient(70% 70% at 50% 42%, rgba(42,0,26,.70), rgba(10,0,10,.92));
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  #startPanel.show{ display:flex; }
  #startPanel .card{ width:min(780px, calc(100vw - 28px)); max-height:calc(100vh - 42px); overflow:auto;
    padding:28px; border-radius:28px; color:var(--text);
    background:linear-gradient(160deg, rgba(247,202,201,.18), rgba(20,0,14,.64));
    border:1px solid rgba(247,202,201,.32); box-shadow:0 24px 70px rgba(10,0,10,.62), inset 0 1px 0 rgba(255,240,243,.35); }
  #startPanel h2{ font-family:"Cinzel",Georgia,serif; letter-spacing:.18em; font-size:26px; margin:0 0 4px;
    background:linear-gradient(180deg,#fff,var(--rose)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #startPanel .tag{ font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--dim); margin-bottom:14px; }
  #startPanel p{ color:var(--dim); font-size:13px; line-height:1.6; margin:0 0 14px; }
  #startTemplates{ display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:9px; }
  #startActions{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:16px; }
  #startActions button{ font:inherit; color:var(--text); background:rgba(255,240,243,.06);
    border:1px solid rgba(247,202,201,.30); padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer;
    font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
  #startActions button.primary{ background:linear-gradient(160deg,var(--accent-deep),var(--accent)); border-color:var(--rim); }
  .projRow{ display:grid; grid-template-columns:76px 1fr auto; gap:12px; align-items:center;
    padding:10px; border-radius:18px; background:rgba(255,240,243,.07);
    border:1px solid rgba(247,202,201,.18); }
  .projRow.on{ background:linear-gradient(160deg, rgba(187,0,55,.30), rgba(247,202,201,.10));
    border-color:var(--rim); box-shadow:0 0 18px rgba(187,0,55,.25); }
  .projThumb{ width:70px; height:52px; border-radius:12px; background-size:cover; background-position:center;
    border:1px solid rgba(247,202,201,.28); box-shadow:inset 0 1px 0 rgba(255,255,255,.20), 0 5px 16px rgba(10,0,10,.35); }
  .projMain{ min-width:0; }
  .projMain input{ width:100%; min-height:38px; border-radius:12px; border:1px solid rgba(247,202,201,.26);
    background:rgba(10,0,10,.30); color:var(--text); padding:0 12px; font:inherit; font-size:14px; font-weight:680; outline:none; }
  .projMain input:focus{ border-color:var(--rim); box-shadow:0 0 0 2px rgba(247,202,201,.12); }
  .projStats{ margin-top:5px; color:var(--dim); font-size:11px; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .projBtns{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; max-width:340px; }
  .projBtn, #projectPanel .footer button{ font:inherit; color:var(--text); background:rgba(255,240,243,.06);
    border:1px solid rgba(247,202,201,.30); padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer;
    opacity:.92; font-size:12px; letter-spacing:.075em; text-transform:uppercase; }
  .projBtn:hover, #projectPanel .footer button:hover{ opacity:1; background:rgba(247,202,201,.12); }
  .projBtn.danger{ border-color:rgba(255,120,160,.42); color:#ffd9e2; }
  #projectPanel .footer{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:16px; }
  #projectPanel .footer button.primary{ background:linear-gradient(160deg,var(--accent-deep),var(--accent)); border-color:var(--rim); }
  @media (max-width:640px){ .projRow{ grid-template-columns:64px 1fr; } .projBtns{ grid-column:1 / -1; justify-content:flex-start; max-width:none; }
    .projThumb{ width:60px; height:46px; } #projectPanel .card{ padding:20px; }
    #projectTemplates .templateGrid, #startTemplates{ grid-template-columns:1fr; }
    .customTemplate .customGrid{ grid-template-columns:repeat(2, minmax(90px,1fr)); }
    .customTemplate button{ grid-column:1 / -1; }
    #startPanel .card{ padding:20px; } }

  /* Tablet-first touch polish. Pointer-coarse devices get larger orbs, rails,
     slider thumbs, and project buttons without changing desktop density. */
  @media (pointer:coarse){
    .orb{ width:66px; height:66px; }
    .kids{ left:33px; top:33px; }
    .orb .lbl{ top:70px; font-size:10px; }
    .kid{ width:56px; height:56px; margin:-28px 0 0 -28px; }
    .kid .sub{ top:58px; font-size:9px; }
    .glyph svg{ width:29px; height:29px; }
    .kid .glyph svg{ width:24px; height:24px; }
    #rail{ height:54px; border-radius:27px; padding:0 14px; }
    .railStep{ width:40px; height:40px; }
    #railTrack{ height:18px; }
    #railTrack .seg, #loopRegion{ top:3px; height:12px; }
    #playhead{ width:24px; height:24px; margin:-12px 0 0 -12px; }
    #railCount{ min-width:64px; font-size:12px; }
    #collapseBtn{ width:58px; height:58px; }
    #blab{ min-width:min(380px, calc(100vw - 24px)); max-width:calc(100vw - 24px); }
    #blab .row{ margin:12px 0; }
    #blab input[type=range]{ height:18px; }
    #blab input[type=range]::-webkit-slider-thumb{ width:26px; height:26px; }
    .projBtn, #projectPanel .footer button, .templateBtn, #startActions button, #studio .actions button, #studio .close, #blab button{
      min-height:42px; padding:11px 14px; font-size:12.5px; }
    .projMain input, .customTemplate input{ min-height:42px; }
  }

  /* Stylus diagnostics panel — small, live, and deliberately boring: artists
     can confirm pressure/tilt/barrel-button data without leaving the canvas. */
  #stylusPanel{ position:fixed; z-index:66; right:14px; top:14px; width:min(360px, calc(100vw - 28px)); display:none;
    padding:18px; border-radius:20px; color:var(--text);
    background:linear-gradient(160deg, rgba(247,202,201,.18), rgba(20,0,14,.62));
    border:1px solid rgba(247,202,201,.30);
    box-shadow:0 18px 44px rgba(10,0,10,.55), inset 0 1px 0 rgba(255,240,243,.30); }
  #stylusPanel.show{ display:block; }
  #stylusPanel .hdr{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  #stylusPanel b{ letter-spacing:.14em; text-transform:uppercase; font-size:12px; color:var(--blush); }
  #stylusPanel button{ font:inherit; color:var(--text); background:rgba(255,240,243,.06); border:1px solid rgba(247,202,201,.30);
    padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
  #stylusReadout{ font-size:12px; line-height:1.65; color:var(--dim); font-variant-numeric:tabular-nums; }
  #stylusReadout span{ color:var(--text); }

  /* Help overlay — compact user manual for the now-powerful tablet workflow. */
  #helpPanel{ position:fixed; inset:0; z-index:64; display:none; align-items:center; justify-content:center; padding:24px;
    background:rgba(10,0,10,.58); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  #helpPanel.show{ display:flex; }
  #helpPanel .card{ width:min(860px, calc(100vw - 28px)); max-height:calc(100vh - 42px); overflow:auto;
    padding:26px; border-radius:26px; color:var(--text);
    background:linear-gradient(160deg, rgba(247,202,201,.18), rgba(20,0,14,.64));
    border:1px solid rgba(247,202,201,.30); box-shadow:0 24px 70px rgba(10,0,10,.62), inset 0 1px 0 rgba(255,240,243,.35); }
  #helpPanel h2{ font-family:var(--font-display); letter-spacing:.16em; font-size:24px; margin:0 0 4px;
    background:linear-gradient(180deg,#fff,var(--rose)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #helpPanel .tag{ color:var(--dim); font-size:10px; letter-spacing:.22em; text-transform:uppercase; margin-bottom:14px; }
  #helpPanel .helpGrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:10px; text-align:left; }
  #helpPanel section{ padding:12px; border-radius:16px; background:rgba(255,240,243,.06); border:1px solid rgba(247,202,201,.18); }
  #helpPanel h3{ margin:0 0 8px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--text); }
  #helpPanel ul{ margin:0; padding-left:18px; color:var(--dim); font-size:12px; line-height:1.55; }
  #helpPanel li{ margin:3px 0; }
  #helpPanel code{ font-family:var(--font-mono); color:var(--text); background:rgba(10,0,10,.28); padding:1px 5px; border-radius:6px; }
  #helpPanel .actions{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:16px; }
  #helpPanel button{ font:inherit; color:var(--text); background:rgba(255,240,243,.06); border:1px solid rgba(247,202,201,.30);
    padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
  #helpPanel button.primary{ background:linear-gradient(160deg,var(--accent-deep),var(--accent)); border-color:var(--rim); }

  /* ===== Node-graph connector wires ===== */
  #wires{ position:fixed; inset:0; z-index:18; pointer-events:none; width:100%; height:100%; }
  #wires path.glow{ stroke:var(--rose); stroke-width:6; fill:none; stroke-linecap:round; opacity:.16; filter:blur(3px); }
  #wires path.core{ stroke:var(--blush); stroke-width:1.6; fill:none; stroke-linecap:round; opacity:.55;
    stroke-dasharray:2 8; animation:flow 1.3s linear infinite; }
  #wires circle.tip{ fill:var(--blush); opacity:.6; }
  #wires circle.pulse{ fill:#fff; filter:drop-shadow(0 0 6px var(--rose)) drop-shadow(0 0 12px var(--accent)); }
  @keyframes flow{ to{ stroke-dashoffset:-20; } }

  /* layer that holds torn-off / pinned tool circles (no transformed ancestor) */
  /* Nolan: physical film-rail scrubber — time you can grab, mounted under the canvas */
  /* Timeline scrubber. Was a nearly-hidden hint strip (bottom:-26px); now a
     proper first-class band at the bottom of the stage that shows every
     frame as a segment you can grab, held frames wide + accented, an
     always-visible playhead, and prev/next buttons that step frame-by-frame. */
  #rail{ position:absolute; left:14px; right:14px; bottom:6px; height:44px; border-radius:22px;
    display:flex; align-items:center; padding:0 12px; gap:8px;
    background:linear-gradient(180deg, rgba(20,0,14,.42), rgba(20,0,14,.28));
    border:1px solid rgba(247,202,201,.22);
    box-shadow:inset 0 1px 0 rgba(255,240,243,.18), 0 6px 22px rgba(10,0,10,.32);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    touch-action:none; cursor:pointer; z-index:6; }
  #railTrack{ position:relative; flex:1; height:14px; border-radius:9px;
    background:linear-gradient(90deg, rgba(255,240,243,.10), rgba(255,240,243,.18));
    box-shadow:inset 0 1px 3px rgba(10,0,10,.4);
    border:1px solid rgba(247,202,201,.20); }
  #railTrack .seg{ position:absolute; top:2px; height:10px; border-radius:5px;
    background:rgba(255,240,243,.10);
    border-right:1px solid rgba(42,0,26,.55); box-sizing:border-box; }
  #railTrack .seg.held{ background:linear-gradient(90deg, rgba(187,0,55,.36), rgba(247,202,201,.24));
    box-shadow:inset 0 0 6px rgba(255,150,190,.5); }
  #railTrack .seg.sel{ background:linear-gradient(90deg, rgba(255,255,255,.34), rgba(247,202,201,.22));
    box-shadow:inset 0 0 0 1px var(--rim), 0 0 8px rgba(255,255,255,.22); }
  #railTrack .bead{ position:absolute; top:50%; width:5px; height:5px; margin:-2.5px 0 0 -2.5px; border-radius:50%;
    background:var(--rose); opacity:.55; transition:opacity .18s, transform .18s; }
  #railTrack .bead.sel{ opacity:1; transform:scale(1.45); background:#fff; box-shadow:0 0 8px var(--rim); }
  #railTrack .bead.on{ opacity:1; transform:scale(1.7); background:var(--blush);
    box-shadow:0 0 8px var(--accent); }
  #playhead{ position:absolute; top:50%; width:20px; height:20px; margin:-10px 0 0 -10px; border-radius:50%;
    background:linear-gradient(160deg,var(--blush),var(--accent));
    border:2px solid var(--rim);
    box-shadow:0 0 14px var(--accent), inset 0 1px 0 var(--rim), 0 3px 8px rgba(10,0,10,.5);
    pointer-events:none; z-index:2; transition:transform .05s; }
  /* Prev / next frame buttons: sit on the rail either side of the track. */
  .railStep{ flex:0 0 auto; width:32px; height:32px; border-radius:50%;
    background:rgba(247,202,201,.12); border:1px solid rgba(247,202,201,.28);
    color:var(--text); font-size:0; display:flex; align-items:center; justify-content:center;
    cursor:pointer; touch-action:none; transition:transform .1s, background .2s; }
  .railStep:active{ transform:scale(.92); background:rgba(247,202,201,.24); }
  .railStep svg{ width:16px; height:16px; fill:none; stroke:var(--text); stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  /* Frame counter tucked to the right of the last step button. */
  #railCount{ flex:0 0 auto; min-width:52px; text-align:center;
    font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;
    color:var(--dim); font-variant-numeric:tabular-nums; text-shadow:var(--label-shadow); }
  /* Loop range visualization (existing feature -- restyled to match). */
  #loopRegion{ position:absolute; top:2px; height:10px; border-radius:5px; display:none;
    background:linear-gradient(90deg, rgba(187,0,55,.38), rgba(247,202,201,.48));
    box-shadow:0 0 10px var(--accent); z-index:1; }
  #rail.looping #loopRegion, #rail.looping .loophandle{ display:block; }
  .loophandle{ position:absolute; top:50%; width:12px; height:22px; margin:-11px 0 0 -6px; border-radius:5px; display:none;
    background:linear-gradient(160deg,var(--blush),var(--accent-deep)); border:1px solid var(--rim);
    box-shadow:0 0 8px var(--accent); z-index:3; pointer-events:auto; cursor:ew-resize; }
  .loophandle::after{ content:""; position:absolute; left:50%; top:6px; width:1px; height:10px; margin-left:-.5px;
    background:rgba(255,240,243,.7); box-shadow:2px 0 0 rgba(255,240,243,.5),-2px 0 0 rgba(255,240,243,.5); }
  body.zen #rail{ opacity:.65; }
  /* Collapse-all button — a small fixed glass orb, bottom-right */
  #collapseBtn{ position:fixed; right:18px; bottom:18px; z-index:24; width:52px; height:52px; border-radius:50%;
    border:1px solid var(--rim); cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:#fff; opacity:0; transform:scale(.6); pointer-events:none;
    transition:opacity .3s ease, transform .3s cubic-bezier(.2,.95,.25,1.1); padding:0; }
  #collapseBtn.show{ opacity:.92; transform:scale(1); pointer-events:auto; }
  #collapseBtn:active{ transform:scale(.9); }
  #collapseBtn svg{ width:24px; height:24px; fill:none; stroke:#fff; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  /* a kid that is near enough to a node snaps a faint halo to invite re-linking */
  .kid.relinking, .kidwrap.relinking{ box-shadow:0 0 22px 4px var(--accent), 0 0 40px var(--rose) !important; }
  #pinLayer{ position:fixed; inset:0; z-index:21; pointer-events:none; }
  #pinLayer .kid{ pointer-events:auto; }

  /* tiny cut handles on each wire midpoint */
  #cuts{ position:fixed; inset:0; z-index:19; pointer-events:none; }
  .cut{ position:absolute; width:16px; height:16px; margin:-8px 0 0 -8px; border-radius:50%; pointer-events:auto;
    cursor:pointer; background:radial-gradient(circle at 50% 40%, rgba(255,240,243,.9), rgba(187,0,55,.7));
    border:1px solid var(--rim); box-shadow:0 0 8px rgba(255,150,190,.6); opacity:.0; transition:opacity .25s, transform .12s; }
  #cuts.show .cut{ opacity:.55; }
  .cut:hover, .cut:active{ opacity:1 !important; transform:scale(1.25); }
  .cut::before{ content:"✂"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:9px; color:#3a0018; }

  /* ===== Canvas corner scale handles ===== */
  .chandle{ position:absolute; width:26px; height:26px; z-index:12; pointer-events:auto; cursor:nwse-resize;
    border:2px solid var(--rim); border-radius:8px; background:rgba(247,202,201,.12);
    box-shadow:0 0 12px rgba(255,150,190,.4); opacity:.65; transition:opacity .2s, transform .1s; touch-action:none; }
  .chandle:hover,.chandle:active{ opacity:1; transform:scale(1.12); }
  .chandle.tl{ top:-13px; left:-13px; border-right:none; border-bottom:none; border-radius:10px 0 0 0; cursor:nwse-resize;}
  .chandle.tr{ top:-13px; right:-13px; border-left:none; border-bottom:none; border-radius:0 10px 0 0; cursor:nesw-resize;}
  .chandle.bl{ bottom:-13px; left:-13px; border-right:none; border-top:none; border-radius:0 0 0 10px; cursor:nesw-resize;}
  .chandle.br{ bottom:-13px; right:-13px; border-left:none; border-top:none; border-radius:0 0 10px 0; cursor:nwse-resize;}
  /* side handles — reshape one axis (changes aspect, like sizing the negative) */
  .shandle{ position:absolute; z-index:12; pointer-events:auto; border:2px solid var(--rim);
    background:rgba(247,202,201,.12); box-shadow:0 0 12px rgba(255,150,190,.4); opacity:.55;
    transition:opacity .2s, transform .1s; touch-action:none; border-radius:8px; }
  .shandle:hover,.shandle:active{ opacity:1; transform:scale(1.08); }
  .shandle.n,.shandle.s{ left:50%; width:46px; height:14px; margin-left:-23px; cursor:ns-resize; }
  .shandle.e,.shandle.w{ top:50%; width:14px; height:46px; margin-top:-23px; cursor:ew-resize; }
  .shandle.n{ top:-9px; } .shandle.s{ bottom:-9px; } .shandle.e{ right:-9px; } .shandle.w{ left:-9px; }

  /* Hint toast -- uses the theme's --text so it flips light/dark automatically.
     Background is a translucent "opposite" so it always has enough contrast:
     dark themes get a dark bubble, pale themes get a light bubble. Neither
     side wins by accident. */
  .hint{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:40; font-size:12px; letter-spacing:.06em;
    color:var(--text); background:color-mix(in srgb, var(--violet) 72%, transparent);
    padding:7px 16px; border-radius:16px; border:1px solid var(--stroke); font-weight:700;
    text-shadow:var(--label-shadow); pointer-events:none; opacity:0; transition:opacity .4s; backdrop-filter:blur(8px); }

  /* Export overlay — GIF encoding is offloaded to a worker; this shows progress. */
  #expo{ position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
    background:radial-gradient(60% 60% at 50% 50%, rgba(42,0,26,.72), rgba(10,0,10,.88));
    backdrop-filter:blur(6px); }
  #expo.show{ display:flex; }
  #expo .card{ min-width:260px; padding:22px 26px; border-radius:22px; text-align:center;
    background:rgba(247,202,201,.08); border:1px solid var(--stroke); color:var(--text);
    box-shadow:var(--shadow), inset 0 1px 0 var(--rim); }
  #expo .lbl{ font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
  #expo .msg{ font-size:15px; margin-bottom:14px; }
  #expo .bar{ position:relative; width:220px; height:6px; margin:0 auto 14px; border-radius:6px;
    background:rgba(247,202,201,.14); overflow:hidden; }
  #expo .fill{ position:absolute; inset:0 auto 0 0; width:0%; border-radius:6px;
    background:linear-gradient(90deg, var(--rose), var(--accent)); transition:width .18s ease; }
  #expo button{ font:inherit; color:#fff; background:transparent; border:1px solid var(--stroke);
    padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer; opacity:.9; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
  #expo button:hover{ opacity:1; }

  /* Brush Lab -- floating panel opened via long-press on a brush kid. */
  #blab{ position:fixed; z-index:65; display:none; min-width:290px; max-width:360px;
    max-height:calc(100vh - 24px); overflow:auto;
    padding:18px 20px 16px; border-radius:22px; color:var(--text);
    background:rgba(20,0,14,.78); border:1px solid var(--stroke);
    box-shadow:var(--shadow), inset 0 1px 0 var(--rim);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  #blab.show{ display:block; }
  #blab .hdr{ display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px; font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--dim); }
  #blab .hdr b{ color:var(--blush); font-weight:500; letter-spacing:.14em; }
  #blab .row{ display:flex; align-items:center; gap:10px; margin:9px 0; }
  #blab .lbl{ flex:0 0 74px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  #blab .val{ flex:0 0 40px; font-size:13px; text-align:right; font-variant-numeric:tabular-nums;
    color:var(--blush); }
  #blab input[type=range]{ flex:1; -webkit-appearance:none; appearance:none;
    height:6px; border-radius:6px; margin:0; touch-action:none;
    background:linear-gradient(90deg, var(--accent-deep), var(--rose));

  #blab input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none;
    width:20px; height:20px; border-radius:50%;

  #blab input[type=range]::-moz-range-thumb{ width:20px; height:20px; border-radius:50%;
    background:linear-gradient(160deg,var(--blush),var(--accent));
    border:1.5px solid var(--rim); box-shadow:0 0 10px var(--accent); cursor:pointer; }
  #blab .preview{ margin:8px 0 14px; height:56px; border-radius:14px; overflow:hidden;

  #blab .preview canvas{ display:block; width:100%; height:100%; }
  #blab .lib{ margin-top:12px; padding-top:10px; border-top:1px solid rgba(247,202,201,.18); }
  #blab .libHdr{ display:flex; align-items:center; justify-content:space-between; gap:8px;

  .brushPreset{ display:grid; grid-template-columns:1fr auto; gap:6px; align-items:center;

  .brushPreset .mini{ display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
  #blab .btns{ display:flex; gap:8px; margin-top:12px; justify-content:flex-end; flex-wrap:wrap; }
  #blab button{ font:inherit; color:#fff; background:transparent; border:1px solid var(--stroke);
    padding:var(--btn-pad-y) var(--btn-pad-x); border-radius:var(--btn-radius); cursor:pointer; opacity:.9; font-size:12px;
