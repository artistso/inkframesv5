<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a001a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="InkFrame" />
<meta name="mobile-web-app-capable" content="yes" />
<!-- PWA manifest: makes "Install to Home Screen" work in real browsers.
     Ignored (harmlessly) inside the Android WebView shell where the page
     loads over file:// and there's no host to register against. -->
<link rel="manifest" href="manifest.webmanifest" />
<title>InkFrame · The Glass Horizon</title>
<style>
  :root{
    --accent:#bb0037; --accent-deep:#880057; --rose:#f7cac9; --blush:#fff0f3; --violet:#2a001a;
    --glass: rgba(247,202,201,0.12);
    --glass-strong: rgba(247,202,201,0.20);
    --stroke: rgba(247,202,201,0.40);
    --rim: rgba(255,240,243,0.6);
    --text:#fff0f3; --dim:#e8b9c6;
    --shadow: 0 14px 50px rgba(20,0,14,0.55);
    --bg: radial-gradient(120% 82% at 50% -12%, #ffd9e2 0%, #f7cac9 14%, #d77fa0 38%, #a52766 64%, #4d0a33 86%, #1a001a 100%);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent;
     /* Kill every browser default that stomps on stylus drawing: text selection
        highlight, iOS press-and-hold callout, image drag ghost, tap zoom. */
     -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
     -webkit-touch-callout:none; -webkit-user-drag:none; }
  html,body{ margin:0; height:100%; overflow:hidden; touch-action:none; overscroll-behavior:none;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--text); }
  /* Editable fields (colour picker, any future rename inputs) get selection back. */
  input,textarea,[contenteditable]{ -webkit-user-select:text; user-select:text; -webkit-touch-callout:default; }

  #bg{ position:fixed; inset:0; z-index:0; background:var(--bg); transition:background .6s ease; }
  #rays{ position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.42; mix-blend-mode:screen; filter:blur(2px);
    background:conic-gradient(from 200deg at 50% 0%, transparent 0deg, rgba(255,255,255,.35) 12deg, transparent 16deg,
      transparent 28deg, rgba(255,255,255,.22) 32deg, transparent 36deg,
      transparent 52deg, rgba(255,255,255,.30) 56deg, transparent 60deg); }
  #grain{ position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  #vignette{ position:fixed; inset:0; z-index:3; pointer-events:none;
    background:radial-gradient(120% 92% at 50% 42%, transparent 55%, rgba(20,0,14,.55) 100%); }

  .glass{ background:linear-gradient(160deg, var(--glass-strong), var(--glass));
    backdrop-filter:blur(20px) saturate(150%); -webkit-backdrop-filter:blur(20px) saturate(150%);
    border:1px solid var(--stroke); box-shadow:var(--shadow), inset 0 1px 0 var(--rim), inset 0 0 30px rgba(255,240,243,.06); }

  #title{ position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:5; text-align:center; pointer-events:none; transition:opacity .4s; }
  #title h1{ margin:0; font-family:"Cinzel",Georgia,serif; font-weight:600; font-size:20px; letter-spacing:.26em; text-transform:uppercase;
    background:linear-gradient(180deg,#fff,var(--rose) 55%,var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 16px rgba(255,255,255,.25); }
  #title .sub{ font-size:9px; letter-spacing:.42em; text-transform:uppercase; color:var(--dim); opacity:.75; margin-top:3px; }

  /* The Lens — a live glass nib cursor floating at the pen tip */
  #lens{ position:fixed; left:0; top:0; width:0; height:0; z-index:23; pointer-events:none;
    opacity:0; transform:translate(-50%,-50%); transition:opacity .14s ease; }
  #lens.show{ opacity:1; }
  #lens svg{ position:absolute; left:-50px; top:-50px; width:100px; height:100px; overflow:visible;
    filter:drop-shadow(0 2px 6px rgba(42,0,26,.5)); }
  #lens #lensRing{ fill:rgba(247,202,201,.06); stroke:var(--rim); stroke-width:1.2;
    backdrop-filter:blur(2px); }
  #lens #lensNib{ stroke:rgba(255,240,243,.85); stroke-width:1; opacity:.92; }
  #glint{ position:fixed; inset:0; z-index:12; pointer-events:none; opacity:0;
    transition:opacity .25s ease; mix-blend-mode:screen; }
  #stage{ position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; }
  #frameGlass{ position:relative; padding:14px; border-radius:30px; }
  canvas#c{ display:block; background:#fff0f3; border-radius:16px; touch-action:none;
    box-shadow:0 0 0 1px rgba(20,0,14,.4), 0 18px 60px rgba(20,0,14,.6); }
  body.zen #title{ opacity:0; }
  body.zen #frameGlass{ padding:8px; border-radius:18px; }

  /* ===== Nodes (circles only — spiral out) ===== */
  .node{ position:fixed; z-index:20; will-change:transform; }
  .orb{ position:relative; width:58px; height:58px; border-radius:50%; cursor:grab; touch-action:none;
    display:flex; align-items:center; justify-content:center; transition:box-shadow .25s, transform .12s, background .2s; }
  .orb:active{ cursor:grabbing; }
  /* darker lens behind glyph guarantees legibility over the bright canvas */
  .orb::after{ content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle at 50% 42%, rgba(20,0,14,.34), rgba(20,0,14,0) 72%); }
  .orb .glyph{ position:relative; z-index:1; font-size:22px; color:#fff; font-weight:600; line-height:1;
    text-shadow:0 1px 3px rgba(0,0,0,.6), 0 0 10px rgba(0,0,0,.35); }
  /* custom SVG icons: drawn with the glass rim light, not pasted glyphs */
  .glyph svg{ width:26px; height:26px; display:block; overflow:visible; }
  .kid .glyph svg{ width:21px; height:21px; }
  .glyph svg path, .glyph svg circle, .glyph svg line, .glyph svg polyline, .glyph svg rect{
    fill:none; stroke:#fff; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.55)); vector-effect:non-scaling-stroke; }
  .glyph svg .fill{ fill:#fff; stroke:none; }
  .glyph svg .soft{ opacity:.5; }
  .orb .lbl{ position:absolute; top:62px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--dim); white-space:nowrap; pointer-events:none; transition:opacity .2s;
    text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .node.open > .orb .lbl{ opacity:0; }
  .node.dragging > .orb, .node.dragging .orb{ box-shadow:var(--shadow), 0 0 26px rgba(255,255,255,.4), inset 0 1px 0 var(--rim); }
  .node.dragging{ --glass:rgba(247,202,201,0.30); --glass-strong:rgba(247,202,201,0.42); }
  .node.open > .orb{ box-shadow:var(--shadow), 0 0 22px rgba(187,0,55,.5), inset 0 1px 0 var(--rim); }

  /* child container: zero-size anchor at orb centre; kids fan out via transforms */
  .kids{ position:absolute; left:29px; top:29px; width:0; height:0; z-index:-1; }
  .kid{ position:absolute; left:0; top:0; width:48px; height:48px; margin:-24px 0 0 -24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transform:translate(0,0) scale(.35); opacity:0; pointer-events:none;
    transition:transform .34s cubic-bezier(.2,.95,.25,1.1), opacity .24s ease; }
  .node.open > .kids > .kid, .branch.open > .kids > .kid{ opacity:1; pointer-events:auto;
    transform:translate(var(--dx,0), var(--dy,0)) scale(1); }
  .kid::after{ content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle at 50% 42%, rgba(20,0,14,.30), rgba(20,0,14,0) 72%); }
  .kid .glyph{ position:relative; z-index:1; font-size:18px; color:#fff; font-weight:600;
    text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .kid.on{ background:linear-gradient(160deg, var(--accent), var(--accent-deep)) !important; border-color:var(--rim) !important;
    box-shadow:0 0 18px rgba(187,0,55,.6), inset 0 1px 0 var(--rim) !important; }
  .kid .sub{ position:absolute; top:50px; left:50%; transform:translateX(-50%); font-size:8px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--dim); white-space:nowrap; pointer-events:none; text-shadow:0 1px 2px rgba(0,0,0,.6); }

  /* dial gauge ring */
  .kid.dial .ring{ position:absolute; inset:-3px; border-radius:50%; pointer-events:none;
    background:conic-gradient(var(--accent) calc(var(--p,40)*1%), rgba(247,202,201,.16) 0);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px)); }
  .kid.dial .glyph{ font-size:13px; }

  /* swatch / colour kids */
  .kid.swatch{ border:2px solid rgba(255,240,243,.25); }
  .kid.swatch.sel{ border-color:var(--blush); box-shadow:0 0 14px rgba(255,255,255,.8); }
  .kid input[type=color]{ position:absolute; inset:0; opacity:0; width:100%; height:100%; border:none; cursor:pointer; }

  /* theme preview kids show a colour ring */
  .kid.theme .glyph{ display:none; }
  .kid.theme .ring{ position:absolute; inset:4px; border-radius:50%; }
  .kid.theme.sel{ box-shadow:0 0 16px rgba(255,255,255,.85); border:2px solid var(--blush); }

  /* studio overlay — soft glow, no box */
  #studio{ position:fixed; inset:0; z-index:45; display:none; align-items:center; justify-content:center; text-align:center; padding:30px; }
  #studio.show{ display:flex; }
  #studio .glow{ max-width:440px; padding:40px; border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(20,0,14,.6), rgba(20,0,14,0) 72%); }
  #studio h2{ font-family:"Cinzel",Georgia,serif; letter-spacing:.18em; font-size:22px; margin:0 0 14px;
    background:linear-gradient(180deg,#fff,var(--rose)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #studio p{ font-size:14px; line-height:1.7; color:var(--blush); margin:0 0 10px; }
  #studio .mute{ color:var(--dim); font-size:12px; letter-spacing:.1em; }

  /* ===== Node-graph connector wires ===== */
  #wires{ position:fixed; inset:0; z-index:18; pointer-events:none; width:100%; height:100%; }
  #wires path.glow{ stroke:var(--rose); stroke-width:6; fill:none; stroke-linecap:round; opacity:.16; filter:blur(3px); }
  #wires path.core{ stroke:var(--blush); stroke-width:1.6; fill:none; stroke-linecap:round; opacity:.55;
    stroke-dasharray:2 8; animation:flow 1.3s linear infinite; }
  #wires circle.tip{ fill:var(--blush); opacity:.6; }
  #wires circle.pulse{ fill:#fff; filter:drop-shadow(0 0 6px var(--rose)) drop-shadow(0 0 12px var(--accent)); }
  @keyframes flow{ to{ stroke-dashoffset:-20; } }

  /* layer that holds torn-off / pinned tool circles (no transformed ancestor) */
  /* Nolan: physical film-rail scrubber — time you can grab, mounted under the canvas */
  #rail{ position:absolute; left:14px; right:14px; bottom:-26px; height:30px; border-radius:18px;
    display:flex; align-items:center; padding:0 16px; touch-action:none; cursor:pointer; z-index:6; }
  #railTrack{ position:relative; flex:1; height:4px; border-radius:3px;
    background:linear-gradient(90deg, rgba(255,240,243,.18), rgba(255,240,243,.30)); }
  #railTrack .seg{ position:absolute; top:50%; height:4px; margin-top:-2px; border-radius:3px;
    background:rgba(255,240,243,.10); border-right:1px solid rgba(42,0,26,.5); box-sizing:border-box; }
  #railTrack .seg.held{ background:linear-gradient(90deg, rgba(187,0,55,.30), rgba(247,202,201,.18));
    box-shadow:inset 0 0 5px rgba(255,150,190,.4); }
  #railTrack .bead{ position:absolute; top:50%; width:9px; height:9px; margin:-4.5px 0 0 -4.5px; border-radius:50%;
    background:var(--rose); opacity:.55; box-shadow:0 0 5px rgba(255,150,190,.5); transition:opacity .2s, transform .2s; }
  #railTrack .bead.on{ opacity:1; transform:scale(1.4); background:var(--blush); }
  #playhead{ position:absolute; top:50%; width:16px; height:16px; margin:-8px 0 0 -8px; border-radius:50%;
    background:linear-gradient(160deg,var(--blush),var(--accent)); border:1.5px solid var(--rim);
    box-shadow:0 0 12px var(--accent), inset 0 1px 0 var(--rim); pointer-events:none; z-index:2; transition:transform .05s; }
  /* Nolan: in/out loop range — a lit beat you can isolate and repeat */
  #loopRegion{ position:absolute; top:50%; height:8px; margin-top:-4px; border-radius:4px; display:none;
    background:linear-gradient(90deg, rgba(187,0,55,.32), rgba(247,202,201,.42)); box-shadow:0 0 8px var(--accent); z-index:1; }
  #rail.looping #loopRegion, #rail.looping .loophandle{ display:block; }
  .loophandle{ position:absolute; top:50%; width:11px; height:18px; margin:-9px 0 0 -5.5px; border-radius:4px; display:none;
    background:linear-gradient(160deg,var(--blush),var(--accent-deep)); border:1px solid var(--rim);
    box-shadow:0 0 8px var(--accent); z-index:3; pointer-events:auto; cursor:ew-resize; }
  .loophandle::after{ content:""; position:absolute; left:50%; top:4px; width:1px; height:10px; margin-left:-.5px;
    background:rgba(255,240,243,.7); box-shadow:2px 0 0 rgba(255,240,243,.5),-2px 0 0 rgba(255,240,243,.5); }
  body.zen #rail{ bottom:-22px; }
  /* Collapse-all button — a small fixed glass orb, bottom-right */
  #collapseBtn{ position:fixed; right:18px; bottom:18px; z-index:24; width:52px; height:52px; border-radius:50%;
    border:1px solid var(--rim); cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:#fff; opacity:0; transform:scale(.6); pointer-events:none;
    transition:opacity .3s ease, transform .3s cubic-bezier(.2,.95,.25,1.1); padding:0; }
  #collapseBtn.show{ opacity:.92; transform:scale(1); pointer-events:auto; }
  #collapseBtn:active{ transform:scale(.9); }
  #collapseBtn svg{ width:24px; height:24px; fill:none; stroke:#fff; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  /* a kid that is near enough to a node snaps a faint halo to invite re-linking */
  .kid.relinking, .kidwrap.relinking{ box-shadow:0 0 22px 4px var(--accent), 0 0 40px var(--rose) !important; }
  #pinLayer{ position:fixed; inset:0; z-index:21; pointer-events:none; }
  #pinLayer .kid{ pointer-events:auto; }

  /* tiny cut handles on each wire midpoint */
  #cuts{ position:fixed; inset:0; z-index:19; pointer-events:none; }
  .cut{ position:absolute; width:16px; height:16px; margin:-8px 0 0 -8px; border-radius:50%; pointer-events:auto;
    cursor:pointer; background:radial-gradient(circle at 50% 40%, rgba(255,240,243,.9), rgba(187,0,55,.7));
    border:1px solid var(--rim); box-shadow:0 0 8px rgba(255,150,190,.6); opacity:.0; transition:opacity .25s, transform .12s; }
  #cuts.show .cut{ opacity:.55; }
  .cut:hover, .cut:active{ opacity:1 !important; transform:scale(1.25); }
  .cut::before{ content:"✂"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:9px; color:#3a0018; }

  /* ===== Canvas corner scale handles ===== */
  .chandle{ position:absolute; width:26px; height:26px; z-index:12; pointer-events:auto; cursor:nwse-resize;
    border:2px solid var(--rim); border-radius:8px; background:rgba(247,202,201,.12);
    box-shadow:0 0 12px rgba(255,150,190,.4); opacity:.65; transition:opacity .2s, transform .1s; touch-action:none; }
  .chandle:hover,.chandle:active{ opacity:1; transform:scale(1.12); }
  .chandle.tl{ top:-13px; left:-13px; border-right:none; border-bottom:none; border-radius:10px 0 0 0; cursor:nwse-resize;}
  .chandle.tr{ top:-13px; right:-13px; border-left:none; border-bottom:none; border-radius:0 10px 0 0; cursor:nesw-resize;}
  .chandle.bl{ bottom:-13px; left:-13px; border-right:none; border-top:none; border-radius:0 0 0 10px; cursor:nesw-resize;}
  .chandle.br{ bottom:-13px; right:-13px; border-left:none; border-top:none; border-radius:0 0 10px 0; cursor:nwse-resize;}
  /* side handles — reshape one axis (changes aspect, like sizing the negative) */
  .shandle{ position:absolute; z-index:12; pointer-events:auto; border:2px solid var(--rim);
    background:rgba(247,202,201,.12); box-shadow:0 0 12px rgba(255,150,190,.4); opacity:.55;
    transition:opacity .2s, transform .1s; touch-action:none; border-radius:8px; }
  .shandle:hover,.shandle:active{ opacity:1; transform:scale(1.08); }
  .shandle.n,.shandle.s{ left:50%; width:46px; height:14px; margin-left:-23px; cursor:ns-resize; }
  .shandle.e,.shandle.w{ top:50%; width:14px; height:46px; margin-top:-23px; cursor:ew-resize; }
  .shandle.n{ top:-9px; } .shandle.s{ bottom:-9px; } .shandle.e{ right:-9px; } .shandle.w{ left:-9px; }

  .hint{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:40; font-size:12px; letter-spacing:.06em;
    color:#fff; background:rgba(20,0,14,.5); padding:7px 16px; border-radius:16px; border:1px solid var(--stroke);
    pointer-events:none; opacity:0; transition:opacity .4s; backdrop-filter:blur(8px); }

  /* Export overlay — GIF encoding is offloaded to a worker; this shows progress. */
  #expo{ position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
    background:radial-gradient(60% 60% at 50% 50%, rgba(42,0,26,.72), rgba(10,0,10,.88));
    backdrop-filter:blur(6px); }
  #expo.show{ display:flex; }
  #expo .card{ min-width:260px; padding:22px 26px; border-radius:22px; text-align:center;
    background:rgba(247,202,201,.08); border:1px solid var(--stroke); color:var(--text);
    box-shadow:var(--shadow), inset 0 1px 0 var(--rim); }
  #expo .lbl{ font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
  #expo .msg{ font-size:15px; margin-bottom:14px; }
  #expo .bar{ position:relative; width:220px; height:6px; margin:0 auto 14px; border-radius:6px;
    background:rgba(247,202,201,.14); overflow:hidden; }
  #expo .fill{ position:absolute; inset:0 auto 0 0; width:0%; border-radius:6px;
    background:linear-gradient(90deg, var(--rose), var(--accent)); transition:width .18s ease; }
  #expo button{ font:inherit; color:#fff; background:transparent; border:1px solid var(--stroke);
    padding:6px 14px; border-radius:14px; cursor:pointer; opacity:.85; }
  #expo button:hover{ opacity:1; }
</style>
</head>
<body>
<div id="bg"></div><div id="rays"></div><div id="grain"></div><div id="vignette"></div>
<div id="title"><h1>InkFrame</h1><div class="sub">The Glass Horizon</div></div>
<div id="stage"><div id="frameGlass" class="glass">
  <canvas id="c" width="1024" height="768"></canvas>
  <div class="chandle tl" data-h="tl"></div><div class="chandle tr" data-h="tr"></div>
  <div class="chandle bl" data-h="bl"></div><div class="chandle br" data-h="br"></div>
  <div class="shandle n"  data-s="n"></div><div class="shandle s" data-s="s"></div>
  <div class="shandle e"  data-s="e"></div><div class="shandle w" data-s="w"></div>
</div>
<div id="rail" class="glass"><div id="railTrack"><div id="loopRegion"></div><div id="loopIn" class="loophandle"></div><div id="loopOut" class="loophandle"></div></div><div id="playhead"></div></div>
</div>

<div id="studio" onclick="this.classList.remove('show')">
  <div class="glow">
    <h2>A Calm Studio</h2>
    <p><b>InkFrame</b> is a professional drawing &amp; animation studio.</p>
    <p>Free &amp; ad-free. No account. No data collected. No AI.</p>
    <p class="mute">Just you, your stylus, and a quiet place to create. Tap anywhere to return.</p>
  </div>
</div>

<div class="hint" id="hint"></div>
<div id="expo" role="dialog" aria-live="polite">
  <div class="card">
    <div class="lbl">Rendering GIF</div>
    <div class="msg" id="expoMsg">Preparing frames…</div>
    <div class="bar"><div class="fill" id="expoFill"></div></div>
    <button id="expoCancel" type="button">Cancel</button>
  </div>
</div>
<button id="collapseBtn" class="glass" title="Collapse all circles" aria-label="Collapse all circles"></button>

<!-- GIF encoder — pure JS, no deps. Loaded here so it's on window.GifEncoder
     for the main-thread fallback path (the WebView often blocks Worker() from
     file://; the export module tries the worker first and falls back to this). -->
<script src="gif-encoder.js"></script>

<script>
(function(){
  "use strict";

  // ===== Stylus-safe input hygiene =====
  // Even with the CSS above, WebViews and some browsers still fire text-selection,
  // context menus, and image-drag events on long pen presses. Cancel them at
  // capture so nothing downstream ever sees them. Real inputs get an escape.
  const OK_SELECT = new Set(['INPUT','TEXTAREA']);
  const isEditable = (el)=> el && (OK_SELECT.has(el.tagName) || el.isContentEditable);
  ['contextmenu','selectstart','dragstart','gesturestart','gesturechange','gestureend']
    .forEach(evt=>window.addEventListener(evt, e=>{
      if(isEditable(e.target)) return; e.preventDefault();
    }, {capture:true, passive:false}));
  // Kill iOS Safari double-tap zoom (touch-action:none covers most cases; this
  // catches very old WebKits and dev-tools remote surfaces).
  let _lastTap=0;
  document.addEventListener('touchend', e=>{
    if(isEditable(e.target)) return;
    const now=performance.now();
    if(now-_lastTap<350) e.preventDefault();
    _lastTap=now;
  }, {passive:false});

  const W0=1024,H0=768;          // default document size
  let W=W0,H=H0;                  // current document size (mutable: side handles reshape it)
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d',{willReadFrequently:true});

  // ===== Themes (8 color worlds) =====
  const themes=[

    document.querySelectorAll('.kidwrap.open').forEach(br=>{
      const a=ctr(br._anchor);

  // quadratic bézier control point: midpoint pushed perpendicular for a soft bow
  function curvePath(a,b,bowMul){
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
    const bow=Math.min(40, len*0.18)*(bowMul||1);  // gentle, proportional bow (parallax-scaled)
    const nx=-dy/len, ny=dx/len;                    // perpendicular
    const cxp=mx+nx*bow, cyp=my+ny*bow;
    return {d:`M${a.x.toFixed(1)},${a.y.toFixed(1)} Q${cxp.toFixed(1)},${cyp.toFixed(1)} ${b.x.toFixed(1)},${b.y.toFixed(1)}`,
            mid:{x:(a.x+2*cxp+b.x)/4, y:(a.y+2*cyp+b.y)/4}, cx:cxp, cy:cyp};
  }
  // A gentle light pulse runs along the wires when a node first opens (Spielberg "reveal").
  const pulses=new Map();           // parent element -> start timestamp
  const PULSE_DUR=640;              // ms for one travel from parent -> tip
  function firePulse(parent){ pulses.set(parent, performance.now()); startWires(); }
  const bezAt=(a,c,b,t)=>{ const u=1-t; return {x:u*u*a.x+2*u*t*c.x+t*t*b.x, y:u*u*a.y+2*u*t*c.y+t*t*b.y}; };
  // Parallax/momentum: each child tip eases toward its true target, trailing while dragging.
  const tipPos=new WeakMap();            // child element -> {x,y} smoothed position
  let lastVX=0, lastVY=0, lastFocus=null; // drag velocity, for the depth lean
  function tickWires(){
    const segs=collectSegs();
    if(segs.length){
      // estimate drag velocity from the active dragging node's orb centre
      const dn=document.querySelector('.node.dragging'); let vx=0,vy=0;
      if(dn){ const c=ctr(dn._orb); if(lastFocus){ vx=c.x-lastFocus.x; vy=c.y-lastFocus.y; } lastFocus=c; }
      else lastFocus=null;
      lastVX+=(vx-lastVX)*0.3; lastVY+=(vy-lastVY)*0.3;
      const moving=draggingAny;

      let h='';
      segs.forEach((s)=>{
        // smoothed (trailing) endpoint for depth feel
        let tp=tipPos.get(s.child);
        if(!tp){ tp={x:s.b.x,y:s.b.y}; tipPos.set(s.child,tp); }
        const ease = moving?0.32:0.55;
        tp.x+=(s.b.x-tp.x)*ease; tp.y+=(s.b.y-tp.y)*ease;
        // parallax lean: bow grows with drag speed, biased by perpendicular velocity sign
        const speed=Math.hypot(lastVX,lastVY);
        const bowMul=1 + Math.min(1.4, speed*0.05);
        const a=s.a, b={x:tp.x, y:tp.y};
        const c=curvePath(a,b,bowMul);
        const far = (s.parent && s.parent.classList && s.parent.classList.contains('kidwrap'))?' soft':'';
        h+=`<path class="glow${far}" d="${c.d}"/><path class="core" d="${c.d}"/><circle class="tip" cx="${b.x.toFixed(1)}" cy="${b.y.toFixed(1)}" r="2.2"/>`;
        s._mid=c.mid; s._c=c;
      });
      // travelling light pulses (node-open reveal): a bright bead glides each wire of the opened parent
      const now=performance.now();
      pulses.forEach((t0,parent)=>{
        const prog=(now-t0)/PULSE_DUR;
        if(prog>=1){ pulses.delete(parent); return; }
        segs.forEach(s=>{ if(s.parent!==parent||!s._c)return;
          const tt=prog<.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;   // easeInOut
          const p=bezAt(s.a,{x:s._c.cx,y:s._c.cy},{x:s._c.x,y:s._c.y},tt);
          const fade=Math.sin(prog*Math.PI);                         // brighten then dim
          h+=`<circle class="pulse" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${(3.4+2.6*fade).toFixed(1)}" opacity="${(0.9*fade).toFixed(2)}"/>`;
        });
      });
      wires.innerHTML=h;
      // rebuild cut handles at curve midpoints
      cuts.innerHTML='';
      segs.forEach((s)=>{ const d=document.createElement('div'); d.className='cut';
        d.style.left=s._mid.x+'px'; d.style.top=s._mid.y+'px'; d.title='Disconnect';
        d.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();severLink(s);});

    } else { wires.innerHTML=''; cuts.innerHTML=''; }
    // Keep ticking while dragging or while trailing tips are still settling; then stop
    // (the flowing dashes themselves are CSS-animated, so no idle JS loop is needed).
    const settling = segs.some(s=>{const tp=tipPos.get(s.child); return tp && (Math.abs(tp.x-s.b.x)>0.4||Math.abs(tp.y-s.b.y)>0.4);});

  function startWires(){ if(!wireRAF) wireRAF=requestAnimationFrame(tickWires); }

  // ===== Pin / tear-off system =====
  // Severing a link lifts that child circle out of its spiral into a free-floating,
  // draggable pin that keeps all its behaviour. It becomes its own root you can place
  // anywhere — a personal toolset. (Sub-of-sub branches carry their children along.)
  const pinLayer=document.createElement('div'); pinLayer.id='pinLayer'; document.body.appendChild(pinLayer);
  const RELINK_DIST=70;   // px from a parent orb at which a pin snaps home
  // distance from a free pin's centre to a parent node/branch's anchor centre
  function parentAnchor(p){ return ctr(p.classList.contains('kidwrap')?p._anchor:p._orb); }
  function nearestParent(cx,cy){
    let best=null,bd=RELINK_DIST;
    document.querySelectorAll('.node,.kidwrap').forEach(p=>{
      if(!p._kids||p._pinned) return; const a=parentAnchor(p); const d=Math.hypot(a.x-cx,a.y-cy);

  }
  function severLink(seg){
    const child=seg.child;

    child._pinned=true; child._home=home;

    child.classList.add('pinned');
    // place exactly where it was, then make draggable as a free pin

    child.style.transform='none'; child.style.opacity='1'; child.style.pointerEvents='auto';
    let px=r.left, py=r.top;
    const put=()=>child.style.transform=`translate3d(${px}px,${py}px,0)`; put();
    // reattach: drop the pin back into a parent's spiral, restoring kid behaviour
    child._reattach=(target)=>{

      child._pinned=false; delete child._home; delete child._reattach;
      child.classList.remove('pinned','relinking');

      child.style.transform=''; child.style.opacity=''; child.style.pointerEvents=''; child.style.zIndex='';

  function glyphNode(spec){ const g=document.createElement('span'); g.className='glyph';
    if(spec && spec[0]==='@'){ g.innerHTML=ICONS[spec.slice(1)]||''; }
    else g.textContent=spec; return g; }

  function orbEl(glyph,cls){ const o=document.createElement('div'); o.className='orb glass '+(cls||'');
    o.appendChild(glyphNode(glyph)); return o; }

  // Build a kid (child circle). spec: {glyph, cls, sub, build(el)}.  glyph "@name" => SVG icon.
  function kidEl(spec){ const k=document.createElement('div'); k.className='kid glass '+(spec.cls||'');
    if(spec.glyph!=null){ k.appendChild(glyphNode(spec.glyph)); }
    if(spec.sub){const s=document.createElement('span');s.className='sub';s.textContent=spec.sub;k.appendChild(s);}
    if(spec.build) spec.build(k);
    return k; }

  // Fan kids outward in an arc. Spacing follows the kid size so circles never overlap,
  // and the arc radius grows with count using a golden-ratio feel (Fibonacci-inspired):
  // each successive ring is the previous radius times ~1/φ of the remaining spread.
  const PHI=1.618033988749895;
  function layoutKids(branchEl, kidsWrap){
    const kids=[...kidsWrap.children].filter(k=>!k._pinned);
    const n=kids.length; if(!n) return;
    const rect=branchEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const base=Math.atan2(cy-window.innerHeight/2, cx-window.innerWidth/2); // point outward from screen centre

    // kid diameter (largest in the set) drives required angular spacing → no overlap.
    let kd=48; kids.forEach(k=>{ kd=Math.max(kd, k.getBoundingClientRect().width||48); });
    const pad=14;                              // breathing room between circles
    const need=kd+pad;                         // chord length we must leave between neighbours

    // Base radius on a Fibonacci-ish progression so denser sets bow out gracefully.
    // R is chosen so the chord for the angular step >= need.
    const spread=Math.min(Math.PI*1.15, 0.55*n + 0.6);   // total fan angle
    const step = n>1 ? spread/(n-1) : 0;
    // chord = 2R*sin(step/2) >= need  ->  R >= need / (2 sin(step/2))
    let R = n>1 ? need/(2*Math.sin(step/2)) : (kd+pad+34);
    R = Math.max(R, kd+pad+30);
    // golden easing of radius so it never grows absurd, but expands organically
    R = Math.min(R, 96 + 26*Math.log(n+1)*PHI);

    kids.forEach((k,i)=>{
      const ang = base + (i-(n-1)/2)*step;
      const dx=Math.cos(ang)*R, dy=Math.sin(ang)*R;
      k.style.setProperty('--dx',dx.toFixed(1)+'px');
      k.style.setProperty('--dy',dy.toFixed(1)+'px');
      k.style.transitionDelay=(i*26)+'ms';
    });
  }

  // Generic node (root, draggable, tap to toggle)
  function makeNode(opts){
    const node=document.createElement('div'); node.className='node';
    const orb=orbEl(opts.glyph); const lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent=opts.label; orb.appendChild(lbl);
    node.appendChild(orb);
    const kids=document.createElement('div'); kids.className='kids'; node.appendChild(kids);
    layer.appendChild(node);

    let x=opts.x, y=opts.y; const apply=()=>node.style.transform=`translate3d(${x}px,${y}px,0)`; apply();
    node._setPos=(nx,ny)=>{x=nx;y=ny;apply();};

    // drag vs tap
    let dn=null;
    orb.addEventListener('pointerdown',e=>{ e.preventDefault(); orb.setPointerCapture(e.pointerId);
      dn={sx:e.clientX,sy:e.clientY,ox:x,oy:y,moved:false}; node.style.zIndex=30; });
    orb.addEventListener('pointermove',e=>{ if(!dn)return; const dx=e.clientX-dn.sx,dy=e.clientY-dn.sy;
      if(!dn.moved&&Math.hypot(dx,dy)>6){dn.moved=true;node.classList.add('dragging');draggingAny=true;startWires();}
      if(dn.moved){ x=Math.max(6,Math.min(window.innerWidth-64,dn.ox+dx)); y=Math.max(6,Math.min(window.innerHeight-64,dn.oy+dy));
        node.style.transform=`translate3d(${x}px,${y}px,0)`;
        if(node.classList.contains('open')) layoutKids(orb,kids); } });
    orb.addEventListener('pointerup',()=>{ if(!dn)return;
      if(!dn.moved){ const willOpen=!node.classList.contains('open'); node.classList.toggle('open');

  // ===== Nolan: physical film-rail scrubber — drag the playhead to move through time =====
  const rail=$('rail'), railTrack=$('railTrack'), playhead=$('playhead');

  // Nolan: time made physical — a frame's rail width equals its hold duration.
  function ticksTotal(){ let s=0; for(let i=0;i<frames.length;i++) s+=hOf(i); return Math.max(1,s); }
  function tickStart(i){ let s=0; for(let j=0;j<i;j++) s+=hOf(j); return s; }

    setPlayheadFrac(playFrac!=null?playFrac:frameCenterFrac(cur));

  function buildRail(){
    [...railTrack.querySelectorAll('.bead, .seg')].forEach(b=>b.remove());
    const n=frames.length, tot=ticksTotal();

      const a=tickStart(i)/tot, w=hOf(i)/tot;
      const seg=document.createElement('div'); seg.className='seg';   // physical duration block
      seg.style.left=(a*100)+'%'; seg.style.width=(w*100)+'%';
      if(hOf(i)>1) seg.classList.add('held'); railTrack.appendChild(seg);
      const b=document.createElement('div'); b.className='bead'+(i===cur?' on':'');
      b.style.left=((a+w/2)*100)+'%'; railTrack.appendChild(b);

  // map an x position to a frame by its time-segment (so wide held frames are easier to hit)

  // scale/dimensions and let a single rAF loop paint at most once per frame.
  let resizeRAF=0;

    resizeRAF=requestAnimationFrame(()=>{ resizeRAF=0; fn(); });

  // Multi-touch on the canvas:
  //   • 2 fingers drag  → pinch-scale the canvas
  //   • 2-finger tap    → Undo      • 3-finger tap → Redo   (quick, little movement)
  const active=new Map(); let pinchBase=0, pinchScale0=1;
  let gStart=0, gMaxN=0, gMoved=false, gStartPts=[];
  function gAvgMove(){ // largest movement of any finger since gesture start
    let m=0, i=0; for(const e of active.values()){ const s=gStartPts[i++]; if(s) m=Math.max(m,Math.hypot(e.clientX-s.x,e.clientY-s.y)); } return m; }

    active.set(e.pointerId,e);

    gMaxN=Math.max(gMaxN,active.size);
    gStartPts=[...active.values()].map(p=>({x:p.clientX,y:p.clientY}));
    // A 2nd finger cancels a TOUCH stroke (intending a gesture). But if a PEN owns the
    // stroke, an extra touch is a resting palm → keep drawing, ignore the touch entirely.
    if(active.size>=2 && drawing && drawPidType!=='pen'){

  // ============================================================
  // Animated GIF export — offloaded to a Web Worker (gif-encoder.js)
  // ============================================================
  // Design:
  //   * The encoder lives in web/gif-encoder.js (a 1:1 JS port of the Kotlin
  //     reference in core-common/gif/*.kt). Loading it as a classic Worker keeps
  //     LZW compression + median-cut quantization off the main thread so the UI
  //     never stutters, even on 60+ frame timelines at 1024x768.
  //   * We build ARGB Int32Array pixel buffers per frame *once*, flattening the
  //     current frame over the paper background (matches PNG export behaviour),
  //     honour per-frame Hold ticks by repeating the delay proportionally, and
  //     stream them to the worker with a transferable ArrayBuffer so there's
  //     zero copy overhead.
  //   * Progress messages update the overlay in real time; Cancel terminates
  //     the worker mid-encode.
  const EXPORT = (() => {
    let worker = null;
    let cancelled = false;
    const overlay = document.getElementById('expo');
    const msgEl   = document.getElementById('expoMsg');
    const fillEl  = document.getElementById('expoFill');
    const cancelBtn = document.getElementById('expoCancel');

    function show(msg){ overlay.classList.add('show'); msgEl.textContent = msg; fillEl.style.width = '0%'; }
    function progress(done, total, phase){
      const pct = Math.round(done/total*100);
      fillEl.style.width = pct + '%';
      msgEl.textContent = `${phase} · ${done} / ${total}`;
    }
    function hide(){ overlay.classList.remove('show'); }

    cancelBtn.addEventListener('click', () => {
      cancelled = true;
      if (worker) { try { worker.terminate(); } catch(_){} worker = null; }
      hide();
      flash('Export cancelled');
    });

    /**
     * Flatten one frame (paper background + frame ink) into an ARGB Int32Array
     * of length width*height. Matches the PNG export composition so a single GIF
     * frame looks identical to the equivalent PNG.
     */
    function flattenFrame(frame, width, height) {
      const off = document.createElement('canvas');
      off.width = width; off.height = height;
      const g = off.getContext('2d');
      g.fillStyle = '#fff0f3';           // paper — matches render() clearRect fill
      g.fillRect(0, 0, width, height);
      // Accept both new {layers,...} frames and legacy raw canvases (v1 autosave).
      const fr = upgradeFrame(frame, width, height);
      g.drawImage(frameComposite(fr, width, height), 0, 0);
      const img = g.getImageData(0, 0, width, height);
      const src = img.data;              // Uint8ClampedArray, RGBA
      // Assemble a native little-endian ARGB Int32Array by hand so the
      // encoder's `(argb >>> 24) & 0xFF` alpha check works on every platform.
      const out = new Int32Array(width * height);
      for (let i = 0, j = 0; i < out.length; i++, j += 4) {
        const r = src[j], g2 = src[j+1], b = src[j+2], a = src[j+3];
        out[i] = ((a & 0xFF) << 24) | ((r & 0xFF) << 16) | ((g2 & 0xFF) << 8) | (b & 0xFF);
      }
      return out;
    }

    /**
     * Kick off a GIF export of the currently-active project.
     * Options are all optional; defaults match the Play/timeline settings.
     */
    async function exportAnimatedGif(opts = {}) {
      if (worker) { flash('Export already running'); return; }
      const P = projects[pi];
      if (!P || !P.frames.length) { flash('Nothing to export'); return; }

      cancelled = false;
      const width  = opts.width  || P.w || W;
      const height = opts.height || P.h || H;
      const activeFps = opts.fps || P.fps || fps || 12;
      // GIF timing is in centiseconds (1/100 s). Snap to an integer cs per frame
      // (the format has no finer resolution); a hold of N ticks multiplies that.
      const baseDelayCs = Math.max(2, Math.round(100 / activeFps));

      show('Preparing frames…');
      // Yield so the overlay actually paints before we start CPU work.
      await new Promise(r => requestAnimationFrame(r));
      await new Promise(r => setTimeout(r, 0));

      // Build all frame payloads on the main thread (needs DOM/canvas access).
      const framePayloads = [];
      for (let i = 0; i < P.frames.length; i++) {
        if (cancelled) return;
        const px = flattenFrame(P.frames[i], width, height);
        const hold = Math.max(1, Math.round((P.holds && P.holds[i]) || 1));
        framePayloads.push({ pixels: px.buffer, delayCs: baseDelayCs * hold });
        progress(i + 1, P.frames.length, 'Compositing');
        // Yield every few frames so the progress bar animates.
        if ((i & 3) === 3) await new Promise(r => setTimeout(r, 0));
      }
      if (cancelled) return;

      // Spin up the worker and hand off the frames as transferable buffers.
      // Skip Worker entirely on file:// (Android WebView blocks it) — the inline
      // path is fast enough for the timeline sizes users actually export.
      const isFileOrigin = location.protocol === 'file:';
      if (isFileOrigin) {
        return encodeInline(framePayloads, width, height, opts);
      }
      try {
        worker = new Worker('gif-encoder.js');
      } catch (e) {
        console.warn('[export] worker unavailable, running inline:', e);
        return encodeInline(framePayloads, width, height, opts);
      }

      worker.onmessage = (ev) => {
        const m = ev.data;
        if (m.type === 'progress') progress(m.frame, m.total, 'Encoding');
        else if (m.type === 'error') {
          console.error('[export] worker error:', m.message);
          flash('Export failed: ' + m.message);
          if (worker) { worker.terminate(); worker = null; }
          hide();
        } else if (m.type === 'done') {
          const blob = new Blob([m.bytes], { type: 'image/gif' });
          triggerDownload(blob, `inkframe-${Date.now()}.gif`);
          if (worker) { worker.terminate(); worker = null; }
          hide(); flash('Exported GIF · ' + humanBytes(m.bytes.byteLength));
        }
      };
      worker.onerror = (e) => {
        console.error('[export] worker crashed:', e);
        flash('Export crashed');
        if (worker) { worker.terminate(); worker = null; }
        hide();
      };

      const transferList = framePayloads.map(p => p.pixels);
      worker.postMessage({
        cmd: 'encode', width, height,
        frames: framePayloads,
        loop: opts.loop !== false,
        maxColors: opts.maxColors || 256,
      }, transferList);
    }

    // Inline (main-thread) fallback for environments that can't spawn a Worker.
    // Two paths: prefer the globally-loaded GifEncoder from the boot <script>
    // tag (works in the file:// WebView where fetch/Worker are both blocked);
    // fall back to fetching + evaluating the file if we're in a browser that
    // didn't preload the script for whatever reason.
    async function encodeInline(framePayloads, width, height, opts) {
      try {
        let Enc = (typeof window !== 'undefined') && window.GifEncoder;
        if (!Enc) {
          const src = await (await fetch('gif-encoder.js')).text();
          const factory = new Function(src + '\nreturn { GifEncoder };');
          Enc = factory().GifEncoder;
        }
        const enc = new Enc(width, height, {
          loop: opts.loop !== false, maxColorsPerFrame: opts.maxColors || 256,
        });
        for (let i = 0; i < framePayloads.length; i++) {
          if (cancelled) return;
          enc.addFrame(new Int32Array(framePayloads[i].pixels), framePayloads[i].delayCs);
          progress(i + 1, framePayloads.length, 'Encoding');
          if ((i & 1) === 1) await new Promise(r => setTimeout(r, 0));
        }
        const bytes = enc.finish();
        const blob = new Blob([bytes], { type: 'image/gif' });
        triggerDownload(blob, `inkframe-${Date.now()}.gif`);
        hide(); flash('Exported GIF · ' + humanBytes(bytes.byteLength));
      } catch (e) {
        console.error('[export] inline encode failed:', e);
        flash('Export failed: ' + e.message);
        hide();
      }
    }

    function triggerDownload(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 400);
    }
    function humanBytes(n){
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
      return (n/1048576).toFixed(1) + ' MB';
    }

    return { exportAnimatedGif };
  })();
  const exportAnimatedGif = EXPORT.exportAnimatedGif;

  // ============================================================
  // Autosave — IndexedDB persistence for the full session
  // ============================================================
  // Every project (frames + holds + fps + name + canvas size + active index) is
  // written into an IndexedDB store as PNG blobs (much smaller than raw ImageData
  // and cheap for Canvas 2D to re-decode into a fresh <canvas>).
  //
  // Writes happen a) 800 ms after each accepted stroke/edit and b) whenever the
  // page is hidden or unloaded — so a phone lock, an app switch, or an accidental
  // browser refresh never loses the last minute of work.
  //
  // On boot, if a snapshot exists, we rehydrate `projects[]` in place before the
  // first render. Failing gracefully is important: any error at any step just
  // falls back to a blank session (no user-facing crash).
  const AUTOSAVE = (() => {
    const DB_NAME = 'inkframe';
    const DB_VER  = 1;
    const STORE   = 'sessions';
    const KEY     = 'current';
    const SAVE_DELAY_MS = 800;

    // ---- IDB helpers (small hand-rolled wrapper; no deps) ----
    function openDB(){
      return new Promise((resolve,reject)=>{
        if(!('indexedDB' in window)){ reject(new Error('no idb')); return; }
        const req=indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded=()=>{
          const db=req.result;
          if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
        };
        req.onsuccess=()=>resolve(req.result);
        req.onerror =()=>reject(req.error);
      });
    }
    async function idbPut(value){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(STORE,'readwrite');
        tx.objectStore(STORE).put(value, KEY);
        tx.oncomplete=()=>{ db.close(); resolve(); };
        tx.onerror   =()=>{ db.close(); reject(tx.error); };
      });
    }
    async function idbGet(){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(STORE,'readonly');
        const rq=tx.objectStore(STORE).get(KEY);
        rq.onsuccess=()=>{ db.close(); resolve(rq.result||null); };
        rq.onerror  =()=>{ db.close(); reject(rq.error); };
      });
    }
    async function idbDel(){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(STORE,'readwrite');
        tx.objectStore(STORE).delete(KEY);
        tx.oncomplete=()=>{ db.close(); resolve(); };
        tx.onerror   =()=>{ db.close(); reject(tx.error); };
      });
    }

    // ---- Serialize a live projects[] into a plain, IDB-safe payload ----
    // Frames are captured as PNG Blobs (structured-cloneable) rather than
    // ImageData buffers, which would balloon storage 4x for the alpha channel.
    function frameToBlob(cnv){
      return new Promise(res=>{
        if(cnv.toBlob) cnv.toBlob(b=>res(b), 'image/png');
        else{
          // Fallback for the (very rare) contexts without HTMLCanvasElement.toBlob.
          const url=cnv.toDataURL('image/png');
          fetch(url).then(r=>r.blob()).then(res).catch(()=>res(null));
        }
      });
    }
    async function serialize(){
      // save scalar state into the currently-active project before snapshotting
      const p=projects[pi]; if(p){ p.cur=cur; p.fps=fps; p.w=W; p.h=H; }
      const payload={
        v:2, savedAt:Date.now(), pi,
        projects: await Promise.all(projects.map(async P=>({
          name:P.name||'Canvas', w:P.w, h:P.h, cur:P.cur||0, fps:P.fps||12,
          holds:(P.holds||P.frames.map(()=>1)).slice(),
          // v2: each frame is { active, layers:[{name,visible,opacity,blend,blob}] }.
          frames: await Promise.all(P.frames.map(async fr=>{
            const F = upgradeFrame(fr, P.w, P.h);
            return {
              active: F.active|0,
              layers: await Promise.all(F.layers.map(async L=>({
                name:L.name, visible:!!L.visible, opacity:+L.opacity, blend:L.blend||'source-over',
                blob: await frameToBlob(L.canvas),
              }))),
            };
          })),
        }))),
      };
      return payload;
    }

    // ---- Turn a stored payload back into live canvases ----
    function blobToCanvas(blob, w, h){
      return new Promise(res=>{
        if(!blob){ const c=document.createElement('canvas'); c.width=w; c.height=h; res(c); return; }
        const url=URL.createObjectURL(blob);
        const img=new Image();
        img.onload =()=>{ const c=document.createElement('canvas'); c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0); URL.revokeObjectURL(url); res(c); };
        img.onerror=()=>{ URL.revokeObjectURL(url); const c=document.createElement('canvas');
          c.width=w; c.height=h; res(c); };
        img.src=url;
      });
    }
    async function restore(payload){
      if(!payload || !payload.projects || !payload.projects.length) return false;
      const restored=[];
      for(const P of payload.projects){
        const w=P.w||W0, h=P.h||H0;
        // Accept both payload versions:
        //   v1: frames = [Blob, Blob, ...]                   (flat, pre-layers)
        //   v2: frames = [{active, layers:[{...,blob}]}, ...] (layer-aware)
        const fr = [];
        for(const item of P.frames){
          if(item && Array.isArray(item.layers)){
            const layers = await Promise.all(item.layers.map(async sL=>({
              id:__lid++, name:sL.name||'Layer',
              visible: sL.visible!==false,
              opacity: typeof sL.opacity==='number' ? sL.opacity : 1,
              blend: sL.blend || 'source-over',
              canvas: await blobToCanvas(sL.blob, w, h),
            })));
            if(!layers.length) layers.push(newLayer(w,h,'Layer 1'));
            fr.push({ layers, active: Math.min(item.active|0, layers.length-1),
                      _comp:null, _compV:-1, _v:0 });
          } else {
            const canvas = await blobToCanvas(item, w, h);
            fr.push({ layers:[{ id:__lid++, name:'Layer 1', visible:true, opacity:1,
                                blend:'source-over', canvas }], active:0,
                      _comp:null, _compV:-1, _v:0 });
          }
        }
        restored.push({
          frames: fr.length ? fr : [newFrame(w,h)],
          holds: (P.holds && P.holds.length===fr.length) ? P.holds.slice() : fr.map(()=>1),
          cur:   Math.min(Math.max(0, P.cur|0), Math.max(0, fr.length-1)),
          undo:  [], redo:[],
          w, h, fps:P.fps||12, name:P.name||'Canvas',
        });
      }
      // splice into the pre-existing projects array so all the outer aliases stay valid
      projects.length=0; for(const P of restored) projects.push(P);
      const targetPi = Math.min(Math.max(0, payload.pi|0), projects.length-1);
      useProject(targetPi);
      // update the top-level canvas element to match the restored project's size
      canvas.width=W; canvas.height=H;
      return true;
    }

    // ---- Debounced save + flush-on-hide/unload ----
    let scheduled=0, savingNow=false, lastSavedAt=0, lastError=null;
    async function flush(){
      if(savingNow) return;
      savingNow=true;
      try{
        const payload=await serialize();
        await idbPut(payload);
        lastSavedAt=payload.savedAt; lastError=null;
      }catch(e){
        lastError=e; console.warn('[autosave] failed', e);
      }finally{
        savingNow=false;
      }
    }
    function schedule(){
      if(scheduled) return;
      scheduled=setTimeout(()=>{ scheduled=0; flush(); }, SAVE_DELAY_MS);
    }
    function flushNow(){
      if(scheduled){ clearTimeout(scheduled); scheduled=0; }
      // fire-and-forget; the page may be unloading — the async tx will still complete
      flush();
    }

    // Hide/unload hooks: use both events for maximum coverage across browsers +
    // Android WebView (which fires 'pagehide' more reliably than 'beforeunload').
    document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushNow(); });
    window.addEventListener('pagehide', flushNow);
    window.addEventListener('beforeunload', flushNow);

    return {
      schedule, flushNow, restore,
      loadPayload: idbGet,
      clear: idbDel,
      status: ()=>({ lastSavedAt, savingNow, lastError }),
    };
  })();

  // Wire the autosave debounce into every place a project actually mutates.
  // These wrappers preserve the original callers' return values.
  (function hookAutosave(){
    const origPushU=pushU, origSetCur=setCur;
    // pushU fires at the tail of every accepted stroke, undo/redo, and clear — perfect trigger.
    pushU = function(s){ const r=origPushU(s); AUTOSAVE.schedule(); return r; };
    // setCur runs on frame-change and prev/next scrubs; cheap and worth persisting.
    setCur = function(i){ const r=origSetCur(i); AUTOSAVE.schedule(); return r; };
  })();

  // ---- Restore any saved session, THEN take the normal boot render path ----
  (async ()=>{
    try{
      const payload = await AUTOSAVE.loadPayload();
      if(payload){
        const ok = await AUTOSAVE.restore(payload);
        if(ok){
          // Rebuild the gallery + timeline UI against the restored data.
          rebuildGallery(); refreshFrames(); refreshActions();
          clampCanvas(); applyCanvas(); render();
          const mins=Math.max(1, Math.round((Date.now()-payload.savedAt)/60000));
          flash(`Restored · last saved ${mins} min ago`);
        }
      }
    }catch(e){ console.warn('[autosave] restore failed', e); }
  })();

  // Expose the autosave surface on window for debugging / a future Recover UI.
  //   window.INKFRAME_AUTOSAVE.status() -> {lastSavedAt, savingNow, lastError}
  //   window.INKFRAME_AUTOSAVE.clear()  -> wipe the IDB snapshot (returns Promise)
  window.INKFRAME_AUTOSAVE = AUTOSAVE;

  applyTheme(0); render(); refreshFrames(); refreshLayers(); refreshActions(); startWires();
  flash('Tap a circle to spiral open · double-tap canvas to collapse all · ◌ Studio');
})();
</script>
</body>
</html>
