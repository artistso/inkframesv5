name: Free Hugging Face Code Review

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Numeric GitHub Actions run ID to review
        required: true
        type: string
      focus:
        description: Optional narrow review focus
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: free-hf-review-${{ inputs.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: Review failed run with local Qwen coder
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_REPO: Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF
      MODEL_FILE: qwen2.5-coder-1.5b-instruct-q4_k_m.gguf
      LLAMA_VERSION: b10052
      CACHE_ROOT: ${{ github.workspace }}/.cache/inkframe-ai
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_DISABLE_UPDATE_CHECK: "1"

    steps:
      - name: Check out review tooling
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate requested run
        shell: bash
        env:
          REVIEW_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          if [[ ! "$REVIEW_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "run_id must contain only decimal digits" >&2
            exit 2
          fi

      - name: Collect failed diagnostics and source diff
        shell: bash
        env:
          REVIEW_RUN_ID: ${{ inputs.run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          mkdir -p ai-review/input ai-review/output

          gh run view "$REVIEW_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json name,displayTitle,event,headBranch,headSha,status,conclusion,url \
            > ai-review/input/run-metadata.json

          if ! gh run view "$REVIEW_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --log-failed \
            > ai-review/input/failed.log \
            2> ai-review/input/gh-run.stderr.log; then
            gh run view "$REVIEW_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --log \
              > ai-review/input/failed.log
          fi

          if [[ ! -s ai-review/input/failed.log ]]; then
            echo "The selected run exposed no job log." >&2
            exit 3
          fi

          REVIEW_SHA="$(python - <<'PY'
          import json
          with open('ai-review/input/run-metadata.json', encoding='utf-8') as handle:
              print(json.load(handle)['headSha'])
          PY
          )"

          git fetch --no-tags origin "$DEFAULT_BRANCH"
          git fetch --no-tags origin "$REVIEW_SHA" || true

          if ! git diff --no-ext-diff --unified=3 \
            "origin/$DEFAULT_BRANCH...$REVIEW_SHA" -- \
            '*.kt' '*.kts' '*.gradle' '*.toml' '*.yml' '*.yaml' \
            > ai-review/input/branch.diff; then
            {
              echo "Diff generation failed for $REVIEW_SHA against $DEFAULT_BRANCH."
              echo "The reviewer must rely on compiler and test diagnostics."
            } > ai-review/input/branch.diff
          fi

      - name: Restore free-model cache
        uses: actions/cache@v4
        with:
          path: .cache/inkframe-ai
          key: free-hf-qwen25-coder-15b-q4km-llama-b10052-v1

      - name: Install Hugging Face downloader
        run: python -m pip install --disable-pip-version-check --quiet "huggingface_hub>=0.27,<2"

      - name: Download public Qwen GGUF model
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CACHE_ROOT/huggingface"
          MODEL_PATH="$(python - <<'PY'
          import os
          from huggingface_hub import hf_hub_download

          print(
              hf_hub_download(
                  repo_id=os.environ['MODEL_REPO'],
                  filename=os.environ['MODEL_FILE'],
                  cache_dir=os.path.join(os.environ['CACHE_ROOT'], 'huggingface'),
                  token=False,
              )
          )
          PY
          )"
          test -s "$MODEL_PATH"
          echo "MODEL_PATH=$MODEL_PATH" >> "$GITHUB_ENV"

      - name: Install pinned llama.cpp CPU runtime
        shell: bash
        run: |
          set -euo pipefail
          LLAMA_ROOT="$CACHE_ROOT/llama.cpp/$LLAMA_VERSION"
          mkdir -p "$LLAMA_ROOT"

          LLAMA_CLI="$(find "$LLAMA_ROOT" -type f -name llama-cli -print -quit || true)"
          if [[ -z "$LLAMA_CLI" ]]; then
            ARCHIVE="$RUNNER_TEMP/llama-${LLAMA_VERSION}.tar.gz"
            URL="https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-ubuntu-x64.tar.gz"
            rm -rf "$LLAMA_ROOT"
            mkdir -p "$LLAMA_ROOT"
            curl --fail --location --retry 3 --retry-delay 2 \
              --output "$ARCHIVE" "$URL"
            tar -xzf "$ARCHIVE" -C "$LLAMA_ROOT"
            LLAMA_CLI="$(find "$LLAMA_ROOT" -type f -name llama-cli -print -quit)"
          fi

          test -n "$LLAMA_CLI"
          chmod +x "$LLAMA_CLI"
          echo "LLAMA_CLI=$LLAMA_CLI" >> "$GITHUB_ENV"
          echo "LLAMA_LIB_DIR=$(dirname "$LLAMA_CLI")" >> "$GITHUB_ENV"

      - name: Build bounded redacted review prompt
        shell: bash
        env:
          REVIEW_RUN_ID: ${{ inputs.run_id }}
          REVIEW_FOCUS: ${{ inputs.focus }}
        run: |
          set -euo pipefail
          python tools/ai-review/build_prompt.py \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$REVIEW_RUN_ID" \
            --focus "$REVIEW_FOCUS" \
            --log ai-review/input/failed.log \
            --diff ai-review/input/branch.diff \
            --output ai-review/input/prompt.txt

      - name: Run free local code reviewer
        id: inference
        shell: bash
        env:
          REVIEW_RUN_ID: ${{ inputs.run_id }}
        run: |
          set +e
          export LD_LIBRARY_PATH="$LLAMA_LIB_DIR:${LD_LIBRARY_PATH:-}"
          "$LLAMA_CLI" \
            -m "$MODEL_PATH" \
            -f ai-review/input/prompt.txt \
            -c 8192 \
            -n 700 \
            -t 4 \
            --seed 1 \
            --temp 0.1 \
            --top-p 0.9 \
            --no-display-prompt \
            > ai-review/output/model-response.md \
            2> ai-review/output/llama.stderr.log
          STATUS=$?
          set -e

          {
            echo "# Free Hugging Face code review"
            echo
            echo "- Reviewed run: $REVIEW_RUN_ID"
            echo "- Model: $MODEL_REPO / $MODEL_FILE"
            echo "- Runtime: llama.cpp $LLAMA_VERSION on CPU"
            echo "- Authority: advisory only; Gradle, tests, package checks, and device validation remain authoritative"
            echo
            if [[ $STATUS -ne 0 ]]; then
              echo "> Local inference failed with exit status $STATUS. See \`llama.stderr.log\`."
              echo
            fi
            cat ai-review/output/model-response.md 2>/dev/null || true
          } > ai-review/output/review.md

          if [[ $STATUS -ne 0 || ! -s ai-review/output/model-response.md ]]; then
            exit "${STATUS:-1}"
          fi

      - name: Upload advisory review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-free-code-review-${{ inputs.run_id }}
          path: |
            ai-review/output/review.md
            ai-review/output/llama.stderr.log
            ai-review/input/failed.log
            ai-review/input/branch.diff
            ai-review/input/run-metadata.json
            ai-review/input/gh-run.stderr.log
          if-no-files-found: warn
          retention-days: 7

      - name: Record artifact location
        if: always()
        shell: bash
        run: |
          {
            echo "## Free Hugging Face review"
            echo
            echo "Download the artifact: \`hf-free-code-review-${{ inputs.run_id }}\`."
            echo
            echo "The model is advisory and cannot modify the repository."
          } >> "$GITHUB_STEP_SUMMARY"
