name: Clean Radial Tile Retry

on:
  push:
    branches: [parity/glass-horizon-title-clean]
    paths:
      - '.github/workflows/clean-radial-tile-retry.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title-clean
      - name: Apply deterministic radial tile patch
        run: |
          set -euo pipefail
          python3 tools/patch_clean_radial_tiles.py
          rm tools/patch_clean_radial_tiles.py
          rm .github/workflows/clean-radial-tile-patch.yml
          rm .github/workflows/clean-radial-tile-retry.yml
          git diff --check
      - name: Commit exact visible radial tiles
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Render radial actions as exact visible popup tiles'
          git push origin HEAD:parity/glass-horizon-title-clean
