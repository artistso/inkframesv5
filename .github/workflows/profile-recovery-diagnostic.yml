name: Profile Recovery Diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsdom
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Capture generated workflow result
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: |
          set +e
          node web/tests/brush-engine-v2-brush-coach-boot.test.mjs > profile-recovery-diagnostic.txt 2>&1
          status=$?
          echo "exit_status=$status" >> profile-recovery-diagnostic.txt
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: profile-recovery-diagnostic
          path: profile-recovery-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
