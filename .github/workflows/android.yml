name: Android Mainline

# Direct-mainline Kotlin migration. This workflow validates the real release source set.
# Signed APK production is enabled only after the permanent signing secrets and package
# inspection gate are present; no debug APK is produced.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-mainline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-boundary:
    name: Native Glass Horizon boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify native application ownership
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/MAINLINE_KOTLIN_MIGRATION.md
          test -s docs/GLASS_HORIZON_VISUAL_CONTRACT.md
          test -s gradle/inkframe-app.properties

          MAIN='app/src/main/kotlin/com/inkframe/studio/MainActivity.kt'
          grep -Fq 'GlassHorizonScreen' "$MAIN"
          grep -Fq 'implementation(project(":feature-canvas"))' app/build.gradle.kts
          grep -Fq 'compose = true' app/build.gradle.kts

          if grep -Eq 'StudioScreen|GlassCanvasScreen|android\.webkit|WebView\(|JavascriptInterface|addJavascriptInterface' "$MAIN"; then
            echo 'Rejected or browser runtime remains in MainActivity.' >&2
            exit 1
          fi
          if grep -Fq 'registerWebAssetPipeline' app/build.gradle.kts; then
            echo 'Android packaging still stages web assets.' >&2
            exit 1
          fi
          if grep -Fq 'androidx.webkit' app/build.gradle.kts; then
            echo 'Android app still depends on WebKit.' >&2
            exit 1
          fi
          if grep -Fq 'android.permission.INTERNET' app/src/main/AndroidManifest.xml; then
            echo 'Offline native app unexpectedly requests INTERNET.' >&2
            exit 1
          fi

  release-compile-and-tests:
    name: Release Kotlin compile and native tests
    runs-on: ubuntu-latest
    needs: native-boundary
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile release Kotlin and run tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee gradle-test.log
      - name: Upload compiler and test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mainline-release-diagnostics-${{ github.sha }}
          path: |
            **/build/reports/tests/
            gradle-test.log
          if-no-files-found: ignore
          retention-days: 14
