name: Android CI

# Builds the debug APK and runs the JVM unit tests on every push / PR.
# The APK is uploaded as a downloadable artifact, so you can install InkFrame
# without a local Android SDK — grab it from the run's "Artifacts" section.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-smoke:
    # Boots both the checked-in fallback and generated Android A/B index in jsdom.
    # Each brush suite is a separate step so failures identify the exact layer.
    name: Web boot smoke (jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsdom (transient)
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Syntax and release metadata
        run: |
          node --check tools/update-release-notes.mjs
          node --check tools/prepare-release.mjs
          node --check tools/bump-version.mjs
          node --check tools/inject-brush-v2-index.mjs
          node --check web/brush-engine-v2/radius.js
          node --check web/brush-engine-v2/tuning.js
          node --check web/brush-engine-v2/adapter.js
          node --check web/brush-engine-v2/coverage-ui.js
          node tools/update-release-notes.mjs --check
          node web/tests/version-smoke.mjs
      - name: Brush V2 core geometry and replay
        run: node web/tests/brush-engine-v2.test.mjs
      - name: Brush V2 continuous ribbon coverage
        run: node web/tests/brush-engine-v2-coverage.test.mjs
      - name: Brush V2 radius continuity
        run: node web/tests/brush-engine-v2-radius.test.mjs
      - name: Brush V2 generated-index structure
        run: node web/tests/brush-engine-v2-ab.test.mjs
      - name: Brush V2 tuning and replay
        run: node web/tests/brush-engine-v2-tuning.test.mjs
      - name: Original engine browser boot
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: node web/tests/boot-smoke.mjs
      - name: Generated Android V2 boot
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: node web/tests/brush-engine-v2-ab-boot.test.mjs

  test:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: [web-smoke, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
