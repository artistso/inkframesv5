name: Android CI

# Builds the tablet debug APK, runs all brush/JVM suites, and verifies the
# production APK/AAB path with a disposable CI-only signing key.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-smoke:
    name: Web and Brush Engine V2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsdom
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Syntax and release metadata
        run: |
          node --check tools/update-release-notes.mjs
          node --check tools/prepare-release.mjs
          node --check tools/bump-version.mjs
          node --check tools/inject-brush-v2-index.mjs
          node --check web/brush-engine-v2/batch.js
          node --check web/brush-engine-v2/validator.js
          node --check web/brush-engine-v2/stabilizer.js
          node --check web/brush-engine-v2/filters.js
          node --check web/brush-engine-v2/engine.js
          node --check web/brush-engine-v2/contact.js
          node --check web/brush-engine-v2/radius.js
          node --check web/brush-engine-v2/ghost-trail.js
          node --check web/brush-engine-v2/ghost-runtime.js
          node --check web/brush-engine-v2/tuning.js
          node --check web/brush-engine-v2/adapter.js
          node --check web/brush-engine-v2/session.js
          node --check web/brush-engine-v2/input.js
          node --check web/brush-engine-v2/runtime.js
          node --check web/brush-engine-v2/native.js
          node --check web/brush-engine-v2/coverage-ui.js
          node --check web/brush-engine-v2/stabilizer-ui.js
          node --check web/brush-engine-v2/ghost-ui.js
          node --check web/brush-engine-v2/lab-ui.js
          node tools/update-release-notes.mjs --check
          node web/tests/version-smoke.mjs
      - name: Brush V2 core geometry and replay
        run: node web/tests/brush-engine-v2.test.mjs
      - name: Brush V2 adaptive stabilizer
        run: node web/tests/brush-engine-v2-stabilizer.test.mjs
      - name: Brush V2 corner preservation
        run: node web/tests/brush-engine-v2-corner.test.mjs
      - name: Brush V2 Ghost Trail
        run: node web/tests/brush-engine-v2-ghost.test.mjs
      - name: Brush V2 continuous ribbon coverage
        run: node web/tests/brush-engine-v2-coverage.test.mjs
      - name: Brush V2 radius continuity
        run: node web/tests/brush-engine-v2-radius.test.mjs
      - name: Brush V2 contact boundaries
        run: node web/tests/brush-engine-v2-contact.test.mjs
      - name: Brush V2 live session continuity
        run: node web/tests/brush-engine-v2-session.test.mjs
      - name: Brush V2 discontinuity segmentation
        run: node web/tests/brush-engine-v2-discontinuity.test.mjs
      - name: Brush V2 coalesced input normalization
        run: node web/tests/brush-engine-v2-batch.test.mjs
      - name: Brush V2 native input diagnostics
        run: node web/tests/brush-engine-v2-native.test.mjs
      - name: Brush V2 runtime policy
        run: node web/tests/brush-engine-v2-runtime.test.mjs
      - name: Brush V2 debug asset structure
        run: node web/tests/brush-engine-v2-ab.test.mjs
      - name: Brush V2 release asset structure
        run: node web/tests/brush-engine-v2-release.test.mjs
      - name: Brush V2 tuning and replay
        run: node web/tests/brush-engine-v2-tuning.test.mjs
      - name: Original engine browser boot
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: node web/tests/boot-smoke.mjs
      - name: Generated Android debug boot
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: node web/tests/brush-engine-v2-ab-boot.test.mjs

  test:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run unit tests
        run: ./gradlew test --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: [web-smoke, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  verify-release:
    name: Verify signed production APK and AAB
    runs-on: ubuntu-latest
    needs: [web-smoke, test]
    env:
      INKFRAME_KEYSTORE_PASSWORD: inkframe-ci-verification-only
      INKFRAME_KEY_ALIAS: inkframe-ci
      INKFRAME_KEY_PASSWORD: inkframe-ci-verification-only
      INKFRAME_VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Create disposable verification keystore
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/inkframe-ci-verification.jks"
          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$INKFRAME_KEYSTORE_PASSWORD" \
            -alias "$INKFRAME_KEY_ALIAS" \
            -keypass "$INKFRAME_KEY_PASSWORD" \
            -dname "CN=InkFrame CI Verification, OU=CI, O=InkFrame, L=Aberdeen, ST=Washington, C=US" \
            -keyalg RSA -keysize 2048 -validity 2
          chmod 600 "$KEYSTORE_PATH"
          echo "INKFRAME_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
      - name: Assemble production APK and AAB
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace
      - name: Verify signatures and production assets
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -s "$APK"
          test -s "$AAB"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"
          unzip -p "$APK" assets/index.html > "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"variant":"release"' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"diagnostics":false' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"defaultBrushEngine":"v2"' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F 'brush-engine-v2/ghost-trail.js' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F 'brush-engine-v2/ghost-runtime.js' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F 'brush-engine-v2/lab-ui.js' "$RUNNER_TEMP/inkframe-release-index.html"
          if grep -F 'brush-engine-v2/native.js' "$RUNNER_TEMP/inkframe-release-index.html"; then
            echo "Production index unexpectedly loads native diagnostics" >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -F 'assets/brush-engine-v2/native.js'; then
            echo "Production APK unexpectedly packages native diagnostics" >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -F 'InkFrameApplication'; then
            echo "Production manifest unexpectedly registers the debug telemetry application" >&2
            exit 1
          fi
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "package: name='com.inkframe.studio'"
      - name: Explain verification key scope
        run: |
          echo "The APK/AAB produced in this job use a disposable CI key and are intentionally not uploaded."
          echo "Distribution artifacts are produced only by Signed Android Release with the protected long-lived key."
