name: Android CI

# Runs the complete release gate and builds named, installable APK artifacts.
# The stable release variant falls back to Android's debug signing key when a
# private release keystore is not configured; it is suitable for sideloading,
# while Play Store publishing still requires the owner's persistent signing key.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-smoke:
    # Boots web/index.html in jsdom with the sibling modules inlined and
    # asserts no uncaught JS errors + the core DOM structure is in place.
    name: Web boot smoke (jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsdom (transient)
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Run web smoke checks
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: |
          node --check tools/update-release-notes.mjs
          node --check tools/prepare-release.mjs
          node --check tools/bump-version.mjs
          node tools/update-release-notes.mjs --check
          node web/tests/version-smoke.mjs
          node web/tests/runtime-module-syntax.mjs
          node web/tests/brush-engine-smoke.mjs
          node web/tests/brush-dynamics-smoke.mjs
          node web/tests/brush-input-quality-smoke.mjs
          node web/tests/brush-signatures-smoke.mjs
          node web/tests/vector-engine-smoke.mjs
          node web/tests/canvas-navigation-smoke.mjs
          node web/tests/release-candidate-smoke.mjs
          node web/tests/boot-smoke.mjs

  test:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: Build stable APK release
    runs-on: ubuntu-latest
    needs: [web-smoke, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Read release version
        run: |
          VERSION="$(node -p "require('./web/metadata.json').version")"
          test -n "$VERSION"
          echo "INKFRAME_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building InkFrame Studio $VERSION"

      - name: Assemble stable and fallback APKs
        run: ./gradlew :app:assembleRelease :app:assembleDebug --stacktrace

      - name: Verify APK signatures and manifest
        run: |
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"
          test -s "$RELEASE_APK"
          test -s "$DEBUG_APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$RELEASE_APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$DEBUG_APK"
          RELEASE_BADGING="$($ANDROID_HOME/build-tools/35.0.0/aapt dump badging "$RELEASE_APK" | head -n 1)"
          echo "$RELEASE_BADGING"
          echo "$RELEASE_BADGING" | grep "package: name='com.inkframe.studio'"
          echo "$RELEASE_BADGING" | grep "versionName='${INKFRAME_VERSION}'"

      - name: Collect stable release package
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk \
             "release/InkFrame-Studio-v${INKFRAME_VERSION}-stable.apk"
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release/InkFrame-Studio-v${INKFRAME_VERSION}-debug-fallback.apk"
          cp RELEASE_NOTES.md "release/InkFrame-Studio-v${INKFRAME_VERSION}-RELEASE-NOTES.md"
          (
            cd release
            sha256sum *.apk > SHA256SUMS.txt
            ls -lh
            cat SHA256SUMS.txt
          )

      - name: Upload stable APK release
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-stable-v${{ env.INKFRAME_VERSION }}
          path: release/*
          if-no-files-found: error
          retention-days: 90
