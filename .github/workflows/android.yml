name: Android CI

# Builds and verifies the native Kotlin/Compose/OpenGL application. The Android package must not
# stage or execute a browser application. Glass Horizon branches may run tests while the UI is
# under construction, but APK/AAB artifacts are prohibited until the owner-approved launcher exists.

on:
  push:
    branches: [ main, master, 'native/**' ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-boundary:
    name: Kotlin-only runtime contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify native application ownership
        shell: bash
        run: |
          set -euo pipefail
          test -s gradle/inkframe-app.properties
          grep -F 'implementation(project(":feature-canvas"))' app/build.gradle.kts
          grep -F 'compose = true' app/build.gradle.kts

          if grep -F 'import android.webkit.WebView' app/src/main/kotlin/com/inkframe/studio/MainActivity.kt; then
            echo 'MainActivity must not import WebView.' >&2
            exit 1
          fi
          if grep -F 'WebView(' app/src/main/kotlin/com/inkframe/studio/MainActivity.kt; then
            echo 'MainActivity must not construct a WebView.' >&2
            exit 1
          fi
          if grep -F 'registerWebAssetPipeline' app/build.gradle.kts; then
            echo 'Android packaging must not stage web assets.' >&2
            exit 1
          fi
          if grep -F 'androidx.webkit' app/build.gradle.kts; then
            echo 'The production application must not depend on AndroidX WebKit.' >&2
            exit 1
          fi
          if grep -F 'android.permission.INTERNET' app/src/main/AndroidManifest.xml; then
            echo 'The offline native application must not request INTERNET.' >&2
            exit 1
          fi

  design-artifact-gate:
    name: Glass Horizon artifact gate
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
      reason: ${{ steps.gate.outputs.reason }}
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - id: gate
        name: Decide whether APK artifacts are permitted
        shell: bash
        run: |
          set -euo pipefail
          MAIN='app/src/main/kotlin/com/inkframe/studio/MainActivity.kt'

          # Non-Glass-Horizon branches retain the repository's normal CI behavior.
          if [[ "$TARGET_BRANCH" != native/glass-horizon-* ]]; then
            echo 'approved=true' >> "$GITHUB_OUTPUT"
            echo 'reason=not a Glass Horizon implementation branch' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The faithful port is deliberately testable before it is distributable.
          # No artifact may be produced while either rejected screen owns startup.
          if grep -Fq 'StudioScreen' "$MAIN"; then
            echo 'approved=false' >> "$GITHUB_OUTPUT"
            echo 'reason=legacy StudioScreen still owns startup' >> "$GITHUB_OUTPUT"
            echo 'APK blocked: legacy StudioScreen still owns startup.'
            exit 0
          fi
          if grep -Fq 'GlassCanvasScreen' "$MAIN"; then
            echo 'approved=false' >> "$GITHUB_OUTPUT"
            echo 'reason=rejected GlassCanvasScreen still owns startup' >> "$GITHUB_OUTPUT"
            echo 'APK blocked: rejected GlassCanvasScreen still owns startup.'
            exit 0
          fi
          if ! grep -Fq 'GlassHorizonScreen' "$MAIN"; then
            echo 'approved=false' >> "$GITHUB_OUTPUT"
            echo 'reason=faithful GlassHorizonScreen is not connected' >> "$GITHUB_OUTPUT"
            echo 'APK blocked: GlassHorizonScreen is not connected.'
            exit 0
          fi
          if [[ ! -s docs/GLASS_HORIZON_DESIGN_APPROVED ]]; then
            echo 'approved=false' >> "$GITHUB_OUTPUT"
            echo 'reason=owner screenshot approval has not been recorded' >> "$GITHUB_OUTPUT"
            echo 'APK blocked: owner screenshot approval marker is absent.'
            exit 0
          fi

          echo 'approved=true' >> "$GITHUB_OUTPUT"
          echo 'reason=faithful launcher and owner approval are present' >> "$GITHUB_OUTPUT"

      - name: Summarize artifact decision
        shell: bash
        run: |
          {
            echo '## Glass Horizon artifact gate'
            echo
            echo "- Branch: \`$TARGET_BRANCH\`"
            echo "- APK/AAB permitted: \`${{ steps.gate.outputs.approved }}\`"
            echo "- Reason: ${{ steps.gate.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run JVM and Android unit tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew test --stacktrace --console=plain 2>&1 | tee gradle-test.log
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            **/build/reports/tests/
            gradle-test.log
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: Build design-approved native debug APK
    runs-on: ubuntu-latest
    needs: [native-boundary, design-artifact-gate, test]
    if: needs.design-artifact-gate.outputs.approved == 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace
      - name: Verify debug package is native-only
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          if unzip -l "$APK" | grep -F 'assets/index.html'; then
            echo 'Debug APK unexpectedly packages the web application.' >&2
            exit 1
          fi
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "package: name='com.inkframe.studio'"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'"
      - name: Upload design-approved debug APK
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-glass-horizon-approved-${{ github.sha }}-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  verify-release:
    name: Verify design-approved signed native APK and AAB
    runs-on: ubuntu-latest
    needs: [native-boundary, design-artifact-gate, test]
    if: needs.design-artifact-gate.outputs.approved == 'true'
    env:
      INKFRAME_KEYSTORE_PASSWORD: inkframe-ci-verification-only
      INKFRAME_KEY_ALIAS: inkframe-ci
      INKFRAME_KEY_PASSWORD: inkframe-ci-verification-only
      INKFRAME_VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Create disposable verification keystore
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/inkframe-ci-verification.jks"
          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$INKFRAME_KEYSTORE_PASSWORD" \
            -alias "$INKFRAME_KEY_ALIAS" \
            -keypass "$INKFRAME_KEY_PASSWORD" \
            -dname "CN=InkFrame Native CI Verification, OU=CI, O=InkFrame, L=Aberdeen, ST=Washington, C=US" \
            -keyalg RSA -keysize 2048 -validity 2
          chmod 600 "$KEYSTORE_PATH"
          echo "INKFRAME_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
      - name: Assemble production APK and AAB
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace
      - name: Verify signatures and native package boundary
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -s "$APK"
          test -s "$AAB"

          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"

          if unzip -l "$APK" | grep -F 'assets/index.html'; then
            echo 'Release APK unexpectedly packages the web application.' >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -F 'assets/brush-engine-v2/'; then
            echo 'Release APK unexpectedly packages the JavaScript brush engine.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -F 'NativeArtistActivity'; then
            echo 'Release manifest unexpectedly registers the migration prototype.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -F 'NativeInkLabActivity'; then
            echo 'Release manifest unexpectedly registers the debug ink laboratory.' >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -F 'libgraphics-core.so'; then
            echo 'Release APK unexpectedly packages the debug-only front-buffer library.' >&2
            exit 1
          fi

          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "package: name='com.inkframe.studio'"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'"
      - name: Explain verification key scope
        run: |
          echo 'The APK/AAB produced in this job use a disposable CI key and are not distribution artifacts.'
