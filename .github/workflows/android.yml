name: Android Mainline

# InkFrame now develops directly on main. Until the faithful native Glass Horizon
# screen is implemented and explicitly approved, CI runs tests only and produces
# no APK, AAB, release, or branch-specific artifact.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-mainline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migration-state:
    name: Mainline migration state
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Confirm single-mainline policy and artifact lock
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/MAINLINE_KOTLIN_MIGRATION.md
          test -s docs/GLASS_HORIZON_VISUAL_CONTRACT.md

          MAIN='app/src/main/kotlin/com/inkframe/studio/MainActivity.kt'
          if grep -Fq 'StudioScreen' "$MAIN"; then
            echo 'Legacy StudioScreen remains in startup; APK production stays disabled.'
          fi
          if grep -Fq 'GlassCanvasScreen' "$MAIN"; then
            echo 'Rejected GlassCanvasScreen remains in startup; APK production stays disabled.'
          fi
          if grep -Fq 'android.webkit.WebView' "$MAIN"; then
            echo 'WebView reference runtime remains on main; APK production stays disabled during translation.'
          fi

          echo 'Mainline is test-only. No APK or AAB job exists in this workflow.'

  native-tests:
    name: Kotlin and Android unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew test --stacktrace --console=plain 2>&1 | tee gradle-test.log
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mainline-test-diagnostics-${{ github.sha }}
          path: |
            **/build/reports/tests/
            gradle-test.log
          if-no-files-found: ignore
          retention-days: 14
