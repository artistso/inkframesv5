name: Android CI

# Builds the debug APK and runs the JVM unit tests on every push / PR.
# The APK is uploaded as a downloadable artifact, so you can install InkFrame
# without a local Android SDK — grab it from the run's "Artifacts" section.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-smoke:
    # Boots web/index.html in jsdom with the sibling modules inlined and
    # asserts no uncaught JS errors + the core DOM structure is in place.
    # Catches the class of bug where a syntax-clean IIFE throws at runtime
    # (e.g. const reassignment under "use strict") and bricks the whole UI
    # into a blank pink screen -- which was invisible to `node --check`.
    # Runs before the APK build so a broken web bundle never ships as an APK.
    name: Web boot smoke (jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsdom (transient)
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Run web smoke checks
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: |
          node --check tools/update-release-notes.mjs
          node --check tools/prepare-release.mjs
          node --check tools/bump-version.mjs
          node tools/update-release-notes.mjs --check
          node web/tests/version-smoke.mjs
          node web/tests/brush-math.test.mjs
          node web/tests/boot-smoke.mjs

  test:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: [web-smoke, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
