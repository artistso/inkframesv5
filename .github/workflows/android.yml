name: Android Mainline

# Direct-mainline native Kotlin migration.
# Every successful main build validates the native runtime and publishes a non-debuggable,
# update-compatible QA APK for com.inkframe.studio.qa. Production signing remains separate,
# secret, and conditional. Debug APKs are never built.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-mainline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  native-boundary:
    name: Native Glass Horizon boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify native application ownership
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/MAINLINE_KOTLIN_MIGRATION.md
          test -s docs/GLASS_HORIZON_VISUAL_CONTRACT.md
          test -s gradle/inkframe-app.properties
          test -s tools/generate_stable_qa_keystore.py

          MAIN='app/src/main/kotlin/com/inkframe/studio/MainActivity.kt'
          grep -Fq 'GlassHorizonScreen' "$MAIN"
          grep -Fq 'implementation(project(":feature-canvas"))' app/build.gradle.kts
          grep -Fq 'compose = true' app/build.gradle.kts

          if grep -Eq 'StudioScreen|GlassCanvasScreen|android\.webkit|WebView\(|JavascriptInterface|addJavascriptInterface' "$MAIN"; then
            echo 'Rejected or browser runtime remains in MainActivity.' >&2
            exit 1
          fi
          if grep -Fq 'registerWebAssetPipeline' app/build.gradle.kts; then
            echo 'Android packaging still stages web assets.' >&2
            exit 1
          fi
          if grep -Fq 'androidx.webkit' app/build.gradle.kts; then
            echo 'Android app still depends on WebKit.' >&2
            exit 1
          fi
          if grep -Fq 'android.permission.INTERNET' app/src/main/AndroidManifest.xml; then
            echo 'Offline native app unexpectedly requests INTERNET.' >&2
            exit 1
          fi

  release-compile-and-tests:
    name: Release Kotlin compile and native tests
    runs-on: ubuntu-latest
    needs: native-boundary
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile release Kotlin and run tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee gradle-test.log
      - name: Upload compiler and test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mainline-release-diagnostics-${{ github.sha }}
          path: |
            **/build/reports/tests/
            gradle-test.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Report compiler result to migration issue
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "## Mainline release compiler — ${SHORT_SHA}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Result: **${JOB_STATUS}**"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            if [[ "$JOB_STATUS" != "success" && -s gradle-test.log ]]; then
              echo '```text'
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:)' gradle-test.log | tail -n 80 || tail -n 80 gradle-test.log
              echo '```'
            else
              echo 'Release Kotlin compilation and the native unit-test suite passed.'
            fi
          } > compiler-report.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file compiler-report.md

  stable-qa-release-apk:
    name: Stable non-debuggable QA APK
    runs-on: ubuntu-latest
    needs: release-compile-and-tests
    env:
      INKFRAME_APPLICATION_ID: com.inkframe.studio.qa
      INKFRAME_VERSION_NAME: 0.5.0-native-qa.${{ github.run_number }}
      INKFRAME_KEYSTORE_PASSWORD: inkframe-qa-release
      INKFRAME_KEY_ALIAS: inkframe-qa
      INKFRAME_KEY_PASSWORD: inkframe-qa-release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deterministic signing dependency
        run: python -m pip install --disable-pip-version-check --no-input cryptography==46.0.4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Generate stable public QA signing identity
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE="$RUNNER_TEMP/inkframe-stable-qa.p12"
          FINGERPRINT="$(python tools/generate_stable_qa_keystore.py --output "$KEYSTORE" --password "$INKFRAME_KEYSTORE_PASSWORD")"
          test -s "$KEYSTORE"
          test -n "$FINGERPRINT"
          keytool -list -keystore "$KEYSTORE" -storepass "$INKFRAME_KEYSTORE_PASSWORD" -alias "$INKFRAME_KEY_ALIAS" >/dev/null
          echo "INKFRAME_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "INKFRAME_VERSION_CODE=$((80000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "QA_CERT_FINGERPRINT=$FINGERPRINT" >> "$GITHUB_ENV"
      - name: Assemble stable QA release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace --console=plain
      - name: Verify stable native QA package
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          BADGING="$RUNNER_TEMP/qa-badging.txt"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee "$BADGING"
          grep -F "package: name='com.inkframe.studio.qa'" "$BADGING"
          grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'" "$BADGING"

          if grep -Fq 'application-debuggable' "$BADGING"; then
            echo 'Stable QA APK is unexpectedly debuggable.' >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -Eq 'assets/index\.html|assets/brush-engine-v2/|\.js$|\.html$'; then
            echo 'Stable QA APK unexpectedly packages retired web assets.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -Fq 'android.permission.INTERNET'; then
            echo 'Stable QA APK unexpectedly requests INTERNET.' >&2
            exit 1
          fi
          if strings "$APK" | grep -Eq 'android/webkit/WebView|addJavascriptInterface|GlassCanvasScreen|StudioScreen\('; then
            echo 'Stable QA APK contains a rejected runtime marker.' >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          OUT="InkFrame-native-QA-release-${SHORT_SHA}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 "${OUT}.sha256")" >> "$GITHUB_OUTPUT"
      - name: Upload stable QA release APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-native-qa-release-${{ github.sha }}
          path: |
            ${{ steps.verify.outputs.apk }}
            ${{ steps.verify.outputs.apk }}.sha256
          if-no-files-found: error
          retention-days: 30
      - name: Publish latest stable QA artifact record
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          APK_NAME: ${{ steps.verify.outputs.apk }}
          APK_SHA256: ${{ steps.verify.outputs.sha256 }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo '# Stable native QA APK artifact'
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Result: **${JOB_STATUS}**"
            echo "- Workflow run ID: \`${GITHUB_RUN_ID}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "- Artifact ID: \`${ARTIFACT_ID}\`"
              echo "- Artifact URL: ${ARTIFACT_URL}"
              echo "- Artifact name: \`inkframe-native-qa-release-${GITHUB_SHA}\`"
              echo "- File: \`${APK_NAME}\`"
              echo "- SHA-256: \`${APK_SHA256}\`"
              echo "- Package: \`com.inkframe.studio.qa\`"
              echo "- Certificate SHA-256: \`${QA_CERT_FINGERPRINT}\`"
              echo '- Build type: release / non-debuggable / native-only / stable public QA identity'
              echo
              echo 'Future Android Mainline QA APKs use this same certificate and install over this QA build.'
              echo 'The production `com.inkframe.studio` signing lineage remains separate and secret.'
            else
              echo '- No QA APK was published from this run.'
            fi
          } > stable-qa-record.md
          gh issue edit 142 --repo "$GITHUB_REPOSITORY" --body-file stable-qa-record.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file stable-qa-record.md

  signing-readiness:
    name: Permanent signing readiness
    runs-on: ubuntu-latest
    needs: release-compile-and-tests
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    env:
      INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}
    steps:
      - name: Check permanent signing configuration
        id: check
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${INKFRAME_KEYSTORE_BASE64:-}" ]] || missing+=(INKFRAME_KEYSTORE_BASE64)
          [[ -n "${INKFRAME_KEYSTORE_PASSWORD:-}" ]] || missing+=(INKFRAME_KEYSTORE_PASSWORD)
          [[ -n "${INKFRAME_KEY_ALIAS:-}" ]] || missing+=(INKFRAME_KEY_ALIAS)
          [[ -n "${INKFRAME_KEY_PASSWORD:-}" ]] || missing+=(INKFRAME_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            echo 'ready=false' >> "$GITHUB_OUTPUT"
            printf '::notice title=Production APK blocked::Add repository secrets: %s\n' "${missing[*]}"
            {
              echo 'Production signing status: **blocked — permanent key not configured**'
              echo
              echo 'Missing repository secrets:'
              printf -- '- `%s`\n' "${missing[@]}"
              echo
              echo 'Native compilation, tests, and stable QA APK production remain authoritative.'
            } > signing-readiness.md
          else
            echo 'ready=true' >> "$GITHUB_OUTPUT"
            {
              echo 'Production signing status: **ready**'
              echo
              echo 'All four permanent signing inputs are configured. The production APK job may proceed.'
            } > signing-readiness.md
          fi
      - name: Report production signing readiness
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "## Permanent signing readiness — ${SHORT_SHA}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            cat signing-readiness.md
          } > signing-report.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file signing-report.md

  signed-release-apk:
    name: Signed non-debuggable production APK
    runs-on: ubuntu-latest
    needs:
      - release-compile-and-tests
      - signing-readiness
    if: needs.signing-readiness.outputs.ready == 'true'
    env:
      INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Restore permanent InkFrame signing key
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE="$RUNNER_TEMP/inkframe-permanent-upload.jks"
          printf '%s' "$INKFRAME_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          test -s "$KEYSTORE"
          chmod 600 "$KEYSTORE"
          keytool -list -keystore "$KEYSTORE" -storepass "$INKFRAME_KEYSTORE_PASSWORD" -alias "$INKFRAME_KEY_ALIAS" >/dev/null
          echo "INKFRAME_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "INKFRAME_VERSION_CODE=$((50000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
      - name: Assemble signed production APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace --console=plain
      - name: Verify production package boundary
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "package: name='com.inkframe.studio'"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'"

          if unzip -l "$APK" | grep -Eq 'assets/index\.html|assets/brush-engine-v2/|\.js$|\.html$'; then
            echo 'Production APK unexpectedly packages the retired web application.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -Fq 'android.permission.INTERNET'; then
            echo 'Production APK unexpectedly requests INTERNET.' >&2
            exit 1
          fi
          if strings "$APK" | grep -Eq 'android/webkit/WebView|addJavascriptInterface|GlassCanvasScreen|StudioScreen\('; then
            echo 'Production APK contains a rejected runtime marker.' >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          OUT="InkFrame-release-${SHORT_SHA}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
      - name: Upload signed production APK
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-release-${{ github.sha }}
          path: |
            ${{ steps.verify.outputs.apk }}
            ${{ steps.verify.outputs.apk }}.sha256
          if-no-files-found: error
          retention-days: 30
      - name: Report production APK result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "## Signed production APK — ${SHORT_SHA}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Result: **${JOB_STATUS}**"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "- Artifact: \`inkframe-release-${GITHUB_SHA}\`"
              echo '- Build type: release / non-debuggable / permanent production signing lineage'
            else
              echo '- No production APK was published from this run.'
            fi
          } > production-apk-report.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file production-apk-report.md
