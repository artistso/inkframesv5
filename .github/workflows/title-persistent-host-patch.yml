name: Title Persistent Host Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-persistent-host-patch.yml'

permissions:
  contents: write

jobs:
  patch-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Keep the GL host alive across compact layouts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()

          if 'import androidx.compose.runtime.key\n' not in text:
              anchor = 'import androidx.compose.runtime.getValue\n'
              if anchor not in text:
                  raise SystemExit('runtime import anchor missing')
              text = text.replace(anchor, anchor + 'import androidx.compose.runtime.key\n', 1)

          old_geometry = '''        val documentAspect = state.project.canvas.aspectRatio
                  val fontScale = LocalDensity.current.fontScale
                  val stagePlacement = GlassHorizonStageLayout.place(
                      viewportWidthDp = maxWidth.value,
                      viewportHeightDp = maxHeight.value,
                      documentAspect = documentAspect,
                      fontScale = fontScale,
                  )
                  val canvasWidth = stagePlacement.canvasWidthDp.dp
                  val canvasHeight = stagePlacement.canvasHeightDp.dp
                  val frameWidth = stagePlacement.frameWidthDp.dp
                  val frameHeight = stagePlacement.frameHeightDp.dp
                  val frameLeft = stagePlacement.frameLeftDp.dp
                  val frameTop = stagePlacement.frameTopDp.dp
          '''
          new_geometry = '''        val documentAspect = state.project.canvas.aspectRatio
                  val localDensity = LocalDensity.current
                  val stagePlacement = GlassHorizonStageLayout.place(
                      viewportWidthDp = maxWidth.value,
                      viewportHeightDp = maxHeight.value,
                      documentAspect = documentAspect,
                      fontScale = localDensity.fontScale,
                      density = localDensity.density,
                  )
                  val hostWidth = stagePlacement.hostWidthDp.dp
                  val hostHeight = stagePlacement.hostHeightDp.dp
                  val canvasWidth = stagePlacement.canvasWidthDp.dp
                  val canvasHeight = stagePlacement.canvasHeightDp.dp
                  val frameWidth = stagePlacement.frameWidthDp.dp
                  val frameHeight = stagePlacement.frameHeightDp.dp
                  val frameLeft = stagePlacement.frameLeftDp.dp
                  val frameTop = stagePlacement.frameTopDp.dp
          '''
          if old_geometry not in text:
              raise SystemExit('stage geometry anchor missing')
          text = text.replace(old_geometry, new_geometry, 1)

          old_call = '''        if (stagePlacement.stageVisible) {
                      ClosedBetaStage(
                          state = state,
                          palette = palette,
                          canvasWidth = canvasWidth,
                          canvasHeight = canvasHeight,
                          frameWidth = frameWidth,
                          frameHeight = frameHeight,
                          onFrame = ::requestFrame,
                          onAddFrame = {
                              state.insertFrame()
                              canvasView?.requestRender()
                          },
                          onCanvasReady = { view ->
                              canvasView = view
                              recoveryController.attach(view)
                          },
                          onArtworkChanged = state::markArtworkModified,
                          modifier = Modifier.align(Alignment.TopStart).offset(x = frameLeft, y = frameTop),
                      )
                  }
          '''
          new_call = '''        ClosedBetaStage(
                      state = state,
                      palette = palette,
                      stageVisible = stagePlacement.stageVisible,
                      hostWidth = hostWidth,
                      hostHeight = hostHeight,
                      canvasWidth = canvasWidth,
                      canvasHeight = canvasHeight,
                      frameWidth = frameWidth,
                      frameHeight = frameHeight,
                      onFrame = ::requestFrame,
                      onAddFrame = {
                          state.insertFrame()
                          canvasView?.requestRender()
                      },
                      onCanvasReady = { view ->
                          canvasView = view
                          recoveryController.attach(view)
                      },
                      onArtworkChanged = state::markArtworkModified,
                      modifier = Modifier.align(Alignment.TopStart).offset(x = frameLeft, y = frameTop),
                  )
          '''
          if old_call not in text:
              raise SystemExit('conditional stage call anchor missing')
          text = text.replace(old_call, new_call, 1)

          replacement = '''@Composable
          private fun ClosedBetaStage(
              state: StudioState,
              palette: BetaPalette,
              stageVisible: Boolean,
              hostWidth: Dp,
              hostHeight: Dp,
              canvasWidth: Dp,
              canvasHeight: Dp,
              frameWidth: Dp,
              frameHeight: Dp,
              onFrame: (Int) -> Unit,
              onAddFrame: () -> Unit,
              onCanvasReady: (CanvasView) -> Unit,
              onArtworkChanged: () -> Unit,
              modifier: Modifier = Modifier,
          ) {
              val containerWidth = if (stageVisible) frameWidth else hostWidth
              val containerHeight = if (stageVisible) frameHeight else hostHeight
              val frameShape = RoundedCornerShape(30.dp)
              val canvasShape = RoundedCornerShape(16.dp)

              Box(modifier.size(containerWidth, containerHeight), contentAlignment = Alignment.Center) {
                  if (stageVisible) {
                      ClosedBetaFrameBoard(
                          state = state,
                          palette = palette,
                          width = frameWidth,
                          height = frameHeight,
                          onFrame = onFrame,
                          onAddFrame = onAddFrame,
                          modifier = Modifier.align(Alignment.Center),
                      )
                  }

                  key("persistent-gl-host") {
                      val frameModifier = Modifier
                          .size(containerWidth, containerHeight)
                          .let { base ->
                              if (stageVisible) {
                                  base
                                      .shadow(30.dp, frameShape, clip = false)
                                      .clip(frameShape)
                                      .background(
                                          UiBrush.linearGradient(
                                              listOf(palette.glassStrong, palette.glassFill, Color(0x5514000E)),
                                          ),
                                      )
                                      .border(1.dp, palette.stroke, frameShape)
                                      .padding(14.dp)
                              } else {
                                  base
                              }
                          }

                      Box(frameModifier) {
                          val hostModifier = Modifier
                              .size(hostWidth, hostHeight)
                              .align(Alignment.Center)
                              .let { base ->
                                  if (stageVisible) {
                                      base
                                          .clip(canvasShape)
                                          .background(palette.blush)
                                          .border(1.dp, Color(0x6614000E), canvasShape)
                                  } else {
                                      base
                                  }
                              }

                          Box(hostModifier) {
                              AndroidView(
                                  modifier = Modifier.fillMaxSize(),
                                  factory = { context ->
                                      CanvasView(
                                          context = context,
                                          canvasWidth = state.project.canvas.widthPx,
                                          canvasHeight = state.project.canvas.heightPx,
                                          sceneProvider = { state.buildDrawList() },
                                          backgroundColorProvider = { state.project.canvas.backgroundColor },
                                          strokeConfig = {
                                              CanvasView.StrokeConfig(
                                                  targetSurfaceId = state.ensureActiveCel(),
                                                  brush = state.brush,
                                                  color = state.color,
                                              )
                                          },
                                          onEngineReady = state::bindEngine,
                                      ).also { view ->
                                          onCanvasReady(view)
                                          view.setShowChecker(state.showChecker)
                                          state.onUiInvalidate = { view.post { view.requestRender() } }
                                          state.postEngineWork = { block -> view.runOnEngine(block) }
                                          view.onViewportChanged = { scale -> view.post { state.setZoom(scale) } }
                                          view.onContextRestored = {
                                              view.requestRender()
                                              state.statusMessage = "ARTWORK RESTORED"
                                          }
                                          view.onStrokeInput = { status -> state.statusMessage = status }
                                          view.onArtworkChanged = onArtworkChanged
                                          view.onColorSampled = { sampled ->
                                              state.eyedropperActive = false
                                              view.eyedropperActive = false
                                              sampled?.let { state.commitColor(it.withAlpha(1f)) }
                                          }
                                          view.onFilled = {
                                              state.fillActive = false
                                              view.fillActive = false
                                          }
                                      }
                                  },
                                  update = { view ->
                                      view.eyedropperActive = state.eyedropperActive
                                      view.fillActive = state.fillActive
                                      view.setShowChecker(state.showChecker)
                                  },
                              )
                          }
                      }
                  }
              }
          }
          '''

          pattern = re.compile(
              r'@Composable\nprivate fun ClosedBetaStage\(.*?\n\}\n\n@Composable\nprivate fun ClosedBetaFrameBoard\(',
              re.S,
          )
          match = pattern.search(text)
          if not match:
              raise SystemExit('ClosedBetaStage function boundary missing')
          text = text[:match.start()] + replacement + '\n@Composable\nprivate fun ClosedBetaFrameBoard(' + text[match.end():]

          if 'if (stagePlacement.stageVisible)' in text:
              raise SystemExit('conditional stage removal remains')
          if text.count('key("persistent-gl-host")') != 1:
              raise SystemExit('expected exactly one persistent host key')
          if text.count('density = localDensity.density') != 1:
              raise SystemExit('density-aware placement is not wired exactly once')

          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit persistent GL host integration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Persistent GL host is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Preserve GL host across compact layouts'
          git push origin HEAD:parity/glass-horizon-title
