name: Complete Glass Horizon Project I/O Once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/complete-glass-project-io-once.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: complete-glass-project-io-once
  cancel-in-progress: true

jobs:
  implement-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wire native archive and media workflows into Glass Horizon
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          screen = 'feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt'

          replace_once(
              screen,
              'import androidx.compose.foundation.Canvas\n',
              'import androidx.activity.compose.rememberLauncherForActivityResult\nimport androidx.activity.result.contract.ActivityResultContracts\nimport androidx.compose.foundation.Canvas\n',
          )
          replace_once(
              screen,
              'import androidx.compose.ui.platform.LocalLifecycleOwner\n',
              'import androidx.compose.ui.platform.LocalContext\nimport androidx.compose.ui.platform.LocalLifecycleOwner\n',
          )
          replace_once(
              screen,
              'import com.inkframe.core.model.DefaultBrushes\nimport com.inkframe.core.model.RgbaColor\n',
              'import com.inkframe.core.model.DefaultBrushes\nimport com.inkframe.core.model.ExportPlanner\nimport com.inkframe.core.model.InkFrameDefaults\nimport com.inkframe.core.model.MediaTypes\nimport com.inkframe.core.model.RgbaColor\n',
          )
          replace_once(screen, 'private enum class OverlayKind { STUDIO, GALLERY }\n', 'private enum class OverlayKind { STUDIO, GALLERY }\n')
          replace_once(
              screen,
              '    PROJECTS, NEW, OPEN, SAVE,\n',
              '    PROJECTS, NEW, OPEN, SAVE, EXPORT,\n',
          )

          replace_once(
              screen,
              '''    var canvasView by remember { mutableStateOf<CanvasView?>(null) }\n    var openNode by rememberSaveable { mutableStateOf<PrimaryNode?>(null) }\n    var overlay by rememberSaveable { mutableStateOf<OverlayKind?>(null) }\n\n    LaunchedEffect(state.isPlaying) {\n''',
              '''    var canvasView by remember { mutableStateOf<CanvasView?>(null) }\n    var openNode by rememberSaveable { mutableStateOf<PrimaryNode?>(null) }\n    var overlay by rememberSaveable { mutableStateOf<OverlayKind?>(null) }\n    var pendingExportFormat by remember { mutableStateOf<ExportManager.ExportFormat?>(null) }\n    val context = LocalContext.current\n    val resolver = context.contentResolver\n\n    val saveLauncher = rememberLauncherForActivityResult(\n        ActivityResultContracts.CreateDocument(MediaTypes.DocumentKind.PROJECT.mimeType),\n    ) { uri ->\n        val view = canvasView\n        when {\n            uri == null -> state.statusMessage = "SAVE CANCELLED"\n            view == null -> state.statusMessage = "CANVAS NOT READY"\n            else -> {\n                val snapshot = state.project\n                val out = runCatching { resolver.openOutputStream(uri) }.getOrNull()\n                if (out == null) {\n                    state.statusMessage = "COULD NOT OPEN SAVE DESTINATION"\n                } else {\n                    state.setBusy(true)\n                    state.statusMessage = "SAVING ${snapshot.name.uppercase()}…"\n                    view.saveProjectTo(snapshot, out) { result ->\n                        view.post {\n                            state.setBusy(false)\n                            state.statusMessage = result.fold(\n                                onSuccess = { "SAVED ${snapshot.name.uppercase()}" },\n                                onFailure = { "SAVE FAILED · ${it.message ?: "UNKNOWN ERROR"}" },\n                            )\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    val openLauncher = rememberLauncherForActivityResult(\n        ActivityResultContracts.OpenDocument(),\n    ) { uri ->\n        val view = canvasView\n        when {\n            uri == null -> state.statusMessage = "OPEN CANCELLED"\n            view == null -> state.statusMessage = "CANVAS NOT READY"\n            else -> {\n                val input = runCatching { resolver.openInputStream(uri) }.getOrNull()\n                if (input == null) {\n                    state.statusMessage = "COULD NOT OPEN ARCHIVE"\n                } else {\n                    state.setBusy(true)\n                    state.statusMessage = "OPENING ARCHIVE…"\n                    view.loadProjectFrom(input) { result ->\n                        view.post {\n                            state.setBusy(false)\n                            result.fold(\n                                onSuccess = { loaded ->\n                                    state.replaceProject(loaded)\n                                    view.requestRender()\n                                    state.statusMessage = "OPENED ${loaded.name.uppercase()}"\n                                },\n                                onFailure = { state.statusMessage = "OPEN FAILED · ${it.message ?: "UNKNOWN ERROR"}" },\n                            )\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    fun runExport(format: ExportManager.ExportFormat, uri: android.net.Uri) {\n        val view = canvasView ?: run {\n            state.statusMessage = "CANVAS NOT READY"\n            return\n        }\n        val plan = ExportPlanner.plan(state.scene, state.project.canvas, ExportPlanner.Range.PLAYBACK)\n        state.setBusy(true)\n        state.statusMessage = "EXPORTING 0 / ${plan.frameCount}"\n        val progress: (Int, Int) -> Unit = { done, total ->\n            view.post { state.statusMessage = "EXPORTING $done / $total" }\n        }\n        val completed: (Result<Unit>) -> Unit = { result ->\n            view.post {\n                state.setBusy(false)\n                state.statusMessage = result.fold(\n                    onSuccess = { "EXPORTED ${format.name.replace('_', ' ')}" },\n                    onFailure = { "EXPORT FAILED · ${it.message ?: "UNKNOWN ERROR"}" },\n                )\n            }\n        }\n        when (format) {\n            ExportManager.ExportFormat.MP4 -> {\n                val pfd = runCatching { resolver.openFileDescriptor(uri, "rw") }.getOrNull()\n                if (pfd == null) {\n                    state.setBusy(false)\n                    state.statusMessage = "COULD NOT OPEN VIDEO DESTINATION"\n                    return\n                }\n                view.exportAnimationTo(\n                    plan = plan,\n                    format = format,\n                    out = null,\n                    fd = pfd.fileDescriptor,\n                    drawListFor = state::buildExportDrawList,\n                    onProgress = progress,\n                ) { result ->\n                    runCatching { pfd.close() }\n                    completed(result)\n                }\n            }\n            ExportManager.ExportFormat.GIF, ExportManager.ExportFormat.PNG_SEQUENCE -> {\n                val out = runCatching { resolver.openOutputStream(uri) }.getOrNull()\n                if (out == null) {\n                    state.setBusy(false)\n                    state.statusMessage = "COULD NOT OPEN EXPORT DESTINATION"\n                    return\n                }\n                view.exportAnimationTo(\n                    plan = plan,\n                    format = format,\n                    out = out,\n                    fd = null,\n                    drawListFor = state::buildExportDrawList,\n                    onProgress = progress,\n                    onResult = completed,\n                )\n            }\n        }\n    }\n\n    val exportLauncher = rememberLauncherForActivityResult(\n        ActivityResultContracts.CreateDocument("application/octet-stream"),\n    ) { uri ->\n        val format = pendingExportFormat\n        pendingExportFormat = null\n        if (uri == null || format == null) {\n            state.statusMessage = "EXPORT CANCELLED"\n        } else {\n            runExport(format, uri)\n        }\n    }\n\n    fun launchExport(format: ExportManager.ExportFormat) {\n        pendingExportFormat = format\n        val kind = when (format) {\n            ExportManager.ExportFormat.MP4 -> MediaTypes.DocumentKind.MP4\n            ExportManager.ExportFormat.GIF -> MediaTypes.DocumentKind.GIF\n            ExportManager.ExportFormat.PNG_SEQUENCE -> MediaTypes.DocumentKind.PNG_SEQUENCE\n        }\n        exportLauncher.launch(MediaTypes.suggestedFileName(state.project.name, kind))\n    }\n\n    LaunchedEffect(state.isPlaying) {\n''',
          )

          replace_once(
              screen,
              '''            actions = listOf(\n                RadialAction("Projects") { overlay = OverlayKind.GALLERY; openNode = null },\n                RadialAction("New") { state.statusMessage = "New-project workflow is being connected natively" },\n                RadialAction("Open") { state.statusMessage = "Native archive picker is preserved and being moved into Gallery" },\n                RadialAction("Save") { state.statusMessage = "Native archive save is preserved and being moved into Gallery" },\n            ),\n''',
              '''            actions = listOf(\n                RadialAction("Projects") { overlay = OverlayKind.GALLERY; openNode = null },\n                RadialAction("New") {\n                    canvasView?.runOnEngine { it.resetForLoad() }\n                    state.replaceProject(InkFrameDefaults.newProject())\n                    canvasView?.requestRender()\n                    state.statusMessage = "NEW CLASSIC CANVAS"\n                    openNode = null\n                },\n                RadialAction("Open") {\n                    openLauncher.launch(MediaTypes.PROJECT_OPEN_MIME_TYPES)\n                    openNode = null\n                },\n                RadialAction("Save") {\n                    saveLauncher.launch(\n                        MediaTypes.suggestedFileName(state.project.name, MediaTypes.DocumentKind.PROJECT),\n                    )\n                    openNode = null\n                },\n                RadialAction("GIF") { launchExport(ExportManager.ExportFormat.GIF); openNode = null },\n                RadialAction("Video") { launchExport(ExportManager.ExportFormat.MP4); openNode = null },\n                RadialAction("PNG") { launchExport(ExportManager.ExportFormat.PNG_SEQUENCE); openNode = null },\n            ),\n''',
          )

          replace_once(
              screen,
              '''    label == "Save" -> RadialGlyph.SAVE\n    else -> RadialGlyph.BRUSH\n''',
              '''    label == "Save" -> RadialGlyph.SAVE\n    label == "GIF" || label == "Video" || label == "PNG" -> RadialGlyph.EXPORT\n    else -> RadialGlyph.BRUSH\n''',
          )

          replace_once(
              screen,
              '''            RadialGlyph.SAVE -> {\n                drawRoundRect(white, Offset(w * .20f, h * .18f), Size(w * .60f, h * .64f), androidx.compose.ui.geometry.CornerRadius(3f), style = Stroke(thin))\n                drawRect(white, Offset(w * .32f, h * .20f), Size(w * .36f, h * .20f), style = Stroke(thin))\n                drawCircle(white, w * .10f, Offset(w * .50f, h * .64f), style = Stroke(thin))\n            }\n''',
              '''            RadialGlyph.SAVE -> {\n                drawRoundRect(white, Offset(w * .20f, h * .18f), Size(w * .60f, h * .64f), androidx.compose.ui.geometry.CornerRadius(3f), style = Stroke(thin))\n                drawRect(white, Offset(w * .32f, h * .20f), Size(w * .36f, h * .20f), style = Stroke(thin))\n                drawCircle(white, w * .10f, Offset(w * .50f, h * .64f), style = Stroke(thin))\n            }\n            RadialGlyph.EXPORT -> {\n                drawRoundRect(white, Offset(w * .18f, h * .36f), Size(w * .64f, h * .46f), androidx.compose.ui.geometry.CornerRadius(3f), style = Stroke(thin))\n                line(.50f, .68f, .50f, .18f)\n                line(.50f, .18f, .34f, .34f)\n                line(.50f, .18f, .66f, .34f)\n            }\n''',
          )
          PY

      - name: Add auditable completion registry
        shell: bash
        run: |
          cat > docs/FEATURE_PARITY_REGISTRY.json <<'JSON'
          {
            "schema": 1,
            "binding_reference": "web/index.html",
            "production_surface": "GlassHorizonScreen",
            "status_vocabulary": {
              "verified": "Implemented and physically validated on the target Galaxy Tab",
              "implemented_unverified": "Implemented and covered by build/tests but awaiting physical validation",
              "partial": "Some required behavior exists; original parity is incomplete",
              "missing": "Not yet implemented in the native Glass Horizon runtime",
              "blocked": "Implementation exists but requires an external prerequisite"
            },
            "features": [
              {"id":"native-runtime","status":"verified","evidence":["app/src/main/kotlin/com/inkframe/studio/MainActivity.kt"]},
              {"id":"no-webview","status":"verified","evidence":[".github/workflows/android.yml"]},
              {"id":"atmosphere","status":"partial","evidence":["feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt"]},
              {"id":"title","status":"implemented_unverified","evidence":["web/index.html:69-73","GlassHorizonScreen.kt:HorizonTitle"]},
              {"id":"stage-geometry","status":"partial","evidence":["GlassHorizonScreen.kt:GlassStage"]},
              {"id":"frame-glass","status":"partial","evidence":["GlassHorizonScreen.kt:GlassStage"]},
              {"id":"perimeter-frame-board","status":"partial","evidence":["GlassHorizonScreen.kt:PerimeterFrameBoard"]},
              {"id":"timeline-transport","status":"implemented_unverified","evidence":["GlassHorizonScreen.kt:TimelineRail","StudioState.kt:togglePlay"]},
              {"id":"frame-holds","status":"partial","evidence":["core-model TimelineOps","native rail lacks full hold editing"]},
              {"id":"eight-primary-nodes","status":"implemented_unverified","evidence":["GlassHorizonScreen.kt:PrimaryNode"]},
              {"id":"node-dragging","status":"verified","evidence":["Galaxy Tab recordings"]},
              {"id":"native-vector-glyphs","status":"partial","evidence":["GlassHorizonScreen.kt:NodeGlyph","GlassHorizonScreen.kt:RadialActionGlyph"]},
              {"id":"edge-aware-radials","status":"partial","evidence":["GlassHorizonScreen.kt:radialOffset"]},
              {"id":"stylus-lens","status":"verified","evidence":["app/src/main/kotlin/com/inkframe/studio/StylusLensOverlayView.kt"]},
              {"id":"visible-drawing","status":"implemented_unverified","evidence":["engine-gl/src/main/kotlin/com/inkframe/engine/gl/CpuStrokeRasterizer.kt","commit f750ca4"]},
              {"id":"pressure","status":"partial","evidence":["CanvasView.kt","StrokeProcessor.kt"]},
              {"id":"tilt","status":"missing","evidence":[]},
              {"id":"physical-eraser","status":"missing","evidence":[]},
              {"id":"undo-redo","status":"implemented_unverified","evidence":["PaintEngine.kt","UndoStack"]},
              {"id":"frame-local-artwork","status":"implemented_unverified","evidence":["StudioState.kt:ensureActiveCel"]},
              {"id":"layers","status":"partial","evidence":["StudioState.kt","GlassHorizonScreen.kt:LAYERS"]},
              {"id":"onion-skin","status":"partial","evidence":["OnionSkinPlanner","GlassHorizonScreen.kt:STUDIO"]},
              {"id":"project-new","status":"implemented_unverified","evidence":["GlassHorizonScreen.kt:GALLERY"]},
              {"id":"project-open","status":"implemented_unverified","evidence":["CanvasView.kt:loadProjectFrom","GlassHorizonScreen.kt"]},
              {"id":"project-save","status":"implemented_unverified","evidence":["CanvasView.kt:saveProjectTo","GlassHorizonScreen.kt"]},
              {"id":"autosave-recovery","status":"missing","evidence":[]},
              {"id":"gif-export","status":"implemented_unverified","evidence":["ExportManager.kt","GlassHorizonScreen.kt"]},
              {"id":"mp4-export","status":"implemented_unverified","evidence":["Mp4Encoder","GlassHorizonScreen.kt"]},
              {"id":"png-sequence-export","status":"implemented_unverified","evidence":["ExportManager.kt","GlassHorizonScreen.kt"]},
              {"id":"brush-lab","status":"missing","evidence":[]},
              {"id":"color-picker","status":"partial","evidence":["GlassHorizonScreen.kt:COLOR swatches"]},
              {"id":"stylus-diagnostics","status":"partial","evidence":["StylusLensOverlayView.kt"]},
              {"id":"start-templates","status":"missing","evidence":[]},
              {"id":"project-gallery","status":"partial","evidence":["GlassHorizonScreen.kt:GALLERY overlay"]},
              {"id":"help-overlay","status":"missing","evidence":[]},
              {"id":"theme-worlds","status":"missing","evidence":[]},
              {"id":"canvas-resize-handles","status":"missing","evidence":[]},
              {"id":"pinch-pan-rotate","status":"implemented_unverified","evidence":["CanvasView.kt","ViewportTransform.kt"]},
              {"id":"egl-context-recovery","status":"implemented_unverified","evidence":["SurfaceBackupStore","CanvasRenderer"]},
              {"id":"production-signing","status":"blocked","evidence":["requires four long-lived GitHub Actions secrets"]},
              {"id":"owner-visual-approval","status":"blocked","evidence":["issue 136"]}
            ]
          }
          JSON

      - name: Assert placeholders are removed
        shell: bash
        run: |
          set -euo pipefail
          ! grep -q 'being connected natively' feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt
          ! grep -q 'being moved into Gallery' feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt
          grep -q 'ActivityResultContracts.CreateDocument' feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt
          grep -q 'ExportManager.ExportFormat.MP4' feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run complete tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee /tmp/project-io-completion.log

      - name: Commit verified completion block and remove executor
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/complete-glass-project-io-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Connect Glass Horizon project save open and export'
          git push origin HEAD:main

      - name: Publish exact failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo '## Glass Horizon project-I/O completion failed before commit'
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/project-io-completion.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:|expected one match)' /tmp/project-io-completion.log | tail -n 220 || tail -n 220 /tmp/project-io-completion.log
            else
              echo 'Source transformation failed before Gradle started.'
            fi
            echo '```'
          } > /tmp/project-io-completion-failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/project-io-completion-failure.md
