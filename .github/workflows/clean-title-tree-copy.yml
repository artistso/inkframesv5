name: Clean Title Tree Copy

on:
  push:
    branches: [parity/glass-horizon-title-clean]
    paths:
      - '.github/workflows/clean-title-tree-copy.yml'

permissions:
  contents: write

jobs:
  copy-validated-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title-clean
          fetch-depth: 0
      - name: Copy exact validated paths from PR 172 head
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin parity/glass-horizon-title
          git checkout origin/parity/glass-horizon-title -- \
            .github/workflows/title-validation.yml \
            app/src/main/kotlin/com/inkframe/studio/MainActivity.kt \
            docs/NATIVE_STATUS.md \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonStageLayout.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonTitle.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/RadialFanLayout.kt \
            feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/CanvasViewportResizePolicyTest.kt \
            feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/GlassHorizonStageLayoutTest.kt \
            feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/GlassHorizonTitleSpecTest.kt \
            feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/RadialFanLayoutTest.kt
          rm .github/workflows/clean-title-tree-copy.yml
          git diff --check
      - name: Commit clean validated tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Restore reviewed Glass Horizon title and responsive stage'
          git push origin HEAD:parity/glass-horizon-title-clean
