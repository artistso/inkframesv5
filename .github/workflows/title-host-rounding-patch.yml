name: Title Host Rounding Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-host-rounding-patch.yml'

permissions:
  contents: write

jobs:
  patch-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Remove independently rounded frame padding from GL host constraints
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()
          old = '''                            .border(1.dp, palette.stroke, frameShape)
                                      .padding(14.dp)
          '''
          new = '''                            .border(1.dp, palette.stroke, frameShape)
          '''
          if old not in text:
              raise SystemExit('nested frame padding anchor missing')
          text = text.replace(old, new, 1)
          if '.border(1.dp, palette.stroke, frameShape)\n                            .padding(14.dp)' in text:
              raise SystemExit('nested host padding remains')
          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit exact host sizing
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Exact host sizing is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Prevent frame padding from squeezing GL host pixels'
          git push origin HEAD:parity/glass-horizon-title
