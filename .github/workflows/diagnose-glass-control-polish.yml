name: Diagnose Glass Horizon Control Polish

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-glass-control-polish.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Extract and run guarded patch
        id: patch
        shell: bash
        run: |
          set +e
          awk '
            /python3 - <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/polish-glass-controls-once.yml > /tmp/polish.py
          python3 /tmp/polish.py 2>&1 | tee /tmp/polish-patch.log
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up JDK 17
        if: steps.patch.outputs.code == '0'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.patch.outputs.code == '0'
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        if: steps.patch.outputs.code == '0'
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        if: steps.patch.outputs.code == '0'
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run tests
        id: gradle
        if: steps.patch.outputs.code == '0'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee /tmp/polish-gradle.log

      - name: Publish exact diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_CODE: ${{ steps.patch.outputs.code }}
          GRADLE_OUTCOME: ${{ steps.gradle.outcome }}
        run: |
          {
            echo "# Glass Horizon control-polish diagnostic"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Patch exit code: \`${PATCH_CODE:-not-run}\`"
            echo "- Gradle outcome: **${GRADLE_OUTCOME:-not-run}**"
            echo
            echo '```text'
            if [[ -s /tmp/polish-patch.log ]]; then
              cat /tmp/polish-patch.log
            fi
            if [[ -s /tmp/polish-gradle.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:|BUILD SUCCESSFUL)' /tmp/polish-gradle.log | tail -n 120 || tail -n 120 /tmp/polish-gradle.log
            fi
            echo '```'
          } > /tmp/diagnostic.md
          gh issue edit 141 --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostic.md
