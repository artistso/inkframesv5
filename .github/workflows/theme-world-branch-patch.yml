name: Theme World Branch Patch

on:
  push:
    branches: [parity/theme-world-atmosphere]
    paths:
      - '.github/workflows/theme-world-branch-patch.yml'

permissions:
  contents: write

jobs:
  patch-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/theme-world-atmosphere
      - name: Remove retired inline atmosphere
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()

          for import_line in (
              'import androidx.compose.foundation.Canvas\n',
              'import androidx.compose.ui.graphics.BlendMode\n',
              'import androidx.compose.ui.graphics.Path\n',
          ):
              text = text.replace(import_line, '', 1)

          start_marker = '@Composable\nprivate fun ClosedBetaAtmosphere('
          end_marker = '@Composable\nprivate fun ClosedBetaTopCluster('
          if start_marker in text:
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              text = text[:start] + text[end:]
          elif 'private fun ClosedBetaAtmosphere(' in text:
              raise SystemExit('legacy atmosphere marker changed unexpectedly')

          if 'GlassHorizonAtmosphere(' not in text:
              raise SystemExit('layered atmosphere call is missing')

          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Retired atmosphere is already removed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Remove retired inline Glass Horizon atmosphere'
          git push origin HEAD:parity/theme-world-atmosphere
