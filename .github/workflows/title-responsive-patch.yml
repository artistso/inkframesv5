name: Title Responsive Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-responsive-patch.yml'

permissions:
  contents: write

jobs:
  patch-responsive-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Reflow compact commands and restore viewport after collapsed host
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          screen_path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          screen = screen_path.read_text()

          old_cluster_call = '''        ClosedBetaTopCluster(
                      palette = palette,
                      state = state,
                      onFit = { canvasView?.fitToScreen() },
                      onTheme = { selectTheme(if (theme == BetaTheme.PLUM) BetaTheme.BLUE else BetaTheme.PLUM) },
                      modifier = Modifier.align(Alignment.TopCenter).offset(y = stagePlacement.commandTopDp.dp),
                  )
          '''
          new_cluster_call = '''        ClosedBetaTopCluster(
                      palette = palette,
                      state = state,
                      compact = stagePlacement.compactCommands,
                      onFit = { canvasView?.fitToScreen() },
                      onTheme = { selectTheme(if (theme == BetaTheme.PLUM) BetaTheme.BLUE else BetaTheme.PLUM) },
                      modifier = Modifier.align(Alignment.TopCenter).offset(y = stagePlacement.commandTopDp.dp),
                  )
          '''
          if old_cluster_call not in screen:
              raise SystemExit('top-cluster call anchor missing')
          screen = screen.replace(old_cluster_call, new_cluster_call, 1)

          old_node_geometry = '''        val leftX = 54.dp
                  val rightX = maxWidth - 56.dp
                  val bottomY = maxHeight - 54.dp
                  val centerX = maxWidth / 2
          '''
          new_node_geometry = '''        val leftX = 54.dp
                  val rightX = maxWidth - 56.dp
                  val bottomY = maxHeight - 54.dp
                  val centerX = maxWidth / 2
                  val topNodeY = if (stagePlacement.compactCommands) {
                      (stagePlacement.commandBottomDp + GlassHorizonStageLayout.COMPACT_NODE_GAP_DP).dp
                  } else {
                      92.dp
                  }
                  val lineNodeY = if (stagePlacement.compactCommands) topNodeY + 128.dp else 220.dp
                  val fxNodeY = if (stagePlacement.compactCommands) topNodeY + 104.dp else 196.dp
                  val themesNodeY = if (stagePlacement.compactCommands) topNodeY + 196.dp else maxHeight * 0.50f
          '''
          if old_node_geometry not in screen:
              raise SystemExit('node geometry anchor missing')
          screen = screen.replace(old_node_geometry, new_node_geometry, 1)

          replacements = {
              'modifier = Modifier.align(Alignment.TopStart).offset(x = leftX, y = 92.dp),':
                  'modifier = Modifier.align(Alignment.TopStart).offset(x = leftX, y = topNodeY),',
              'modifier = Modifier.align(Alignment.TopStart).offset(x = leftX, y = 220.dp),':
                  'modifier = Modifier.align(Alignment.TopStart).offset(x = leftX, y = lineNodeY),',
              'modifier = Modifier.align(Alignment.TopStart).offset(x = rightX, y = 92.dp),':
                  'modifier = Modifier.align(Alignment.TopStart).offset(x = rightX, y = topNodeY),',
              'modifier = Modifier.align(Alignment.TopStart).offset(x = rightX, y = 196.dp),':
                  'modifier = Modifier.align(Alignment.TopStart).offset(x = rightX, y = fxNodeY),',
              'modifier = Modifier.align(Alignment.TopStart).offset(x = rightX, y = maxHeight * 0.50f),':
                  'modifier = Modifier.align(Alignment.TopStart).offset(x = rightX, y = themesNodeY),',
          }
          for old, new in replacements.items():
              if old not in screen:
                  raise SystemExit(f'node offset anchor missing: {old}')
              screen = screen.replace(old, new, 1)

          cluster_replacement = '''@Composable
          private fun ClosedBetaTopCluster(
              palette: BetaPalette,
              state: StudioState,
              compact: Boolean,
              onFit: () -> Unit,
              onTheme: () -> Unit,
              modifier: Modifier = Modifier,
          ) {
              if (compact) {
                  Row(
                      modifier = modifier,
                      horizontalArrangement = Arrangement.spacedBy(6.dp),
                      verticalAlignment = Alignment.CenterVertically,
                  ) {
                      ClosedBetaPill(if (state.isPlaying) "PAUSE" else "PLAY", palette, compact = true) {
                          state.togglePlay()
                      }
                      ClosedBetaPill("CENTER", palette, compact = true) { onFit() }
                      ClosedBetaPill("THEME", palette, compact = true) { onTheme() }
                  }
              } else {
                  Column(
                      modifier,
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(5.dp),
                  ) {
                      Row(horizontalArrangement = Arrangement.spacedBy(8.dp), verticalAlignment = Alignment.CenterVertically) {
                          ClosedBetaPill("Engine · V2", palette, selected = true) {
                              state.statusMessage = "ENGINE · V2"
                          }
                          ClosedBetaPill("Brush Lab", palette, selected = true) {
                              state.showBrushSettings = true
                          }
                      }
                      Row(horizontalArrangement = Arrangement.spacedBy(5.dp), verticalAlignment = Alignment.CenterVertically) {
                          ClosedBetaPill(if (state.isPlaying) "PAUSE" else "PLAY", palette) { state.togglePlay() }
                          ClosedBetaPill("CENTER", palette) { onFit() }
                          ClosedBetaPill("ALL RINGS", palette) { state.statusMessage = "ALL RINGS" }
                          ClosedBetaPill("SCRUB", palette) { state.statusMessage = "SCRUB" }
                          ClosedBetaPill("THEME", palette) { onTheme() }
                      }
                  }
              }
          }

          @Composable
          private fun ClosedBetaPill(
              text: String,
              palette: BetaPalette,
              selected: Boolean = false,
              compact: Boolean = false,
              onClick: () -> Unit,
          ) {
              val pillHeight = if (compact) 34.dp else if (selected) 42.dp else 34.dp
              val pillWidth = if (compact) 64.dp else if (selected) 92.dp else 78.dp
              Box(
                  modifier = Modifier
                      .height(pillHeight)
                      .width(pillWidth)
                      .shadow(16.dp, RoundedCornerShape(18.dp), clip = false)
                      .clip(RoundedCornerShape(18.dp))
                      .background(
                          if (selected) UiBrush.linearGradient(listOf(palette.accent, palette.accentDeep))
                          else UiBrush.linearGradient(listOf(Color(0x6614000E), palette.glassStrong)),
                      )
                      .border(1.dp, palette.rim, RoundedCornerShape(18.dp))
                      .clickable(onClick = onClick),
                  contentAlignment = Alignment.Center,
              ) {
                  androidx.compose.material3.Text(
                      text = text,
                      color = Color.White,
                      fontSize = if (compact) 8.sp else 9.sp,
                      fontWeight = FontWeight.Black,
                      textAlign = TextAlign.Center,
                  )
              }
          }
          '''
          cluster_pattern = re.compile(
              r'@Composable\nprivate fun ClosedBetaTopCluster\(.*?\n\}\n\n@Composable\nprivate fun ClosedBetaStage\(',
              re.S,
          )
          match = cluster_pattern.search(screen)
          if not match:
              raise SystemExit('top-cluster function boundary missing')
          screen = screen[:match.start()] + cluster_replacement + '\n@Composable\nprivate fun ClosedBetaStage(' + screen[match.end():]

          if screen.count('compact = stagePlacement.compactCommands') != 1:
              raise SystemExit('compact command routing must occur exactly once')
          if screen.count('topNodeY') < 3:
              raise SystemExit('compact node reflow did not land')
          screen_path.write_text(screen)

          canvas_path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt')
          canvas = canvas_path.read_text()
          policy = '''internal object CanvasViewportResizePolicy {
              const val COLLAPSED_MAX_EXTENT_PX: Int = 1

              fun isCollapsed(widthPx: Int, heightPx: Int): Boolean =
                  widthPx <= COLLAPSED_MAX_EXTENT_PX || heightPx <= COLLAPSED_MAX_EXTENT_PX

              fun shouldFit(
                  viewportInitialized: Boolean,
                  oldWidthPx: Int,
                  oldHeightPx: Int,
                  newWidthPx: Int,
                  newHeightPx: Int,
              ): Boolean = !viewportInitialized ||
                  (isCollapsed(oldWidthPx, oldHeightPx) && !isCollapsed(newWidthPx, newHeightPx))
          }

          '''
          class_anchor = '@SuppressLint("ViewConstructor")\nclass CanvasView('
          if 'internal object CanvasViewportResizePolicy' not in canvas:
              if class_anchor not in canvas:
                  raise SystemExit('CanvasView class anchor missing')
              canvas = canvas.replace(class_anchor, policy + class_anchor, 1)

          old_size_changed = '''    override fun onSizeChanged(w: Int, h: Int, oldw: Int, oldh: Int) {
                  super.onSizeChanged(w, h, oldw, oldh)
                  viewW = w.toFloat().coerceAtLeast(1f)
                  viewH = h.toFloat().coerceAtLeast(1f)
                  if (!viewportInitialized) {
                      viewportInitialized = true
                      fitToScreen()
                  }
              }
          '''
          new_size_changed = '''    override fun onSizeChanged(w: Int, h: Int, oldw: Int, oldh: Int) {
                  super.onSizeChanged(w, h, oldw, oldh)
                  val shouldFit = CanvasViewportResizePolicy.shouldFit(
                      viewportInitialized = viewportInitialized,
                      oldWidthPx = oldw,
                      oldHeightPx = oldh,
                      newWidthPx = w,
                      newHeightPx = h,
                  )
                  viewW = w.toFloat().coerceAtLeast(1f)
                  viewH = h.toFloat().coerceAtLeast(1f)
                  if (shouldFit) {
                      viewportInitialized = true
                      fitToScreen()
                  }
              }
          '''
          if old_size_changed not in canvas:
              raise SystemExit('CanvasView onSizeChanged anchor missing')
          canvas = canvas.replace(old_size_changed, new_size_changed, 1)
          if canvas.count('CanvasViewportResizePolicy.shouldFit(') != 1:
              raise SystemExit('viewport restoration policy must be used exactly once')
          canvas_path.write_text(canvas)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt
      - name: Commit responsive layout and viewport restoration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Responsive layout is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt
          git commit -m 'Harden compact Glass Horizon layout and viewport restore'
          git push origin HEAD:parity/glass-horizon-title
