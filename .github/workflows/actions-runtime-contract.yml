name: GitHub Actions Runtime Contract

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runtime-contract:
    name: Validate Node 24 action runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Validate contract syntax
        run: node --check tools/tests/github-actions-runtime-contract.test.mjs
      - name: Validate active workflows
        run: node tools/tests/github-actions-runtime-contract.test.mjs
