name: Apply Glass Horizon Device Corrections

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-glass-device-corrections.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  correct-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply guarded native layout and renderer corrections
        id: patch
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee patch.log
          from pathlib import Path
          import re

          def sub(path: str, pattern: str, replacement: str, flags=re.S) -> None:
              p = Path(path)
              text = p.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{path}: expected one regex match, found {count}: {pattern[:140]}")
              p.write_text(updated)

          def literal(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one literal match, found {count}: {old[:140]!r}")
              p.write_text(text.replace(old, new, 1))

          screen = "feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt"
          literal(screen, "import androidx.compose.ui.draw.shadow\n", "import androidx.compose.ui.draw.shadow\nimport androidx.compose.ui.draw.scale\n")

          sub(
              screen,
              r'''        val reservedWidth = 250\.dp\n        val reservedHeight = 190\.dp\n        val availableWidth = .*?\n        val availableHeight = .*?\n        val documentAspect = .*?\n        val canvasWidth = .*?\n        val canvasHeight = .*?\n        val frameWidth = .*?\n        val frameHeight = .*?\n''',
              '''        // Preserve the command field around the fitted 4:3 drawing stage.
        val documentAspect = state.project.canvas.aspectRatio
        val canvasWidthLimit = maxWidth * 0.58f
        val canvasHeightLimit = maxHeight * 0.61f
        val canvasWidth = minOf(canvasWidthLimit, canvasHeightLimit * documentAspect)
        val canvasHeight = canvasWidth / documentAspect
        val frameWidth = canvasWidth + 28.dp
        val frameHeight = canvasHeight + 28.dp
        val stageCenterY = maxHeight / 2 - 8.dp
        val frameLeft = (maxWidth - frameWidth) / 2
        val frameTop = stageCenterY - frameHeight / 2
        val frameRight = frameLeft + frameWidth
        val frameBottom = frameTop + frameHeight
        val leftNodeX = (frameLeft - 88.dp).coerceAtLeast(18.dp)
        val rightNodeX = (frameRight + 30.dp).coerceAtMost(maxWidth - 76.dp)
        val topNodeY = (frameTop + 44.dp).coerceAtLeast(76.dp)
        val middleNodeY = topNodeY + 112.dp
        val lowerNodeY = (topNodeY + 224.dp).coerceAtMost(frameBottom - 72.dp)
        val bottomNodeY = (frameBottom + 28.dp).coerceAtMost(maxHeight - 82.dp)
''',
          )
          literal(screen, ".offset(y = (-15).dp),", ".offset(y = (-8).dp),")
          sub(
              screen,
              r'''\.align\(Alignment\.BottomCenter\)\n\s*\.offset\(y = \(-34\)\.dp\)\n\s*\.width\(minOf\(maxWidth \* 0\.58f, 720\.dp\)\),''',
              '''.align(Alignment.BottomCenter)
                .offset(y = (-14).dp)
                .width(minOf(maxWidth * 0.52f, 620.dp)),''',
          )

          placements = {
              'Modifier.align(Alignment.CenterStart).offset(x = 22.dp, y = (-150).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = leftNodeX, y = topNodeY)',
              'Modifier.align(Alignment.CenterStart).offset(x = 22.dp, y = (-55).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = leftNodeX, y = middleNodeY)',
              'Modifier.align(Alignment.CenterEnd).offset(x = (-22).dp, y = (-155).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = rightNodeX, y = topNodeY)',
              'Modifier.align(Alignment.CenterEnd).offset(x = (-22).dp, y = (-55).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = rightNodeX, y = middleNodeY)',
              'Modifier.align(Alignment.CenterEnd).offset(x = (-22).dp, y = 50.dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = rightNodeX, y = lowerNodeY)',
              'Modifier.align(Alignment.BottomCenter).offset(y = (-36).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = (maxWidth - 58.dp) / 2, y = bottomNodeY)',
              'Modifier.align(Alignment.BottomStart).offset(x = 22.dp, y = (-22).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = leftNodeX, y = lowerNodeY)',
              'Modifier.align(Alignment.BottomStart).offset(x = 106.dp, y = (-22).dp)':
                  'Modifier.align(Alignment.TopStart).offset(x = frameLeft + 34.dp, y = bottomNodeY)',
          }
          for old, new in placements.items():
              literal(screen, old, new)

          literal(screen, 'RadialAction("Previous") {', 'RadialAction("‹") {')
          literal(screen, 'RadialAction(if (state.isPlaying) "Pause" else "Play", selected = state.isPlaying) {', 'RadialAction(if (state.isPlaying) "Ⅱ" else "▶", selected = state.isPlaying) {')
          literal(screen, 'RadialAction("Next") {', 'RadialAction("›") {')
          literal(screen, 'RadialAction("Insert") {', 'RadialAction("+") {')
          literal(screen, 'RadialAction("Remove") {', 'RadialAction("−") {')
          literal(
              screen,
              'var dragX by rememberSaveable(node.name) { mutableStateOf(0f) }\n    var dragY by rememberSaveable(node.name) { mutableStateOf(0f) }',
              'var dragX by rememberSaveable("glass-device-layout-v2", node.name) { mutableStateOf(0f) }\n    var dragY by rememberSaveable("glass-device-layout-v2", node.name) { mutableStateOf(0f) }',
          )

          sub(
              screen,
              r'''(\s+sceneProvider = \{ state\.buildDrawList\(\) \},\n)(\s+strokeConfig = \{)''',
              r'''\1                            backgroundColorProvider = { state.project.canvas.backgroundColor },
\2''',
          )
          sub(
              screen,
              r'''(\)\.also \{ view ->\n\s+onCanvasReady\(view\)\n)''',
              r'''\1                            view.setShowChecker(state.showChecker)
''',
          )
          sub(
              screen,
              r'''(\s+onFrame = state::setFrame,\n)(\s+modifier = Modifier\.align\(Alignment\.Center\),)''',
              r'''\1            onAddFrame = state::insertFrame,
\2''',
          )

          sub(
              screen,
              r'''@Composable\nprivate fun PerimeterFrameBoard\(.*?\n}\n\nprivate fun perimeterPoint''',
              '''@Composable
private fun PerimeterFrameBoard(
    frameCount: Int,
    currentFrame: Int,
    filledFrames: Set<Int>,
    width: Dp,
    height: Dp,
    onFrame: (Int) -> Unit,
    onAddFrame: () -> Unit,
    modifier: Modifier = Modifier,
) {
    val capacity = 48
    val slotCount = maxOf(frameCount + 1, 24).coerceAtMost(capacity)
    Box(modifier.size(width, height)) {
        repeat(slotCount) { index ->
            val point = perimeterPoint(index, slotCount, width, height)
            val existing = index < frameCount
            val next = index == frameCount && frameCount < capacity
            val current = existing && index == currentFrame
            val filled = existing && index in filledFrames
            val shape = RoundedCornerShape(5.dp)
            Box(
                modifier = Modifier
                    .offset(x = point.first - 9.dp, y = point.second - 9.dp)
                    .size(18.dp)
                    .scale(if (current) 1.35f else 1f)
                    .shadow(if (current) 12.dp else 3.dp, shape, clip = false)
                    .clip(shape)
                    .background(
                        when {
                            current -> UiBrush.linearGradient(listOf(HorizonBlush, HorizonAccent))
                            filled -> UiBrush.linearGradient(listOf(GlassStrong, HorizonAccent.copy(alpha = 0.22f)))
                            next -> UiBrush.linearGradient(listOf(GlassStrong, Color(0x4414000E)))
                            existing -> UiBrush.linearGradient(listOf(Color(0x24FFF0F3), Color(0x2214000E)))
                            else -> UiBrush.linearGradient(listOf(Color(0x12FFF0F3), Color(0x0A14000E)))
                        },
                    )
                    .border(
                        1.dp,
                        when {
                            current -> Color.White
                            next -> GlassRim
                            else -> GlassStroke.copy(alpha = if (existing) 1f else 0.55f)
                        },
                        shape,
                    )
                    .clickable(enabled = existing || next) {
                        if (existing) onFrame(index) else onAddFrame()
                    },
                contentAlignment = Alignment.Center,
            ) {
                androidx.compose.material3.Text(
                    text = when {
                        existing -> "${index + 1}"
                        next -> "+"
                        else -> ""
                    },
                    color = Color.White,
                    fontSize = if (next) 10.sp else 7.sp,
                    fontWeight = FontWeight.ExtraBold,
                    textAlign = TextAlign.Center,
                )
            }
        }
        Box(
            modifier = Modifier
                .align(Alignment.BottomCenter)
                .offset(y = 30.dp)
                .clip(RoundedCornerShape(999.dp))
                .background(Color(0x9914000E))
                .border(1.dp, GlassStroke.copy(alpha = 0.55f), RoundedCornerShape(999.dp))
                .padding(horizontal = 10.dp, vertical = 5.dp),
        ) {
            androidx.compose.material3.Text(
                text = "$frameCount / $capacity FRAMES",
                color = HorizonDim,
                fontSize = 8.sp,
                fontWeight = FontWeight.ExtraBold,
                letterSpacing = 1.sp,
            )
        }
    }
}

private fun perimeterPoint''',
          )

          sub(
              screen,
              r'''            repeat\(state\.scene\.frameCount\) \{ frame ->\n.*?            }\n        }\n        RailStep\("›", onNext\)''',
              '''            val visibleSlots = maxOf(state.scene.frameCount + 1, 12).coerceAtMost(48)
            repeat(visibleSlots) { frame ->
                val existing = frame < state.scene.frameCount
                val next = frame == state.scene.frameCount
                Box(
                    modifier = Modifier
                        .weight(1f)
                        .fillMaxHeight()
                        .background(
                            when {
                                existing && frame == state.currentFrame -> HorizonAccent
                                existing && state.activeLayer.cels.containsKey(frame) -> HorizonRose.copy(alpha = 0.42f)
                                next -> HorizonRose.copy(alpha = 0.16f)
                                else -> Color.Transparent
                            },
                        )
                        .clickable(enabled = existing || next) {
                            if (existing) state.setFrame(frame) else state.insertFrame()
                        },
                )
            }
        }
        RailStep("›", onNext)''',
          )

          literal(screen, 'shadow = Shadow(Color.White.copy(alpha = 0.28f), blurRadius = 14f),', 'shadow = Shadow(Color(0xDD2A001A), Offset(0f, 2f), blurRadius = 12f),')
          sub(
              screen,
              r'''            color = HorizonDim,\n            fontSize = 10\.sp,\n            fontWeight = FontWeight\.Bold,\n            letterSpacing = 2\.8\.sp,''',
              '''            color = HorizonBlush,
            fontSize = 10.sp,
            fontWeight = FontWeight.Bold,
            letterSpacing = 2.8.sp,
            style = TextStyle(shadow = Shadow(Color(0xDD2A001A), Offset(0f, 1.5f), blurRadius = 8f)),''',
          )

          literal(
              "feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/StudioState.kt",
              "var showChecker by mutableStateOf(true)",
              "var showChecker by mutableStateOf(false)",
          )

          canvas_view = "feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt"
          sub(
              canvas_view,
              r'''(    private val sceneProvider: \(\) -> List<PaintEngine\.LayerDrawSpec>,\n)(    private val strokeConfig:)''',
              r'''\1    private val backgroundColorProvider: () -> RgbaColor = { RgbaColor.WHITE },
\2''',
          )
          sub(
              canvas_view,
              r'''(            sceneProvider = sceneProvider,\n)(            onEngineReady = onEngineReady,)''',
              r'''\1            backgroundColorProvider = backgroundColorProvider,
\2''',
          )

          renderer = "engine-gl/src/main/kotlin/com/inkframe/engine/gl/CanvasRenderer.kt"
          sub(
              renderer,
              r'''(    private val sceneProvider: \(\) -> List<PaintEngine\.LayerDrawSpec>,\n)(    private val onEngineReady:)''',
              r'''\1    private val backgroundColorProvider: () -> RgbaColor,
\2''',
          )
          sub(
              renderer,
              r'''        GLES30\.glClearColor\(0\.5f, 0\.5f, 0\.5f, 1f\)\n        GLES30\.glClear\(GLES30\.GL_COLOR_BUFFER_BIT\)\n        e\.composeAndPresent\(sceneProvider\(\), screenW, screenH, showChecker, viewport\.inverseCoeffs\(\)\)''',
              '''        val background = backgroundColorProvider()
        GLES30.glClearColor(background.r, background.g, background.b, background.a)
        GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT)
        e.composeAndPresent(
            sceneProvider(),
            screenW,
            screenH,
            showChecker,
            background,
            viewport.inverseCoeffs(),
        )''',
          )

          paint = "engine-gl/src/main/kotlin/com/inkframe/engine/gl/PaintEngine.kt"
          sub(
              paint,
              r'''(    fun composeAndPresent\(\n        specs: List<LayerDrawSpec>,\n        screenW: Int,\n        screenH: Int,\n        showChecker: Boolean,\n)(        invCoeffs: FloatArray,)''',
              r'''\1        backgroundColor: RgbaColor,
\2''',
          )
          literal(paint, "compositor.present(flat, screenW, screenH, showChecker, invCoeffs)", "compositor.present(flat, screenW, screenH, showChecker, backgroundColor, invCoeffs)")

          compositor = "engine-gl/src/main/kotlin/com/inkframe/engine/gl/Compositor.kt"
          literal(compositor, "import android.opengl.GLES30\n", "import android.opengl.GLES30\nimport com.inkframe.core.model.RgbaColor\n")
          literal(compositor, 'private val pChecker = GLES30.glGetUniformLocation(presentProgram, "uShowChecker")', 'private val pChecker = GLES30.glGetUniformLocation(presentProgram, "uShowChecker")\n    private val pBackground = GLES30.glGetUniformLocation(presentProgram, "uBackground")')
          sub(
              compositor,
              r'''(    fun present\(\n        canvas: GlSurface,\n        screenW: Int,\n        screenH: Int,\n        showChecker: Boolean,\n)(        invCoeffs: FloatArray,)''',
              r'''\1        backgroundColor: RgbaColor,
\2''',
          )
          literal(compositor, "GLES30.glUniform1i(pChecker, if (showChecker) 1 else 0)\n\n        drawQuad(presentProgram)", "GLES30.glUniform1i(pChecker, if (showChecker) 1 else 0)\n        GLES30.glUniform3f(pBackground, backgroundColor.r, backgroundColor.g, backgroundColor.b)\n\n        drawQuad(presentProgram)")

          shader = "engine-gl/src/main/assets/shaders/present.frag"
          literal(shader, "uniform int uShowChecker;\n", "uniform int uShowChecker;\nuniform vec3 uBackground;\n")
          literal(shader, "vec3 bg = (uShowChecker == 1) ? checker(vp) : vec3(0.30);", "vec3 bg = (uShowChecker == 1) ? checker(vp) : uBackground;")

          test_path = Path("feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/GlassHorizonPresentationTest.kt")
          test_path.parent.mkdir(parents=True, exist_ok=True)
          test_path.write_text('''package com.inkframe.feature.canvas

import com.inkframe.core.model.InkFrameDefaults
import org.junit.Assert.assertEquals
import org.junit.Assert.assertFalse
import org.junit.Test

class GlassHorizonPresentationTest {
    @Test
    fun originalPaperIsPresentedWithoutCheckerByDefault() {
        val state = StudioState()
        assertFalse(state.showChecker)
        assertEquals(
            InkFrameDefaults.DEFAULT_PAPER.toArgb(),
            InkFrameDefaults.newProject().canvas.backgroundColor.toArgb(),
        )
    }
}
''')
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify release compiler and complete test suite
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain

      - name: Commit verified corrections and remove one-shot workflow
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/apply-glass-device-corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feature-canvas engine-gl
          git commit -m "Correct Glass Horizon device geometry and paper rendering"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Record verified device correction
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body "## Galaxy Tab layout correction committed\n\nVerified commit: \`${COMMIT_SHA}\`\n\n- reduced the fitted 4:3 stage to preserve command space;\n- reset and anchored all eight primary nodes around the stage;\n- restored project paper colour in the OpenGL presenter;\n- made transparency checkerboard opt-in;\n- rendered perimeter capacity slots and a next-frame control;\n- prevented a one-frame scrub rail from appearing fully filled;\n- replaced temporary Frames abbreviations with direct symbols;\n- strengthened title contrast;\n- added presentation-default coverage;\n- passed \`:app:compileReleaseKotlin test\` before commit."

      - name: Report guarded correction failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Guarded Galaxy Tab correction failed before commit"
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            if [[ -s patch.log ]]; then
              echo '```text'
              tail -n 80 patch.log
              echo '```'
            fi
          } > failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file failure.md
