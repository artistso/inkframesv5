name: Title Radial Fan Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-radial-fan-patch.yml'

permissions:
  contents: write

jobs:
  patch-radial-fan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Replace popup windows with measured Compose fan bounds
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()

          for obsolete_import in (
              'import androidx.compose.ui.unit.IntOffset\n',
              'import androidx.compose.ui.window.Popup\n',
              'import androidx.compose.ui.window.PopupProperties\n',
          ):
              text = text.replace(obsolete_import, '')

          replacement = '''@Composable
          private fun ClosedBetaNode(
              node: BetaNode,
              palette: BetaPalette,
              open: Boolean,
              onToggle: () -> Unit,
              actions: List<BetaAction>,
              fan: Fan,
              modifier: Modifier = Modifier,
          ) {
              val fanOffsets = if (open) {
                  actions.indices.map { index ->
                      val offset = betaFanOffset(index, fan)
                      RadialFanOffset(offset.first.value, offset.second.value)
                  }
              } else {
                  emptyList()
              }
              val bounds = RadialFanLayout.bounds(fanOffsets)

              Box(
                  modifier = modifier
                      .offset(x = bounds.minXDp.dp, y = bounds.minYDp.dp)
                      .size(bounds.widthDp.dp, bounds.heightDp.dp),
              ) {
                  if (open) {
                      actions.forEachIndexed { index, action ->
                          val offset = fanOffsets[index]
                          ClosedBetaKid(
                              action = action,
                              palette = palette,
                              modifier = Modifier.offset(
                                  x = bounds.actionXDp(offset).dp,
                                  y = bounds.actionYDp(offset).dp,
                              ),
                          )
                      }
                  }

                  val shape = CircleShape
                  Box(
                      modifier = Modifier
                          .offset(x = bounds.nodeXDp.dp, y = bounds.nodeYDp.dp)
                          .size(58.dp)
                          .shadow(if (open) 24.dp else 14.dp, shape, clip = false)
                          .clip(shape)
                          .background(UiBrush.radialGradient(listOf(palette.glassStrong, palette.glassFill, Color(0x4614000E))))
                          .border(1.dp, if (open) palette.rim else palette.stroke, shape)
                          .clickable(onClick = onToggle),
                      contentAlignment = Alignment.Center,
                  ) {
                      androidx.compose.material3.Text(
                          text = node.glyph,
                          color = Color.White,
                          fontSize = 24.sp,
                          fontWeight = FontWeight.Bold,
                          style = TextStyle(shadow = Shadow(Color(0xCC000000), Offset(0f, 1f), blurRadius = 8f)),
                      )
                      androidx.compose.material3.Text(
                          text = node.label,
                          color = palette.dim,
                          fontSize = 9.sp,
                          fontWeight = FontWeight.Black,
                          letterSpacing = 1.1.sp,
                          modifier = Modifier.align(Alignment.BottomCenter).offset(y = 22.dp),
                          maxLines = 1,
                      )
                  }
              }
          }
          '''

          pattern = re.compile(
              r'@Composable\nprivate fun ClosedBetaNode\(.*?\n\}\n\n@Composable\nprivate fun ClosedBetaKid\(',
              re.S,
          )
          match = pattern.search(text)
          if not match:
              raise SystemExit('ClosedBetaNode function boundary missing')
          text = text[:match.start()] + replacement + '\n@Composable\nprivate fun ClosedBetaKid(' + text[match.end():]

          if 'Popup(' in text or 'PopupProperties(' in text:
              raise SystemExit('popup window code remains')
          if 'RadialPopupLayout' in text:
              raise SystemExit('obsolete popup geometry remains')
          if text.count('RadialFanLayout.bounds(') != 1:
              raise SystemExit('expected exactly one measured fan layout')
          if text.count('bounds.actionXDp(offset)') != 1:
              raise SystemExit('measured fan action placement missing')

          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit measured radial fan layout
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Measured radial fan is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Render radial actions in measured Compose fan bounds'
          git push origin HEAD:parity/glass-horizon-title
