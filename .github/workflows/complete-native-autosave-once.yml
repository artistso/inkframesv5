name: Complete Native Autosave Recovery Once

on:
  push:
    branches: [main, feature/native-autosave-recovery]
    paths:
      - .github/workflows/complete-native-autosave-once.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: complete-native-autosave-recovery-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  implement-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply native autosave recovery transformation
        run: python3 tools/complete_native_autosave_once.py

      - name: Assert recovery boundary
        shell: bash
        run: |
          set -euo pipefail
          CANVAS='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt'
          SCREEN='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt'
          CONTROLLER='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ProjectRecoveryController.kt'
          test -s "$CONTROLLER"
          grep -Fq 'AtomicFile(file)' "$CANVAS"
          grep -Fq 'saveProjectAtomically' "$CANVAS"
          grep -Fq 'onArtworkChanged' "$CANVAS"
          grep -Fq 'ProjectRecoveryController' "$SCREEN"
          grep -Fq 'recoveryController.saveNow()' "$SCREEN"
          grep -Fq 'implemented_unverified' docs/FEATURE_PARITY_REGISTRY.json
          ! grep -Eq 'android\.webkit|WebView\(|JavascriptInterface|addJavascriptInterface' "$CONTROLLER" "$SCREEN" "$CANVAS"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee /tmp/native-autosave.log

      - name: Commit verified implementation and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/complete-native-autosave-once.yml tools/complete_native_autosave_once.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add crash-safe native project autosave recovery'
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Publish exact failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo '## Native autosave recovery failed before commit'
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/native-autosave.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:|expected one match)' /tmp/native-autosave.log | tail -n 240 || tail -n 240 /tmp/native-autosave.log
            else
              echo 'Source transformation or static assertions failed before Gradle completed.'
            fi
            echo '```'
          } > /tmp/native-autosave-failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/native-autosave-failure.md