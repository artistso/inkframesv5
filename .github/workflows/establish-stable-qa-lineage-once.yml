name: Establish Stable QA Lineage Once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/establish-stable-qa-lineage-once.yml
  workflow_dispatch:

concurrency:
  group: establish-stable-qa-lineage
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  establish-build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      INKFRAME_APPLICATION_ID: com.inkframe.studio.qa
      INKFRAME_VERSION_NAME: 0.5.0-native-qa.${{ github.run_number }}
      INKFRAME_KEYSTORE_PASSWORD: inkframe-qa-release
      INKFRAME_KEY_ALIAS: inkframe-qa
      INKFRAME_KEY_PASSWORD: inkframe-qa-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate stable public QA certificate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/qa-signing
          KEYSTORE="$RUNNER_TEMP/inkframe-qa-release.jks"
          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE" \
            -storepass "$INKFRAME_KEYSTORE_PASSWORD" \
            -alias "$INKFRAME_KEY_ALIAS" \
            -keypass "$INKFRAME_KEY_PASSWORD" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 36500 \
            -dname "CN=InkFrame QA, OU=Public Test Signing, O=InkFrame, L=Aberdeen, ST=Washington, C=US"
          base64 -w 0 "$KEYSTORE" > app/qa-signing/inkframe-qa-release.jks.b64
          FINGERPRINT="$(keytool -list -v -keystore "$KEYSTORE" -storepass "$INKFRAME_KEYSTORE_PASSWORD" -alias "$INKFRAME_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p')"
          test -n "$FINGERPRINT"
          echo "QA_CERT_FINGERPRINT=$FINGERPRINT" >> "$GITHUB_ENV"
          echo "INKFRAME_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "INKFRAME_VERSION_CODE=$((80000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"

          cat > app/qa-signing/README.md <<EOF
          # InkFrame QA signing certificate

          This directory contains the intentionally public signing key used only for the isolated
          Android package \`com.inkframe.studio.qa\`.

          It exists so physical-device QA APKs can update the previous QA installation without
          erasing test data. It must never be used for \`com.inkframe.studio\`, Google Play, public
          production releases, or any package containing user production data.

          - Alias: \`inkframe-qa\`
          - Store/key password: \`inkframe-qa-release\`
          - SHA-256 certificate fingerprint: \`${FINGERPRINT}\`
          - Build type: release and non-debuggable
          - Security status: public test identity; no production authority
          EOF

      - name: Add maintained QA release job to Android Mainline
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/android.yml')
          text = path.read_text()
          marker = '  stable-qa-release-apk:\n'
          if marker in text:
              raise SystemExit('stable QA release job already exists')

          block = r'''

  stable-qa-release-apk:
    name: Stable non-debuggable QA APK
    runs-on: ubuntu-latest
    needs: release-compile-and-tests
    env:
      INKFRAME_APPLICATION_ID: com.inkframe.studio.qa
      INKFRAME_VERSION_NAME: 0.5.0-native-qa.${{ github.run_number }}
      INKFRAME_KEYSTORE_PASSWORD: inkframe-qa-release
      INKFRAME_KEY_ALIAS: inkframe-qa
      INKFRAME_KEY_PASSWORD: inkframe-qa-release
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Restore stable public QA signing key
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE="$RUNNER_TEMP/inkframe-qa-release.jks"
          base64 --decode app/qa-signing/inkframe-qa-release.jks.b64 > "$KEYSTORE"
          test -s "$KEYSTORE"
          chmod 600 "$KEYSTORE"
          keytool -list -keystore "$KEYSTORE" -storepass "$INKFRAME_KEYSTORE_PASSWORD" -alias "$INKFRAME_KEY_ALIAS" >/dev/null
          echo "INKFRAME_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "INKFRAME_VERSION_CODE=$((80000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
      - name: Assemble stable QA release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace --console=plain
      - name: Verify stable native QA package
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          BADGING="$RUNNER_TEMP/qa-badging.txt"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee "$BADGING"
          grep -F "package: name='com.inkframe.studio.qa'" "$BADGING"
          grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'" "$BADGING"
          if grep -Fq 'application-debuggable' "$BADGING"; then
            echo 'Stable QA APK is unexpectedly debuggable.' >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -Eq 'assets/index\.html|assets/brush-engine-v2/|\.js$|\.html$'; then
            echo 'Stable QA APK unexpectedly packages retired web assets.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -Fq 'android.permission.INTERNET'; then
            echo 'Stable QA APK unexpectedly requests INTERNET.' >&2
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          OUT="InkFrame-native-QA-release-${SHORT_SHA}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 "${OUT}.sha256")" >> "$GITHUB_OUTPUT"
      - name: Upload stable QA release APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-native-qa-release-${{ github.sha }}
          path: |
            ${{ steps.verify.outputs.apk }}
            ${{ steps.verify.outputs.apk }}.sha256
          if-no-files-found: error
          retention-days: 30
      - name: Report stable QA artifact
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          APK_NAME: ${{ steps.verify.outputs.apk }}
          APK_SHA256: ${{ steps.verify.outputs.sha256 }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "## Stable QA release APK — ${SHORT_SHA}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Result: **${JOB_STATUS}**"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "- Artifact ID: \`${ARTIFACT_ID}\`"
              echo "- Artifact: \`inkframe-native-qa-release-${GITHUB_SHA}\`"
              echo "- File: \`${APK_NAME}\`"
              echo "- SHA-256: \`${APK_SHA256}\`"
              echo "- Package: \`com.inkframe.studio.qa\`"
              echo "- Build type: release / non-debuggable / native-only / stable public QA certificate"
            else
              echo '- No QA APK was published from this run.'
            fi
          } > stable-qa-report.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file stable-qa-report.md
'''
          path.write_text(text.rstrip() + block + '\n')
          PY

      - name: Commit stable QA lineage and remove one-shot workflow
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/establish-stable-qa-lineage-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/qa-signing .github/workflows/android.yml
          git commit -m "Establish stable update-compatible QA APK lineage"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile tests and assemble first stable QA release
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test :app:assembleRelease --stacktrace --console=plain

      - name: Verify first stable QA artifact
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          BADGING="$RUNNER_TEMP/badging.txt"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee "$BADGING"
          grep -F "package: name='com.inkframe.studio.qa'" "$BADGING"
          grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'" "$BADGING"
          if grep -Fq 'application-debuggable' "$BADGING"; then
            echo 'QA APK is unexpectedly debuggable.' >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -Eq 'assets/index\.html|assets/brush-engine-v2/|\.js$|\.html$'; then
            echo 'QA APK unexpectedly packages retired web assets.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -Fq 'android.permission.INTERNET'; then
            echo 'QA APK unexpectedly requests INTERNET.' >&2
            exit 1
          fi
          COMMIT_SHA="${{ steps.commit.outputs.sha }}"
          SHORT_SHA="${COMMIT_SHA::7}"
          OUT="InkFrame-native-QA-release-${SHORT_SHA}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 "${OUT}.sha256")" >> "$GITHUB_OUTPUT"

      - name: Upload first stable QA release APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-native-qa-release-${{ steps.commit.outputs.sha }}
          path: |
            ${{ steps.verify.outputs.apk }}
            ${{ steps.verify.outputs.apk }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Push verified stable QA lineage
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main

      - name: Publish exact first stable QA artifact record
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
          APK_NAME: ${{ steps.verify.outputs.apk }}
          APK_SHA256: ${{ steps.verify.outputs.sha256 }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          set -euo pipefail
          {
            echo '# Stable native QA APK artifact'
            echo
            echo "- Commit: \`${COMMIT_SHA}\`"
            echo "- Result: **${JOB_STATUS}**"
            echo "- Workflow run ID: \`${GITHUB_RUN_ID}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "- Artifact ID: \`${ARTIFACT_ID}\`"
              echo "- Artifact URL: ${ARTIFACT_URL}"
              echo "- Artifact name: \`inkframe-native-qa-release-${COMMIT_SHA}\`"
              echo "- File: \`${APK_NAME}\`"
              echo "- SHA-256: \`${APK_SHA256}\`"
              echo "- Package: \`com.inkframe.studio.qa\`"
              echo "- Certificate SHA-256: \`${QA_CERT_FINGERPRINT}\`"
              echo '- Build type: release / non-debuggable / native-only / stable public QA certificate'
              echo
              echo 'Future Android Mainline QA APKs use this same certificate and install over this QA build.'
              echo 'The production `com.inkframe.studio` signing lineage remains separate and secret.'
            else
              echo '- No APK was published.'
            fi
          } > /tmp/stable-qa-record.md
          gh issue edit 142 --repo "$GITHUB_REPOSITORY" --body-file /tmp/stable-qa-record.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/stable-qa-record.md
