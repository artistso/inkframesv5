name: Execute Guarded S Pen Upgrade

# This second commit triggers the workflow after GitHub has registered it on main.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/execute-stylus-upgrade.yml
  workflow_dispatch:

concurrency:
  group: upgrade-stylus-engine-once
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  execute-verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Execute the guarded source transformation
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /python3 - <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/upgrade-stylus-engine-once.yml > /tmp/upgrade-stylus.py
          test -s /tmp/upgrade-stylus.py
          python3 /tmp/upgrade-stylus.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run complete tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee /tmp/stylus-upgrade-gradle.log

      - name: Commit verified upgrade and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/upgrade-stylus-engine-once.yml \
            .github/workflows/execute-stylus-upgrade.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            engine-gl/src/main/kotlin/com/inkframe/engine/gl/StrokeProcessor.kt \
            engine-gl/src/main/kotlin/com/inkframe/engine/gl/BrushRenderer.kt \
            engine-gl/src/main/assets/shaders/brush.vert \
            engine-gl/src/main/assets/shaders/brush.frag \
            engine-gl/src/test/kotlin/com/inkframe/engine/gl/StrokeProcessorTest.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt
          git commit -m "Connect S Pen tilt and physical eraser to native strokes"
          git push origin HEAD:main

      - name: Publish success record
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="$(git rev-parse HEAD)"
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body "## Native S Pen stroke dynamics upgraded

- Commit: \`$SHA\`
- Release Kotlin compilation: **passed**
- Complete unit-test suite: **passed**
- Pressure, tilt and orientation now reach the native stroke processor.
- Pencil, ink and marker tips produce rotated elliptical tilt dabs.
- The physical eraser tip temporarily uses the eraser engine without changing the selected brush.
- Completed strokes display frame, pressure range, maximum tilt, sample count, eraser state and barrel-button usage.
- Android Mainline is producing the update-compatible stable QA APK for this exact commit."

      - name: Publish failure record
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Explicit S Pen upgrade execution failed before commit'
            echo
            echo "- Workflow source commit: \`${GITHUB_SHA}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/stylus-upgrade-gradle.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:)' /tmp/stylus-upgrade-gradle.log | tail -n 120 || tail -n 120 /tmp/stylus-upgrade-gradle.log
            else
              echo 'The source transformation failed before Gradle started.'
            fi
            echo '```'
          } > /tmp/stylus-explicit-failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/stylus-explicit-failure.md
