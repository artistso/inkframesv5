name: Corrected Glass Horizon QA Release APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/qa-corrected-release-once.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INKFRAME_APPLICATION_ID: com.inkframe.studio.qa
      INKFRAME_VERSION_NAME: 0.5.0-native-qa.corrected.${{ github.run_number }}
      INKFRAME_KEYSTORE_PASSWORD: inkframe-corrected-qa
      INKFRAME_KEY_ALIAS: inkframe-corrected-qa
      INKFRAME_KEY_PASSWORD: inkframe-corrected-qa
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate isolated release signing key
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE="$RUNNER_TEMP/inkframe-corrected-qa-${GITHUB_RUN_ID}.jks"
          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE" \
            -storepass "$INKFRAME_KEYSTORE_PASSWORD" \
            -alias "$INKFRAME_KEY_ALIAS" \
            -keypass "$INKFRAME_KEY_PASSWORD" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 3650 \
            -dname "CN=InkFrame Corrected QA, OU=Private Galaxy Tab Testing, O=InkFrame, L=Aberdeen, ST=Washington, C=US"
          chmod 600 "$KEYSTORE"
          echo "INKFRAME_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "INKFRAME_VERSION_CODE=$((80000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"

      - name: Compile, test, and assemble release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test :app:assembleRelease --stacktrace --console=plain

      - name: Verify corrected native release package
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          BADGING="$RUNNER_TEMP/badging.txt"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee "$BADGING"
          grep -F "package: name='com.inkframe.studio.qa'" "$BADGING"
          grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'" "$BADGING"
          if grep -Fq 'application-debuggable' "$BADGING"; then
            echo 'Corrected QA APK is unexpectedly debuggable.' >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -Eq 'assets/index\.html|assets/brush-engine-v2/|\.js$|\.html$'; then
            echo 'Corrected QA APK unexpectedly packages retired web assets.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -Fq 'android.permission.INTERNET'; then
            echo 'Corrected QA APK unexpectedly requests INTERNET.' >&2
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          OUT="InkFrame-native-corrected-QA-release-${SHORT_SHA}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 "${OUT}.sha256")" >> "$GITHUB_OUTPUT"

      - name: Upload corrected QA APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-native-corrected-qa-${{ github.sha }}
          path: |
            ${{ steps.verify.outputs.apk }}
            ${{ steps.verify.outputs.apk }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish exact artifact record
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          APK_NAME: ${{ steps.verify.outputs.apk }}
          APK_SHA256: ${{ steps.verify.outputs.sha256 }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "# Corrected Glass Horizon QA APK"
            echo
            echo "- Build commit: \`${GITHUB_SHA}\`"
            echo "- Result: **${JOB_STATUS}**"
            echo "- Workflow run ID: \`${GITHUB_RUN_ID}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "- Artifact ID: \`${ARTIFACT_ID}\`"
              echo "- Artifact URL: ${ARTIFACT_URL}"
              echo "- File: \`${APK_NAME}\`"
              echo "- SHA-256: \`${APK_SHA256}\`"
              echo "- Package: \`com.inkframe.studio.qa\`"
              echo "- Build type: release / non-debuggable / native-only"
              echo
              echo "This build contains the Galaxy Tab stage, paper, perimeter, rail, node-anchor, Frames-control, and title corrections."
            else
              echo '- No APK was published.'
            fi
          } > /tmp/artifact.md
          gh issue edit 140 --repo "$GITHUB_REPOSITORY" --body-file /tmp/artifact.md
