name: Documentation Links

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-links:
    name: Validate documentation contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Validate checker syntax
        run: |
          node --check tools/check-doc-links.mjs
          node --check tools/tests/check-doc-links.test.mjs
          node --check tools/tests/release-operator-docs-contract.test.mjs
      - name: Run checker fixtures
        run: |
          node tools/tests/check-doc-links.test.mjs
          node tools/tests/release-operator-docs-contract.test.mjs
      - name: Validate repository documentation
        shell: bash
        run: |
          set -o pipefail
          node tools/check-doc-links.mjs 2>&1 | tee "$RUNNER_TEMP/documentation-links.txt"
      - name: Upload validation transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-link-transcript
          path: ${{ runner.temp }}/documentation-links.txt
          if-no-files-found: error
          retention-days: 7
