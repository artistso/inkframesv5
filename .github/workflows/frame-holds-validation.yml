name: Frame Holds Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'core-model/**'
      - 'feature-canvas/**'
      - 'tools/check_native_boundary.py'
      - '.github/workflows/frame-holds-validation.yml'

permissions:
  contents: read

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Verify native boundary
        run: python3 tools/check_native_boundary.py
      - name: Compile release Kotlin and run tests
        run: |
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain
