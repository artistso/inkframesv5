name: Add Physical S Pen Eraser Once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-physical-s-pen-eraser-once.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: add-physical-s-pen-eraser-once
  cancel-in-progress: true

jobs:
  implement-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply physical S Pen eraser support
        run: python3 tools/add_physical_s_pen_eraser_once.py

      - name: Assert eraser and native rendering boundaries
        shell: bash
        run: |
          set -euo pipefail
          CANVAS='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt'
          TOOL='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/PhysicalStylusTool.kt'
          TEST='feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/PhysicalStylusToolTest.kt'
          test -s "$TOOL"
          test -s "$TEST"
          grep -Fq 'TOOL_TYPE_ERASER' "$TOOL"
          grep -Fq 'ERASER CONTACT' "$CANVAS"
          grep -Fq 'ERASER COMMITTED' "$CANVAS"
          grep -Fq 'brushForStylusTool' "$CANVAS"
          grep -Fq 'setZOrderOnTop(true)' "$CANVAS"
          ! grep -Fq 'setZOrderMediaOverlay(true)' "$CANVAS"
          ! grep -Eq 'android\.webkit|WebView\(|JavascriptInterface|addJavascriptInterface' "$CANVAS" "$TOOL"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin :feature-canvas:testReleaseUnitTest test --stacktrace --console=plain 2>&1 | tee /tmp/physical-eraser.log

      - name: Commit verified implementation and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/add-physical-s-pen-eraser-once.yml tools/add_physical_s_pen_eraser_once.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Route physical S Pen eraser contacts natively'
          git push origin HEAD:main

      - name: Publish exact failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo '## Physical S Pen eraser failed before commit'
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/physical-eraser.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:|expected one match)' /tmp/physical-eraser.log | tail -n 240 || tail -n 240 /tmp/physical-eraser.log
            else
              echo 'Transformation or static assertions failed before Gradle completed.'
            fi
            echo '```'
          } > /tmp/physical-eraser-failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/physical-eraser-failure.md