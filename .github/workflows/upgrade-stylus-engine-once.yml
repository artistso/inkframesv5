      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run complete tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee /tmp/stylus-upgrade-gradle.log

      - name: Commit verified stroke upgrade and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/upgrade-stylus-engine-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            engine-gl/src/main/kotlin/com/inkframe/engine/gl/StrokeProcessor.kt \
            engine-gl/src/main/kotlin/com/inkframe/engine/gl/BrushRenderer.kt \
            engine-gl/src/main/assets/shaders/brush.vert \
            engine-gl/src/main/assets/shaders/brush.frag \
            engine-gl/src/test/kotlin/com/inkframe/engine/gl/StrokeProcessorTest.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt \
            feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt
          git commit -m "Connect S Pen tilt and physical eraser to native strokes"
          git push origin HEAD:main

      - name: Report verified upgrade
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="$(git rev-parse HEAD)"
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body "## Native S Pen stroke dynamics upgraded

- Commit: \`$SHA\`
- Release Kotlin compilation: **passed**
- Complete unit-test suite: **passed**
- Physical eraser tip now temporarily selects the eraser engine without changing the chosen brush.
- Pencil, ink and marker dabs now consume Android pressure, tilt and orientation.
- Completed strokes report frame, pressure range, maximum tilt, sample count, eraser state and barrel-button usage in the native glass status chip.
- Android Mainline will automatically publish the update-compatible non-debuggable QA APK for this commit."

      - name: Report failure diagnostics
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo '## S Pen stroke dynamics upgrade failed before commit'
            echo
            echo "- Source workflow commit: \`${GITHUB_SHA}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/stylus-upgrade-gradle.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:)' /tmp/stylus-upgrade-gradle.log | tail -n 120 || tail -n 120 /tmp/stylus-upgrade-gradle.log
            else
              echo 'The guarded source transformation failed before Gradle started.'
            fi
            echo '```'
          } > /tmp/stylus-upgrade-failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/stylus-upgrade-failure.md
