name: Agent CLI Safety

on:
  push:
    branches: [main]
    paths:
      - inkframe-cli
      - README.md
      - AGENT.md
      - tools/tests/inkframe-cli-contract.test.mjs
      - .github/workflows/agent-cli.yml
  pull_request:
    paths:
      - inkframe-cli
      - README.md
      - AGENT.md
      - tools/tests/inkframe-cli-contract.test.mjs
      - .github/workflows/agent-cli.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-agent-cli:
    name: Validate agent CLI safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Validate shell and contract-test syntax
        run: |
          bash -n inkframe-cli
          node --check tools/tests/inkframe-cli-contract.test.mjs
      - name: Validate CLI and documentation contract
        run: node tools/tests/inkframe-cli-contract.test.mjs
      - name: Validate help and metadata access
        run: |
          chmod +x inkframe-cli
          ./inkframe-cli help
          node tools/bump-version.mjs --show
      - name: Reject invalid release increments without mutation
        shell: bash
        run: |
          set -euo pipefail
          before="$(git status --porcelain)"
          if ./inkframe-cli bump definitely-not-a-version; then
            echo "Invalid release increment unexpectedly succeeded" >&2
            exit 1
          fi
          after="$(git status --porcelain)"
          test "$before" = "$after"
