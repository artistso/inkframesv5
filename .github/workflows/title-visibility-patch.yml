name: Title Visibility Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-visibility-patch.yml'

permissions:
  contents: write

jobs:
  patch-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Gate the OpenGL stage on measured room
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()

          old = '''        ClosedBetaStage(
                      state = state,
                      palette = palette,
                      canvasWidth = canvasWidth,
                      canvasHeight = canvasHeight,
                      frameWidth = frameWidth,
                      frameHeight = frameHeight,
                      onFrame = ::requestFrame,
                      onAddFrame = {
                          state.insertFrame()
                          canvasView?.requestRender()
                      },
                      onCanvasReady = { view ->
                          canvasView = view
                          recoveryController.attach(view)
                      },
                      onArtworkChanged = state::markArtworkModified,
                      modifier = Modifier.align(Alignment.TopStart).offset(x = frameLeft, y = frameTop),
                  )
          '''
          new = '''        if (stagePlacement.stageVisible) {
                      ClosedBetaStage(
                          state = state,
                          palette = palette,
                          canvasWidth = canvasWidth,
                          canvasHeight = canvasHeight,
                          frameWidth = frameWidth,
                          frameHeight = frameHeight,
                          onFrame = ::requestFrame,
                          onAddFrame = {
                              state.insertFrame()
                              canvasView?.requestRender()
                          },
                          onCanvasReady = { view ->
                              canvasView = view
                              recoveryController.attach(view)
                          },
                          onArtworkChanged = state::markArtworkModified,
                          modifier = Modifier.align(Alignment.TopStart).offset(x = frameLeft, y = frameTop),
                      )
                  }
          '''

          if old in text:
              text = text.replace(old, new, 1)
          elif 'if (stagePlacement.stageVisible)' not in text:
              raise SystemExit('stage call anchor missing')

          if text.count('if (stagePlacement.stageVisible)') != 1:
              raise SystemExit('expected one stage visibility gate')

          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit stage visibility integration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Stage visibility is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Omit Glass Horizon stage when viewport has no room'
          git push origin HEAD:parity/glass-horizon-title
