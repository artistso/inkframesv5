name: Glass Horizon Title Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'core-common/**'
      - 'core-model/**'
      - 'engine-gl/**'
      - 'feature-canvas/**'
      - 'feature-layers/**'
      - 'tools/check_native_boundary.py'
      - '.github/workflows/title-validation.yml'

permissions:
  contents: read

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Verify native runtime boundary
        run: python3 tools/check_native_boundary.py
      - name: Compile release Kotlin and run native tests
        shell: bash
        run: |
          set +e
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain > title-validation.log 2>&1
          status=$?
          if [[ $status -ne 0 ]]; then
            echo '--- concise Gradle diagnostics ---'
            grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|Compilation error|There were failing tests|AssertionError|expected:|but was:)' title-validation.log | tail -n 240 || true
            echo '--- Gradle log tail ---'
            tail -n 200 title-validation.log
          else
            echo 'Glass Horizon title and persistent GL host validation passed.'
          fi
          exit $status
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glass-horizon-title-validation-${{ github.sha }}
          path: |
            title-validation.log
            **/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14
