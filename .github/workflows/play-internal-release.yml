name: Google Play Internal Release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Exact version from web/metadata.json
        required: true
        type: string
      version_code:
        description: Integer greater than the latest version code already uploaded to Play
        required: true
        type: string
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
      confirm_upload:
        description: Type UPLOAD to send the verified AAB to Google Play; any other value is a signed dry run
        required: true
        default: DRY-RUN
        type: string

permissions:
  contents: read

concurrency:
  group: google-play-${{ inputs.track }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and optionally upload AAB
    runs-on: ubuntu-latest
    environment: google-play
    env:
      INKFRAME_VERSION_CODE: ${{ inputs.version_code }}
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}
      PLAY_TRACK: ${{ inputs.track }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 platform
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release identity
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/metadata.json').version")"
          test "$VERSION" = "$EXPECTED_VERSION" || {
            echo "Expected version $EXPECTED_VERSION does not match metadata version $VERSION" >&2
            exit 1
          }
          [[ "$INKFRAME_VERSION_CODE" =~ ^[1-9][0-9]*$ ]] || {
            echo "version_code must be a positive integer" >&2
            exit 1
          }
          test "$(node -p "require('./web/metadata.json').targetSdk")" -ge 36
          echo "INKFRAME_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Decode permanent upload key
        shell: bash
        env:
          INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$INKFRAME_KEYSTORE_BASE64"
          test -n "$INKFRAME_KEYSTORE_PASSWORD"
          test -n "$INKFRAME_KEY_ALIAS"
          test -n "$INKFRAME_KEY_PASSWORD"
          KEYSTORE_PATH="$RUNNER_TEMP/inkframe-upload.jks"
          printf '%s' "$INKFRAME_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "INKFRAME_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Decode Play service account
        shell: bash
        env:
          PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$PLAY_SERVICE_ACCOUNT_JSON_BASE64"
          SERVICE_ACCOUNT="$RUNNER_TEMP/play-service-account.json"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > "$SERVICE_ACCOUNT"
          node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$SERVICE_ACCOUNT"
          chmod 600 "$SERVICE_ACCOUNT"
          echo "PLAY_SERVICE_ACCOUNT_JSON_FILE=$SERVICE_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Play listing and release metadata
        run: |
          node tools/validate-play-release.mjs
          node web/tests/version-smoke.mjs
          node tools/update-release-notes.mjs --check

      - name: Run production regression gates
        run: |
          chmod +x ./gradlew
          ./gradlew test --stacktrace --console=plain
          node web/tests/brush-engine-v2-lab-layout.test.mjs
          node web/tests/brush-engine-v2-release.test.mjs

      - name: Build signed production APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace --console=plain

      - name: Verify signed artifacts
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -s "$APK"
          test -s "$AAB"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"
          BADGING="$($ANDROID_HOME/build-tools/35.0.0/aapt dump badging "$APK")"
          grep -F "package: name='com.inkframe.studio'" <<< "$BADGING"
          grep -F "versionCode='$INKFRAME_VERSION_CODE'" <<< "$BADGING"
          grep -F "versionName='$INKFRAME_VERSION'" <<< "$BADGING"
          unzip -p "$APK" assets/index.html > "$RUNNER_TEMP/release-index.html"
          grep -F '"variant":"release"' "$RUNNER_TEMP/release-index.html"
          grep -F '"diagnostics":false' "$RUNNER_TEMP/release-index.html"
          if unzip -l "$APK" | grep -E 'NativeInkLabActivity|libgraphics-core.so'; then
            echo "Debug laboratory content leaked into production" >&2
            exit 1
          fi

      - name: Stage verified release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/InkFrame-${INKFRAME_VERSION}-${INKFRAME_VERSION_CODE}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release/InkFrame-${INKFRAME_VERSION}-${INKFRAME_VERSION_CODE}.aab"
          cp app/src/main/play/release-notes/en-US/default.txt release/PLAY_RELEASE_NOTES.txt
          (cd release && sha256sum *.apk *.aab > SHA256SUMS.txt)

      - name: Upload verified release candidate
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-play-${{ inputs.track }}-${{ env.INKFRAME_VERSION }}-${{ env.INKFRAME_VERSION_CODE }}
          path: release/*
          if-no-files-found: error
          retention-days: 90

      - name: Upload AAB to Google Play
        if: inputs.confirm_upload == 'UPLOAD'
        run: ./gradlew :app:publishReleaseBundle --track "$PLAY_TRACK" --release-status completed --stacktrace --console=plain

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## InkFrame Google Play release candidate"
            echo
            echo "- Version: \`$INKFRAME_VERSION\`"
            echo "- Version code: \`$INKFRAME_VERSION_CODE\`"
            echo "- Target API: \`36\`"
            echo "- Track: \`$PLAY_TRACK\`"
            echo "- Signed APK/AAB: verified"
            if [[ "${{ inputs.confirm_upload }}" == "UPLOAD" ]]; then
              echo "- Google Play upload: requested and completed by Gradle Play Publisher"
            else
              echo "- Google Play upload: skipped; signed dry run only"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
