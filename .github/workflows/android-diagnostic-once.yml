name: Android Diagnostic Once

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-diagnostic-once
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run exact mainline compiler and tests
        id: gradle
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee gradle-test.log
      - name: Publish exact diagnostic to issue 138
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GRADLE_OUTCOME: ${{ steps.gradle.outcome }}
        run: |
          set -euo pipefail
          {
            echo "# Android Mainline diagnostic"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Gradle outcome: **${GRADLE_OUTCOME}**"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '## Focused errors'
            echo '```text'
            grep -E '(^e: |^w: |FAILURE:|Execution failed|Unresolved reference|Compilation error|FAILED|There were failing tests|AssertionError|expected:|but was:|Caused by:)' gradle-test.log | tail -n 160 || true
            echo '```'
            echo
            echo '## Final Gradle output'
            echo '```text'
            tail -n 180 gradle-test.log
            echo '```'
          } > diagnostic.md
          gh issue edit 138 --repo "$GITHUB_REPOSITORY" --body-file diagnostic.md
          test "$GRADLE_OUTCOME" = success
