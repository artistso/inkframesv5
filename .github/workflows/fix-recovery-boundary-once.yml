name: Fix Recovery Boundary Once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-recovery-boundary-once.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fix-recovery-boundary-once
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Accept the delegated recovery host
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/android.yml')
          text = path.read_text()
          old = "          grep -Fq 'GlassHorizonScreen' \"$MAIN\"\n"
          new = """          RECOVERY='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonRecoveryScreen.kt'
          if grep -Fq 'GlassHorizonRecoveryScreen' \"$MAIN\"; then
            test -s \"$RECOVERY\"
            grep -Fq 'GlassHorizonScreen(state = state)' \"$RECOVERY\"
          else
            grep -Fq 'GlassHorizonScreen' \"$MAIN\"
          fi
"""
          if text.count(old) != 1:
              raise SystemExit(f'expected one legacy boundary check, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY

          grep -Fq "RECOVERY='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonRecoveryScreen.kt'" .github/workflows/android.yml
          grep -Fq 'GlassHorizonScreen(state = state)' .github/workflows/android.yml

      - name: Commit corrected maintained workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/fix-recovery-boundary-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/android.yml
          git commit -m 'Validate delegated Glass Horizon recovery host'
          git push origin HEAD:main

# Registered and corrected.
