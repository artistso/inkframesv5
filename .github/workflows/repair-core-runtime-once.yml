name: Repair Core Drawing and Playback Once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-core-runtime-once.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: repair-core-runtime-once
  cancel-in-progress: true

jobs:
  repair-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply corrected runtime transformation
        run: python3 tools/repair_core_runtime_once.py

      - name: Remove temporary recovery wrapper
        run: |
          rm -f feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonRecoveryScreen.kt
          rm -f feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/GlassHorizonRecoveryScreenTest.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run complete tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin test --stacktrace --console=plain 2>&1 | tee /tmp/core-repair-gradle.log

      - name: Commit verified repair and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/repair-core-runtime-once.yml tools/repair_core_runtime_once.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Restore direct drawing and real timeline playback'
          git push origin HEAD:main

      - name: Publish exact failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo '## Core drawing/playback repair failed before commit'
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/core-repair-gradle.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:)' /tmp/core-repair-gradle.log | tail -n 160 || tail -n 160 /tmp/core-repair-gradle.log
            else
              echo 'Source transformation failed before Gradle started.'
            fi
            echo '```'
          } > /tmp/core-repair-failure.md
          gh issue comment 144 --repo "$GITHUB_REPOSITORY" --body-file /tmp/core-repair-failure.md
