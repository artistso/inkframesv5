name: Title Layout Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-layout-patch.yml'

permissions:
  contents: write

jobs:
  patch-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Integrate font-scale-aware header reservation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()

          density_anchor = 'import androidx.compose.ui.platform.LocalContext\n'
          density_imports = 'import androidx.compose.ui.platform.LocalContext\nimport androidx.compose.ui.platform.LocalDensity\n'
          if 'import androidx.compose.ui.platform.LocalDensity' not in text:
              if density_anchor not in text:
                  raise SystemExit('LocalContext import anchor missing')
              text = text.replace(density_anchor, density_imports, 1)

          old_geometry = '''        val documentAspect = state.project.canvas.aspectRatio
                  val canvasWidthLimit = maxWidth * 0.64f
                  val canvasHeightLimit = maxHeight * 0.74f
                  val canvasWidth = minOf(canvasWidthLimit, canvasHeightLimit * documentAspect)
                  val canvasHeight = canvasWidth / documentAspect
                  val frameWidth = canvasWidth + 28.dp
                  val frameHeight = canvasHeight + 28.dp
                  val stageTop = (maxHeight - frameHeight) / 2 + 6.dp
                  val frameLeft = (maxWidth - frameWidth) / 2
                  val frameTop = stageTop
          '''
          new_geometry = '''        val documentAspect = state.project.canvas.aspectRatio
                  val fontScale = LocalDensity.current.fontScale
                  val stagePlacement = GlassHorizonStageLayout.place(
                      viewportWidthDp = maxWidth.value,
                      viewportHeightDp = maxHeight.value,
                      documentAspect = documentAspect,
                      fontScale = fontScale,
                  )
                  val canvasWidth = stagePlacement.canvasWidthDp.dp
                  val canvasHeight = stagePlacement.canvasHeightDp.dp
                  val frameWidth = stagePlacement.frameWidthDp.dp
                  val frameHeight = stagePlacement.frameHeightDp.dp
                  val frameLeft = stagePlacement.frameLeftDp.dp
                  val frameTop = stagePlacement.frameTopDp.dp
          '''
          if old_geometry in text:
              text = text.replace(old_geometry, new_geometry, 1)
          elif 'val stagePlacement = GlassHorizonStageLayout.place(' not in text:
              raise SystemExit('legacy stage geometry anchor missing')

          old_command = 'modifier = Modifier.align(Alignment.TopCenter).offset(y = GlassHorizonTitleSpec.COMMAND_TOP_OFFSET_DP.dp),'
          new_command = 'modifier = Modifier.align(Alignment.TopCenter).offset(y = stagePlacement.commandTopDp.dp),'
          if old_command in text:
              text = text.replace(old_command, new_command, 1)
          elif new_command not in text:
              raise SystemExit('command offset anchor missing')

          if 'canvasHeightLimit = maxHeight * 0.74f' in text:
              raise SystemExit('legacy overlapping stage geometry remains')
          if text.count('GlassHorizonStageLayout.place(') != 1:
              raise SystemExit('expected one measured stage placement')

          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit reserved layout integration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Reserved title/stage layout is already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Reserve font-scale-aware Glass Horizon header band'
          git push origin HEAD:parity/glass-horizon-title
