name: Signed Android Release

# A matching v* tag builds and publishes release APK/AAB artifacts with the
# long-lived InkFrame upload key. Manual runs are private signing dry runs only.
# Missing or incomplete credentials fail before Gradle packages a release.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      expected_version:
        description: Exact version from web/metadata.json
        required: true
        type: string
      expected_version_code:
        description: Exact versionCode from web/metadata.json
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, sign, verify, and stage or publish
    runs-on: ubuntu-latest
    environment: android-release-signing
    env:
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install isolated JSDOM
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release mode and validate identity
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          EXPECTED_VERSION_CODE: ${{ inputs.expected_version_code }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/metadata.json').version")"
          VERSION_CODE="$(node -p "require('./web/metadata.json').versionCode")"
          TARGET_SDK="$(node -p "require('./web/metadata.json').targetSdk")"
          test -n "$VERSION"
          test "$VERSION_CODE" -gt 0
          test "$TARGET_SDK" = "36"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            test -n "$EXPECTED_VERSION"
            test -n "$EXPECTED_VERSION_CODE"
            test "$EXPECTED_VERSION" = "$VERSION"
            test "$EXPECTED_VERSION_CODE" = "$VERSION_CODE"
            RELEASE_MODE="dry-run"
            RELEASE_LABEL="v${VERSION}-dry-run"
          else
            [[ "$GITHUB_REF" == refs/tags/v* ]]
            test "$GITHUB_REF_NAME" = "v$VERSION"
            RELEASE_MODE="tag-release"
            RELEASE_LABEL="v${VERSION}"
          fi
          echo "INKFRAME_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "INKFRAME_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_MODE=$RELEASE_MODE" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_LABEL=$RELEASE_LABEL" >> "$GITHUB_ENV"

      - name: Decode release keystore
        shell: bash
        env:
          INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$INKFRAME_KEYSTORE_BASE64"
          test -n "$INKFRAME_KEYSTORE_PASSWORD"
          test -n "$INKFRAME_KEY_ALIAS"
          test -n "$INKFRAME_KEY_PASSWORD"
          KEYSTORE_PATH="$RUNNER_TEMP/inkframe-release.jks"
          printf '%s' "$INKFRAME_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "INKFRAME_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify release and Play metadata
        run: |
          node tools/update-release-notes.mjs --check
          node tools/validate-play-release.mjs
          node web/tests/version-smoke.mjs
          node --check tools/inject-brush-v2-index.mjs
          node --check web/brush-engine-v2/runtime.js
          node --check web/brush-engine-v2/input.js
          node web/tests/brush-engine-v2-runtime.test.mjs
          node web/tests/brush-engine-v2-release.test.mjs

      - name: Run Kotlin, lint, and studio regression tests
        env:
          NODE_PATH: /tmp/jsdom/node_modules
          JSDOM_PATH: /tmp/jsdom/node_modules/jsdom
        run: |
          chmod +x ./gradlew
          ./gradlew test :app:lintRelease --stacktrace --console=plain
          node web/tests/brush-engine-v2-lab-layout.test.mjs
          node web/tests/brush-engine-v2.test.mjs
          node web/tests/brush-engine-v2-coverage.test.mjs
          node web/tests/brush-engine-v2-radius.test.mjs
          node web/tests/brush-engine-v2-contact.test.mjs
          node web/tests/brush-engine-v2-session.test.mjs
          node web/tests/brush-engine-v2-discontinuity.test.mjs
          node web/tests/brush-engine-v2-batch.test.mjs

      - name: Assemble signed APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace --console=plain

      - name: Verify Android signatures, identity, and production assets
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -s "$APK"
          test -s "$AAB"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"
          unzip -p "$APK" assets/index.html > "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"variant":"release"' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"diagnostics":false' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"defaultBrushEngine":"v2"' "$RUNNER_TEMP/inkframe-release-index.html"
          if grep -F 'brush-engine-v2/native.js' "$RUNNER_TEMP/inkframe-release-index.html"; then exit 1; fi
          if unzip -l "$APK" | grep -F 'assets/brush-engine-v2/native.js'; then exit 1; fi
          if unzip -l "$APK" | grep -F 'libgraphics-core.so'; then exit 1; fi
          if "$ANDROID_HOME/build-tools/36.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -F 'NativeInkLabActivity'; then exit 1; fi
          BADGING="$($ANDROID_HOME/build-tools/36.0.0/aapt dump badging "$APK")"
          grep -F "package: name='com.inkframe.studio'" <<< "$BADGING"
          grep -F "versionCode='${INKFRAME_VERSION_CODE}'" <<< "$BADGING"
          grep -F "versionName='${INKFRAME_VERSION}'" <<< "$BADGING"
          grep -F "targetSdkVersion:'36'" <<< "$BADGING"

      - name: Collect signed artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.aab"
          cp app/build/reports/lint-results-release.html release/
          cp app/build/reports/lint-results-release.sarif release/
          (cd release && sha256sum *.apk *.aab > SHA256SUMS.txt)
          ls -lh release

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## InkFrame ${INKFRAME_VERSION} signed Android ${INKFRAME_RELEASE_MODE}"
            echo
            echo "- Package: \`com.inkframe.studio\`"
            echo "- Version code: \`${INKFRAME_VERSION_CODE}\`"
            echo "- Target SDK: \`36\`"
            echo "- APK and AAB signatures: verified"
            echo "- Release lint and production assets: verified"
            echo "- Brush Engine V2 and native S Pen studio: production path"
            echo "- Debug telemetry and laboratory: excluded"
            echo
            if [[ "$INKFRAME_RELEASE_MODE" == "dry-run" ]]; then
              echo "This manual run creates private signed verification artifacts only. It does not publish a GitHub Release or upload to Google Play."
            else
              echo "This matching tag run may publish the GitHub Release. Google Play upload remains a separate explicit workflow."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-signed-${{ env.INKFRAME_RELEASE_LABEL }}
          path: release/*
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
          name: InkFrame ${{ env.INKFRAME_RELEASE_LABEL }}
          fail_on_unmatched_files: true
