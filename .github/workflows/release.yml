name: Signed Android Release

# Matching v* tags build and publish using a configured long-lived upload key.
# The release-trigger/v* branch can also create a release. When repository
# signing secrets are absent, that branch generates one permanent upload key,
# encrypts its recovery bundle to the committed public recovery certificate,
# and publishes only the encrypted recovery package.

on:
  push:
    tags: [ 'v*' ]
    branches: [ 'release-trigger/v*' ]
  workflow_dispatch:
    inputs:
      expected_version:
        description: Version expected in web/metadata.json, for example 0.4.0
        required: true
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, sign, verify, and stage or publish
    runs-on: ubuntu-latest
    env:
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}
      INKFRAME_VERSION_CODE: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release mode and validate version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/metadata.json').version")"
          test -n "$VERSION"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            test -n "$EXPECTED_VERSION" || {
              echo "Manual signing requires expected_version." >&2
              exit 1
            }
            if [[ "$EXPECTED_VERSION" != "$VERSION" ]]; then
              echo "Expected version $EXPECTED_VERSION does not match metadata version $VERSION" >&2
              exit 1
            fi
            RELEASE_MODE="dry-run"
            RELEASE_LABEL="v${VERSION}-dry-run"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            if [[ "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
              echo "Tag $GITHUB_REF_NAME does not match metadata version v$VERSION" >&2
              exit 1
            fi
            RELEASE_MODE="tag-release"
            RELEASE_LABEL="v${VERSION}"
          elif [[ "$GITHUB_REF" == refs/heads/release-trigger/v* ]]; then
            TRIGGER_VERSION="${GITHUB_REF_NAME#release-trigger/v}"
            if [[ "$TRIGGER_VERSION" != "$VERSION" ]]; then
              echo "Release trigger $GITHUB_REF_NAME does not match metadata version v$VERSION" >&2
              exit 1
            fi
            RELEASE_MODE="tag-release"
            RELEASE_LABEL="v${VERSION}"
          else
            echo "Release runs must originate from a matching v* tag, release-trigger/v* branch, or manual dispatch." >&2
            exit 1
          fi

          echo "INKFRAME_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_MODE=$RELEASE_MODE" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_LABEL=$RELEASE_LABEL" >> "$GITHUB_ENV"

      - name: Prepare permanent upload keystore
        shell: bash
        env:
          INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/inkframe-release.jks"
          mkdir -p release

          if [[ -n "$INKFRAME_KEYSTORE_BASE64" &&
                -n "$INKFRAME_KEYSTORE_PASSWORD" &&
                -n "$INKFRAME_KEY_ALIAS" &&
                -n "$INKFRAME_KEY_PASSWORD" ]]; then
            printf '%s' "$INKFRAME_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            test -s "$KEYSTORE_PATH"
            chmod 600 "$KEYSTORE_PATH"
            SIGNING_SOURCE="repository-secrets"
          else
            RECOVERY_CERT=".github/release/inkframe-recovery-cert.pem"
            test -s "$RECOVERY_CERT" || {
              echo "Missing public recovery certificate." >&2
              exit 1
            }

            GENERATED_PASSWORD="$(openssl rand -hex 32)"
            GENERATED_ALIAS="inkframe-upload-v0-4-0"

            keytool -genkeypair \
              -keystore "$KEYSTORE_PATH" \
              -storetype JKS \
              -storepass "$GENERATED_PASSWORD" \
              -keypass "$GENERATED_PASSWORD" \
              -alias "$GENERATED_ALIAS" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 10000 \
              -dname "CN=InkFrame Upload Key, O=Steven Michael Allen Owens, C=US"

            INKFRAME_KEYSTORE_PASSWORD="$GENERATED_PASSWORD"
            INKFRAME_KEY_ALIAS="$GENERATED_ALIAS"
            INKFRAME_KEY_PASSWORD="$GENERATED_PASSWORD"
            SIGNING_SOURCE="generated-encrypted-recovery"

            RECOVERY_DIR="$RUNNER_TEMP/inkframe-upload-key-recovery"
            mkdir -p "$RECOVERY_DIR"
            cp "$KEYSTORE_PATH" "$RECOVERY_DIR/inkframe-upload-key.jks"
            chmod 600 "$RECOVERY_DIR/inkframe-upload-key.jks"

            {
              echo "InkFrame permanent Google Play upload key"
              echo "Version created for: ${INKFRAME_RELEASE_LABEL}"
              echo "Package: com.inkframe.studio"
              echo "Keystore file: inkframe-upload-key.jks"
              echo "Keystore password: ${INKFRAME_KEYSTORE_PASSWORD}"
              echo "Key alias: ${INKFRAME_KEY_ALIAS}"
              echo "Key password: ${INKFRAME_KEY_PASSWORD}"
              echo
              echo "KEEP THIS FILE AND THE KEYSTORE TOGETHER."
              echo "Future Google Play updates must use this upload key unless the upload key is reset in Play Console."
            } > "$RECOVERY_DIR/credentials.txt"
            chmod 600 "$RECOVERY_DIR/credentials.txt"

            keytool -list -v \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$INKFRAME_KEYSTORE_PASSWORD" \
              -alias "$INKFRAME_KEY_ALIAS" \
              > "$RECOVERY_DIR/certificate-details.txt"

            tar -C "$RECOVERY_DIR" -czf "$RUNNER_TEMP/inkframe-upload-key-recovery.tar.gz" .
            openssl cms -encrypt \
              -binary \
              -aes256 \
              -in "$RUNNER_TEMP/inkframe-upload-key-recovery.tar.gz" \
              -outform DER \
              -out "release/InkFrame-${INKFRAME_RELEASE_LABEL}-upload-key-recovery.p7m" \
              "$RECOVERY_CERT"

            rm -rf "$RECOVERY_DIR" "$RUNNER_TEMP/inkframe-upload-key-recovery.tar.gz"
          fi

          echo "INKFRAME_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "INKFRAME_KEYSTORE_PASSWORD=$INKFRAME_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "INKFRAME_KEY_ALIAS=$INKFRAME_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "INKFRAME_KEY_PASSWORD=$INKFRAME_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "INKFRAME_SIGNING_SOURCE=$SIGNING_SOURCE" >> "$GITHUB_ENV"

      - name: Verify generated release notes
        run: node tools/update-release-notes.mjs --check

      - name: Validate Google Play metadata
        run: node tools/validate-play-release.mjs

      - name: Verify version synchronization
        run: node web/tests/version-smoke.mjs

      - name: Verify release script syntax
        run: |
          node --check tools/inject-brush-v2-index.mjs
          node --check web/brush-engine-v2/runtime.js
          node --check web/brush-engine-v2/input.js

      - name: Verify Brush V2 runtime policy
        run: node web/tests/brush-engine-v2-runtime.test.mjs

      - name: Verify complete production asset policy
        run: node web/tests/brush-engine-v2-release.test.mjs

      - name: Run JVM and brush regression tests
        run: |
          chmod +x ./gradlew
          ./gradlew test --stacktrace
          node web/tests/brush-engine-v2.test.mjs
          node web/tests/brush-engine-v2-coverage.test.mjs
          node web/tests/brush-engine-v2-radius.test.mjs
          node web/tests/brush-engine-v2-contact.test.mjs
          node web/tests/brush-engine-v2-session.test.mjs
          node web/tests/brush-engine-v2-discontinuity.test.mjs
          node web/tests/brush-engine-v2-batch.test.mjs

      - name: Assemble signed APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Verify Android signatures and production assets
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -s "$APK"
          test -s "$AAB"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"
          unzip -p "$APK" assets/index.html > "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"variant":"release"' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"diagnostics":false' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"defaultBrushEngine":"v2"' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F 'creator-statement.js' "$RUNNER_TEMP/inkframe-release-index.html"
          if grep -F 'brush-engine-v2/native.js' "$RUNNER_TEMP/inkframe-release-index.html"; then
            echo "Production index unexpectedly loads native diagnostics" >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -F 'assets/brush-engine-v2/native.js'; then
            echo "Production APK unexpectedly packages native diagnostics" >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -F 'InkFrameApplication'; then
            echo "Production manifest unexpectedly registers the debug telemetry application" >&2
            exit 1
          fi
          BADGING="$("$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK")"
          grep -F "package: name='com.inkframe.studio'" <<< "$BADGING"
          grep -F "versionName='${INKFRAME_VERSION}'" <<< "$BADGING"

      - name: Collect signed artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk \
             "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
             "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.aab"
          (
            cd release
            sha256sum *.apk *.aab *.p7m 2>/dev/null > SHA256SUMS.txt || \
              sha256sum *.apk *.aab > SHA256SUMS.txt
          )
          ls -lh release

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## InkFrame ${INKFRAME_VERSION} signed Android ${INKFRAME_RELEASE_MODE}"
            echo
            echo "- Package: \`com.inkframe.studio\`"
            echo "- Version code: \`${INKFRAME_VERSION_CODE}\`"
            echo "- APK and AAB signatures: verified"
            echo "- Production assets: verified"
            echo "- Brush Engine V2: production default"
            echo "- Debug telemetry: excluded"
            echo "- Signing source: \`${INKFRAME_SIGNING_SOURCE}\`"
            echo
            if [[ "$INKFRAME_SIGNING_SOURCE" == "generated-encrypted-recovery" ]]; then
              echo "A new permanent upload key was generated. Its keystore and credentials are available only inside the encrypted .p7m recovery artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-signed-${{ env.INKFRAME_RELEASE_LABEL }}
          path: release/*
          if-no-files-found: error
          retention-days: ${{ env.INKFRAME_RELEASE_MODE == 'tag-release' && 90 || 14 }}

      - name: Publish GitHub Release
        if: env.INKFRAME_RELEASE_MODE == 'tag-release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.INKFRAME_RELEASE_LABEL }}
          target_commitish: main
          files: release/*
          body_path: RELEASE_NOTES.md
          name: InkFrame ${{ env.INKFRAME_RELEASE_LABEL }}
          fail_on_unmatched_files: true

      - name: Report release result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/metadata.json').version")"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TITLE="[release-report] InkFrame v${VERSION} ${JOB_STATUS} run ${GITHUB_RUN_ID}"
          BODY=$(cat <<EOF
          Signed Android release result: **${JOB_STATUS}**

          - Version: \`v${VERSION}\`
          - Source branch: \`${GITHUB_REF_NAME}\`
          - Source commit: \`${GITHUB_SHA}\`
          - Workflow run: ${RUN_URL}
          - Signing source: \`${INKFRAME_SIGNING_SOURCE:-not-reached}\`
          - Private signing credentials are never printed or attached unencrypted.
          EOF
          )
          gh issue create --title "$TITLE" --body "$BODY"
