name: Signed Android Release

# Controlled publication path for the native Kotlin/OpenGL application.
# Ordinary development APKs are produced by Android Mainline. This workflow is only for
# explicit manual signing verification or an approved v* release tag.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      expected_version:
        description: Exact versionName from gradle/inkframe-app.properties
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and verify native APK/AAB
    runs-on: ubuntu-latest
    env:
      INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}
      INKFRAME_VERSION_CODE: ${{ 60000 + github.run_number }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve native release version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^versionName=//p' gradle/inkframe-app.properties | head -n 1 | tr -d '\r')"
          test -n "$VERSION"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            test -n "$EXPECTED_VERSION" || {
              echo 'Manual signing requires expected_version.' >&2
              exit 1
            }
            [[ "$EXPECTED_VERSION" == "$VERSION" ]] || {
              echo "Expected $EXPECTED_VERSION but native metadata contains $VERSION" >&2
              exit 1
            }
            RELEASE_MODE='dry-run'
            RELEASE_LABEL="v${VERSION}-dry-run"
          else
            [[ "$GITHUB_REF" == refs/tags/v* ]] || exit 1
            [[ "$GITHUB_REF_NAME" == "v$VERSION" ]] || {
              echo "Tag $GITHUB_REF_NAME does not match native version v$VERSION" >&2
              exit 1
            }
            RELEASE_MODE='tag-release'
            RELEASE_LABEL="v${VERSION}"
          fi

          echo "INKFRAME_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_MODE=$RELEASE_MODE" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_LABEL=$RELEASE_LABEL" >> "$GITHUB_ENV"

      - name: Validate native runtime boundary
        shell: bash
        run: |
          set -euo pipefail
          MAIN='app/src/main/kotlin/com/inkframe/studio/MainActivity.kt'
          grep -Fq 'GlassHorizonScreen' "$MAIN"
          grep -Fq 'compose = true' app/build.gradle.kts
          ! grep -Eq 'StudioScreen|GlassCanvasScreen|android\.webkit|WebView\(|JavascriptInterface|addJavascriptInterface' "$MAIN"
          ! grep -Fq 'registerWebAssetPipeline' app/build.gradle.kts
          ! grep -Fq 'androidx.webkit' app/build.gradle.kts
          ! grep -Fq 'android.permission.INTERNET' app/src/main/AndroidManifest.xml

      - name: Restore permanent InkFrame signing key
        shell: bash
        run: |
          set -euo pipefail
          test -n "$INKFRAME_KEYSTORE_BASE64" || { echo 'Missing INKFRAME_KEYSTORE_BASE64' >&2; exit 1; }
          test -n "$INKFRAME_KEYSTORE_PASSWORD" || { echo 'Missing INKFRAME_KEYSTORE_PASSWORD' >&2; exit 1; }
          test -n "$INKFRAME_KEY_ALIAS" || { echo 'Missing INKFRAME_KEY_ALIAS' >&2; exit 1; }
          test -n "$INKFRAME_KEY_PASSWORD" || { echo 'Missing INKFRAME_KEY_PASSWORD' >&2; exit 1; }

          KEYSTORE="$RUNNER_TEMP/inkframe-permanent-upload.jks"
          printf '%s' "$INKFRAME_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          test -s "$KEYSTORE"
          chmod 600 "$KEYSTORE"
          keytool -list \
            -keystore "$KEYSTORE" \
            -storepass "$INKFRAME_KEYSTORE_PASSWORD" \
            -alias "$INKFRAME_KEY_ALIAS" >/dev/null
          echo "INKFRAME_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"

      - name: Compile, test, and assemble signed native packages
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew \
            :app:compileReleaseKotlin \
            test \
            :app:assembleRelease \
            :app:bundleRelease \
            --stacktrace \
            --console=plain

      - name: Verify native package signatures and contents
        shell: bash
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          AAB='app/build/outputs/bundle/release/app-release.aab'
          test -s "$APK"
          test -s "$AAB"

          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"

          BADGING="$($ANDROID_HOME/build-tools/35.0.0/aapt dump badging "$APK")"
          grep -F "package: name='com.inkframe.studio'" <<< "$BADGING"
          grep -F "versionName='${INKFRAME_VERSION}'" <<< "$BADGING"
          grep -F "launchable-activity: name='com.inkframe.studio.SplashActivity'" <<< "$BADGING"

          if unzip -l "$APK" | grep -Eq 'assets/index\.html|assets/brush-engine-v2/|\.js$|\.html$'; then
            echo 'Native release unexpectedly contains the retired web application.' >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -Fq 'android.permission.INTERNET'; then
            echo 'Native release unexpectedly requests INTERNET.' >&2
            exit 1
          fi
          if strings "$APK" | grep -Eq 'android/webkit/WebView|addJavascriptInterface|GlassCanvasScreen|StudioScreen\('; then
            echo 'Native release contains a rejected runtime marker.' >&2
            exit 1
          fi

      - name: Collect signed native artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk \
            "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
            "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.aab"
          (
            cd release
            sha256sum *.apk *.aab > SHA256SUMS.txt
          )
          ls -lh release

      - name: Upload signed native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-native-signed-${{ env.INKFRAME_RELEASE_LABEL }}
          path: release/*
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

      - name: Publish approved GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
          name: InkFrame ${{ env.INKFRAME_RELEASE_LABEL }}
          fail_on_unmatched_files: true
