name: Release (debug APK)

# Push a version tag (e.g. v0.1.1) to build the debug APK and publish it as a
# GitHub Release. The debug build is the canonical release for InkFrame Studio;
# the WebView shell serves the same web/index.html in every variant, and the
# release variant is kept only for optional future Play Store signing.
#
#   git tag v0.1.1 && git push origin v0.1.1
#
# Produces:
#   - InkFrame-v0.1.1-debug.apk  (sideload-ready, debug-signed, fully offline)
#
# No repository secrets are required. The release notes are pulled from
# RELEASE_NOTES.md, which is generated from CHANGELOG.md [Unreleased] and
# web/metadata.json by tools/update-release-notes.mjs.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # create the Release and upload assets

jobs:
  release:
    name: Build & publish debug APK release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Collect artifact
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release/InkFrame-${GITHUB_REF_NAME}-debug.apk"
          ls -la release

      - name: Upload artifact to the run
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-release-${{ github.ref_name }}
          path: release/*
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
          name: InkFrame ${{ github.ref_name }}
