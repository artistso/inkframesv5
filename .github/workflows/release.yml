name: Signed Android Release

# A v* tag builds release-variant APK and AAB artifacts with the long-lived
# InkFrame signing key. Missing or incomplete credentials fail before Gradle.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, sign, verify, and publish
    runs-on: ubuntu-latest
    env:
      INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.INKFRAME_KEYSTORE_PASSWORD }}
      INKFRAME_KEY_ALIAS: ${{ secrets.INKFRAME_KEY_ALIAS }}
      INKFRAME_KEY_PASSWORD: ${{ secrets.INKFRAME_KEY_PASSWORD }}
      INKFRAME_VERSION_CODE: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve and validate version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/metadata.json').version")"
          test -n "$VERSION"
          if [[ "$GITHUB_REF" == refs/tags/* ]] && [[ "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match metadata version v$VERSION" >&2
            exit 1
          fi
          echo "INKFRAME_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "INKFRAME_RELEASE_LABEL=v$VERSION" >> "$GITHUB_ENV"

      - name: Decode release keystore
        shell: bash
        env:
          INKFRAME_KEYSTORE_BASE64: ${{ secrets.INKFRAME_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$INKFRAME_KEYSTORE_BASE64" || { echo "Missing INKFRAME_KEYSTORE_BASE64" >&2; exit 1; }
          test -n "$INKFRAME_KEYSTORE_PASSWORD" || { echo "Missing INKFRAME_KEYSTORE_PASSWORD" >&2; exit 1; }
          test -n "$INKFRAME_KEY_ALIAS" || { echo "Missing INKFRAME_KEY_ALIAS" >&2; exit 1; }
          test -n "$INKFRAME_KEY_PASSWORD" || { echo "Missing INKFRAME_KEY_PASSWORD" >&2; exit 1; }
          KEYSTORE_PATH="$RUNNER_TEMP/inkframe-release.jks"
          printf '%s' "$INKFRAME_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "INKFRAME_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Verify release metadata
        run: |
          node tools/update-release-notes.mjs --check
          node web/tests/version-smoke.mjs
          node --check tools/inject-brush-v2-index.mjs
          node --check web/brush-engine-v2/runtime.js
          node --check web/brush-engine-v2/input.js
          node web/tests/brush-engine-v2-runtime.test.mjs
          node web/tests/brush-engine-v2-release.test.mjs

      - name: Run JVM and brush regression tests
        run: |
          chmod +x ./gradlew
          ./gradlew test --stacktrace
          node web/tests/brush-engine-v2.test.mjs
          node web/tests/brush-engine-v2-coverage.test.mjs
          node web/tests/brush-engine-v2-radius.test.mjs
          node web/tests/brush-engine-v2-contact.test.mjs
          node web/tests/brush-engine-v2-session.test.mjs
          node web/tests/brush-engine-v2-discontinuity.test.mjs
          node web/tests/brush-engine-v2-batch.test.mjs

      - name: Assemble signed APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Verify Android signatures and production assets
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -s "$APK"
          test -s "$AAB"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          jarsigner -verify -certs "$AAB" | tee "$RUNNER_TEMP/aab-signature.txt"
          grep -F 'jar verified.' "$RUNNER_TEMP/aab-signature.txt"
          unzip -p "$APK" assets/index.html > "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"variant":"release"' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"diagnostics":false' "$RUNNER_TEMP/inkframe-release-index.html"
          grep -F '"defaultBrushEngine":"v2"' "$RUNNER_TEMP/inkframe-release-index.html"
          if grep -F 'brush-engine-v2/native.js' "$RUNNER_TEMP/inkframe-release-index.html"; then
            echo "Production index unexpectedly loads native diagnostics" >&2
            exit 1
          fi
          if unzip -l "$APK" | grep -F 'assets/brush-engine-v2/native.js'; then
            echo "Production APK unexpectedly packages native diagnostics" >&2
            exit 1
          fi
          if "$ANDROID_HOME/build-tools/35.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -F 'InkFrameApplication'; then
            echo "Production manifest unexpectedly registers the debug telemetry application" >&2
            exit 1
          fi
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | grep -F "package: name='com.inkframe.studio'"

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk \
             "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
             "release/InkFrame-${INKFRAME_RELEASE_LABEL}-signed.aab"
          (
            cd release
            sha256sum *.apk *.aab > SHA256SUMS.txt
          )
          ls -lh release

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-signed-${{ env.INKFRAME_RELEASE_LABEL }}
          path: release/*
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
          name: InkFrame ${{ env.INKFRAME_RELEASE_LABEL }}
          fail_on_unmatched_files: true
