name: Add Bounded Radial Docking Once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-bounded-radial-docking-once.yml
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: add-bounded-radial-docking-once
  cancel-in-progress: true

jobs:
  implement-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply bounded radial docking
        run: python3 tools/add_bounded_radial_docking_once.py

      - name: Assert docking and native rendering boundaries
        shell: bash
        run: |
          set -euo pipefail
          SCREEN='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/GlassHorizonScreen.kt'
          DOCK='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/RadialDocking.kt'
          TEST='feature-canvas/src/test/kotlin/com/inkframe/feature/canvas/RadialDockingTest.kt'
          CANVAS='feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/CanvasView.kt'
          test -s "$DOCK"
          test -s "$TEST"
          grep -Fq 'clampRadialDockOffset' "$SCREEN"
          grep -Fq 'RadialDockRegion.LEFT' "$SCREEN"
          grep -Fq 'RadialDockRegion.RIGHT' "$SCREEN"
          grep -Fq 'RadialDockRegion.BOTTOM' "$SCREEN"
          grep -Fq 'Reset UI' "$SCREEN"
          grep -Fq 'setZOrderOnTop(true)' "$CANVAS"
          ! grep -Fq 'setZOrderMediaOverlay(true)' "$CANVAS"
          ! grep -Eq 'android\.webkit|WebView\(|JavascriptInterface|addJavascriptInterface' "$SCREEN" "$DOCK" "$CANVAS"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin and run tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileReleaseKotlin :feature-canvas:testReleaseUnitTest test --stacktrace --console=plain 2>&1 | tee /tmp/radial-docking.log

      - name: Commit verified implementation and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/add-bounded-radial-docking-once.yml tools/add_bounded_radial_docking_once.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Bound radial controls to screen-safe command zones'
          git push origin HEAD:main

      - name: Publish exact failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo '## Bounded radial docking failed before commit'
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            if [[ -s /tmp/radial-docking.log ]]; then
              grep -E '(^e: |FAILURE:|Execution failed|Unresolved reference|error:|expected one match)' /tmp/radial-docking.log | tail -n 240 || tail -n 240 /tmp/radial-docking.log
            else
              echo 'Transformation or static assertions failed before Gradle completed.'
            fi
            echo '```'
          } > /tmp/radial-docking-failure.md
          gh issue comment 136 --repo "$GITHUB_REPOSITORY" --body-file /tmp/radial-docking-failure.md