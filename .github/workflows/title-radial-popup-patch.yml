name: Title Radial Popup Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-radial-popup-patch.yml'

permissions:
  contents: write

jobs:
  patch-radial-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Move overflow radial actions into hit-testable popup windows
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()

          int_offset_anchor = 'import androidx.compose.ui.unit.Dp\n'
          if 'import androidx.compose.ui.unit.IntOffset\n' not in text:
              if int_offset_anchor not in text:
                  raise SystemExit('Dp import anchor missing')
              text = text.replace(int_offset_anchor, int_offset_anchor + 'import androidx.compose.ui.unit.IntOffset\n', 1)

          popup_anchor = 'import androidx.compose.ui.viewinterop.AndroidView\n'
          popup_imports = (
              'import androidx.compose.ui.viewinterop.AndroidView\n'
              'import androidx.compose.ui.window.Popup\n'
              'import androidx.compose.ui.window.PopupProperties\n'
          )
          if 'import androidx.compose.ui.window.Popup\n' not in text:
              if popup_anchor not in text:
                  raise SystemExit('AndroidView import anchor missing')
              text = text.replace(popup_anchor, popup_imports, 1)

          old = '''    Box(modifier, contentAlignment = Alignment.Center) {
                  if (open) {
                      actions.forEachIndexed { index, action ->
                          val offset = betaFanOffset(index, fan)
                          ClosedBetaKid(action, palette, Modifier.offset(x = offset.first, y = offset.second))
                      }
                  }
                  val shape = CircleShape
          '''
          new = '''    Box(modifier, contentAlignment = Alignment.Center) {
                  if (open) {
                      val density = LocalDensity.current
                      actions.forEachIndexed { index, action ->
                          val offset = betaFanOffset(index, fan)
                          val popupOffset = with(density) {
                              IntOffset(
                                  x = (offset.first + 5.dp).roundToPx(),
                                  y = (offset.second + 5.dp).roundToPx(),
                              )
                          }
                          Popup(
                              alignment = Alignment.TopStart,
                              offset = popupOffset,
                              properties = PopupProperties(
                                  focusable = false,
                                  clippingEnabled = false,
                              ),
                          ) {
                              ClosedBetaKid(action, palette)
                          }
                      }
                  }
                  val shape = CircleShape
          '''
          if old not in text:
              raise SystemExit('overflow radial child anchor missing')
          text = text.replace(old, new, 1)

          if 'ClosedBetaKid(action, palette, Modifier.offset' in text:
              raise SystemExit('overflow child placement remains')
          if text.count('PopupProperties(') != 1:
              raise SystemExit('expected exactly one radial popup policy')
          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit popup radial actions
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Popup radial actions are already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Render radial actions in hit-testable popups'
          git push origin HEAD:parity/glass-horizon-title
