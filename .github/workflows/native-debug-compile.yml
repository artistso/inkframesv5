name: Native Debug Compile

on:
  pull_request:
    paths:
      - 'app/src/debug/kotlin/com/inkframe/studio/nativeink/**'
      - 'app/src/main/kotlin/com/inkframe/studio/nativeink/**'
      - 'app/build.gradle.kts'
      - 'web/metadata.json'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'
      - '.github/workflows/native-debug-compile.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile:
    name: Compile native debug surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android 16 platform
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile debug Kotlin with retained diagnostics
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew :app:compileDebugKotlin --stacktrace --console=plain 2>&1 | tee native-debug-compile.log
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-debug-compile-log
          path: native-debug-compile.log
          if-no-files-found: error
          retention-days: 14
