name: Release Policy Diagnostics

on:
  pull_request:
    paths:
      - 'tools/**'
      - 'web/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-policy:
    name: Generated release policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install jsdom
        run: npm install --no-save --prefix /tmp/jsdom jsdom
      - name: Run release policy with captured transcript
        id: policy
        shell: bash
        env:
          NODE_PATH: /tmp/jsdom/node_modules
        run: |
          set +e
          {
            node tools/tests/actions-runtime-contract.test.mjs &&
            node web/tests/brush-engine-v2-release.test.mjs
          } > "$RUNNER_TEMP/release-policy.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/release-policy.log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload release policy transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-policy-transcript
          path: ${{ runner.temp }}/release-policy.log
          if-no-files-found: error
          retention-days: 7
