name: Title Branch Patch

on:
  push:
    branches: [parity/glass-horizon-title]
    paths:
      - '.github/workflows/title-branch-patch.yml'

permissions:
  contents: write

jobs:
  patch-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: parity/glass-horizon-title
      - name: Use measured title command offset
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt')
          text = path.read_text()
          old = 'modifier = Modifier.align(Alignment.TopCenter).offset(y = 62.dp),'
          new = 'modifier = Modifier.align(Alignment.TopCenter).offset(y = GlassHorizonTitleSpec.COMMAND_TOP_OFFSET_DP.dp),'

          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('title command offset anchor missing')

          if text.count('GlassHorizonTitle(') != 1:
              raise SystemExit('expected exactly one product title call')
          if text.count('GlassHorizonTitleSpec.COMMAND_TOP_OFFSET_DP') != 1:
              raise SystemExit('expected exactly one measured command offset')

          path.write_text(text)
          PY

          git diff --check
          git diff -- feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
      - name: Commit measured shell geometry
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Measured title geometry is already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add feature-canvas/src/main/kotlin/com/inkframe/feature/canvas/ClosedBetaGlassHorizonScreen.kt
          git commit -m 'Use measured Glass Horizon title clearance'
          git push origin HEAD:parity/glass-horizon-title
