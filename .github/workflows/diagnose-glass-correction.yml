name: Diagnose Glass Horizon Correction

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-glass-correction.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and execute guarded transformer
        id: diagnose
        shell: bash
        run: |
          set +e
          awk '
            /python3 - <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-glass-device-corrections.yml > /tmp/correction.py
          python3 /tmp/correction.py > /tmp/diagnostic.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish exact diagnostic
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_STATUS: ${{ steps.diagnose.outputs.status }}
        run: |
          {
            echo "# Glass Horizon device correction diagnostic"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Transformer exit code: \`${PATCH_STATUS}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```text'
            tail -n 120 /tmp/diagnostic.log
            echo '```'
          } > /tmp/issue.md
          gh issue edit 140 --repo "$GITHUB_REPOSITORY" --body-file /tmp/issue.md
